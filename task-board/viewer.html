    function postJson(url, payload) {
      const requestPayload = {
        agentName: "owner via task board viewer",
        ...payload
      };
      if (typeof window.fetch === "function") {
        return window.fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(requestPayload)
        }).then(async (response) => {
          const data = await response.json().catch(() => ({}));
          if (!response.ok) {
            const error = new Error(data.error || `HTTP ${response.status}`);
            error.status = response.status;
            error.payload = data;
            throw error;
          }
          return data;
        });
      }

      return new Promise((resolve, reject) => {
        const request = new XMLHttpRequest();
        request.open("POST", url, true);
        request.setRequestHeader("Content-Type", "application/json");
        request.onload = () => {
          let data = {};
          try {
            data = JSON.parse(request.responseText || "{}");
          } catch (error) {
            reject(error);
            return;
          }
          if (request.status >= 200 && request.status < 300) {
            resolve(data);
            return;
          }
          const error = new Error(data.error || `HTTP ${request.status}`);
          error.status = request.status;
          error.payload = data;
          reject(error);
        };
        request.onerror = () => reject(new Error("Could not persist board action"));
        request.send(JSON.stringify(requestPayload));
      });
    }

    async function spawnAgent(role, tool, triggerButton) {
      const roleLabel = role === "worker" ? "Worker Agent" : role === "review" ? "Review Agent" : `${role} agent`;
      const toolLabel = tool === "claude" ? "Claude" : tool === "codex" ? "Codex" : tool === "qwen" ? "Qwen" : tool;
      const previousLabel = triggerButton ? triggerButton.textContent : "";
      if (currentPauseStatus.isPaused) {
        statusEl.textContent = pausedControlMessage(`${roleLabel} spawning is paused`);
        await refreshPauseStatus({ silent: true }).catch(() => {});
        return;
      }
      if (triggerButton) {
        triggerButton.disabled = true;
        triggerButton.textContent = "Spawning...";
      }
      statusEl.textContent = `Spawning ${roleLabel} in ${toolLabel}...`;
      try {
        const result = await postJson("/viewer/spawn-agent", { role, tool });
        const phrase = result?.startPhrase || "";
        const processText = result?.processId ? ` PID: ${result.processId}.` : "";
        const logText = result?.logPath ? ` Log: ${result.logPath}.` : "";
        const modeText = result?.mode === "interactive" ? "interactively" : "non-interactively";
        statusEl.textContent = `Spawned ${roleLabel} in ${toolLabel} ${modeText}.${processText}${logText} Start phrase: "${phrase}"`;
        await Promise.allSettled([
          refreshAgentLogs(),
          refreshSystemStatus({ silent: true })
        ]);
      } catch (error) {
        if (error.status === 423 || error.payload?.paused) {
          await refreshPauseStatus({ silent: true }).catch(() => {});
        }
        statusEl.textContent = `Spawn failed (${roleLabel} / ${toolLabel}): ${error.message}`;
      } finally {
        if (triggerButton) {
          triggerButton.disabled = false;
          triggerButton.textContent = previousLabel;
        }
      }
    }

    async function archiveTask(taskId) {
      statusEl.textContent = `Archiving ${taskId}...`;
      try {
        await postJson("/viewer/archive", {
          taskId,
          archivedBy: "Task board viewer"
        });
        const [board, agents, systemStatus] = await Promise.all([
          loadJson("board.json"),
          loadAgents(),
          loadSystemStatus()
        ]);
        currentSystemStatus = systemStatus;
        collapsedTasks.delete(taskId);
        renderBoard(board, "board.json", agents);
        statusEl.textContent = `Archived ${taskId} and updated board.json.`;
      } catch (error) {
        statusEl.textContent = `Archive failed for ${taskId}: ${error.message}`;
      }
    }

    async function unclaimTask(taskId, source) {
      statusEl.textContent = `Unclaiming ${taskId}...`;
      try {
        await postJson("/viewer/unclaim-task", {
          taskId,
          unclaimedBy: "owner via task board viewer",
          reason: source === "reviewing"
            ? "Reviewer agent was killed before finishing."
            : "Worker agent was killed before finishing."
        });
        const [board, agents, systemStatus] = await Promise.all([
          loadJson("board.json"),
          loadAgents(),
          loadSystemStatus()
        ]);
        currentSystemStatus = systemStatus;
        collapsedTasks.delete(taskId);
        renderBoard(board, "board.json", agents);
        statusEl.textContent = source === "reviewing"
          ? `Unclaimed ${taskId} and moved it back to Review.`
          : `Unclaimed ${taskId} and moved it back to To Do.`;
      } catch (error) {
        statusEl.textContent = `Unclaim failed for ${taskId}: ${error.message}`;
      }
    }

    async function terminateAgent(agentId, processId, taskId, triggerButton) {
      const label = agentId || processId || "agent";
      const previousLabel = triggerButton ? triggerButton.textContent : "";
      if (triggerButton) {
        triggerButton.disabled = true;
        triggerButton.textContent = "Terminating...";
      }
      statusEl.textContent = `Terminating agent ${label}...`;
      try {
        const payload = {};
        if (agentId) payload.agentId = agentId;
        if (processId) payload.processId = Number(processId);
        if (taskId) payload.taskId = taskId;
        const result = await postJson("/viewer/terminate-agent", payload);
        const [board, agents, systemStatus] = await Promise.all([
          loadJson("board.json"),
          loadAgents(),
          loadSystemStatus()
        ]);
        currentSystemStatus = systemStatus;
        if (taskId) collapsedTasks.delete(taskId);
        renderBoard(board, "board.json", agents);
        const msg = result?.message || `Terminated agent ${label}.`;
        statusEl.textContent = msg;
      } catch (error) {
        statusEl.textContent = `Terminate failed for ${label}: ${error.message}`;
      } finally {
        if (triggerButton) {
          triggerButton.disabled = false;
          triggerButton.textContent = previousLabel;
        }
      }
    }

    async function returnTaskToReview(taskId, feedback) {
      statusEl.textContent = `Sending ${taskId} back to review...`;
      try {
        await postJson("/viewer/return-to-review", {
          taskId,
          feedback,
          returnedBy: "owner via task board viewer"
        });
        const [board, agents, systemStatus] = await Promise.all([
          loadJson("board.json"),
          loadAgents(),
          loadSystemStatus()
        ]);
        currentSystemStatus = systemStatus;
        collapsedTasks.delete(taskId);
        renderBoard(board, "board.json", agents);
        statusEl.textContent = `Moved ${taskId} back to Review with feedback.`;
      } catch (error) {
        statusEl.textContent = `Feedback failed for ${taskId}: ${error.message}`;
      }
    }

    function laneMarkup(key, label, tasks, options = {}) {
      const allCollapsed = tasks.length > 0 && tasks.every((task) => collapsedTasks.has(taskKey(task)));
      const laneToggleLabel = allCollapsed ? `Expand all ${label} tasks` : `Collapse all ${label} tasks`;
      const extraActions = options.extraActions || "";
      const agentSummary = options.agentRole ? agentSummaryMarkup(options.agentRole, options.agentLabel || "Agents") : "";
      const spawnButtons = options.agentRole ? spawnButtonsMarkup(options.agentRole) : "";
      const body = tasks.length
        ? tasks.map((task) => ticketCard(task, key)).join("")
        : `<div class="empty">No ${escapeText(label.toLowerCase())} tasks</div>`;
      const addlClass = options.extraClass ? ` ${options.extraClass}` : "";
      const agentClass = options.agentRole ? " has-agent-controls" : "";
      const agentStrip = options.showAgentStrip === false ? "" : laneAgentStripMarkup(options.agentRole || "");

      return `
        <section class="lane ${key}${addlClass}${agentClass}" aria-label="${escapeText(label)}">
          ${agentStrip}
          <div class="lane-header">
            <div class="lane-title"><span class="dot"></span><span>${escapeText(label)}</span></div>
            <div class="lane-actions">
              ${options.agentRole ? `<div class="lane-dispatch">${agentSummary}${spawnButtons}</div>` : ""}
              <div class="lane-tools">
                <span class="count">${tasks.length}</span>
                <button class="icon-button lane-toggle" type="button" data-lane-toggle="${escapeText(key)}" aria-label="${laneToggleLabel}" title="${laneToggleLabel}" ${tasks.length ? "" : "disabled"}>${allCollapsed ? "+" : "-"}</button>
                ${extraActions}
              </div>
            </div>
          </div>
          <div class="lane-body">${body}</div>
        </section>
      `;
    }

    function reportOptionalPanelError(label, error) {
      console.error(`Task board viewer ${label} panel failed`, error);
      if (statusEl) {
        statusEl.textContent = `${label} panel failed: ${error?.message || error}`;
      }
    }

    function renderAgentLogsErrorPanel(error) {
      if (!agentLogsEl) return;
      const message = error?.message || "Agent Logs could not render.";
      agentLogsEl.classList.toggle("is-open", agentLogsPanelOpen);
      agentLogsEl.innerHTML = `
        <button class="agent-logs-tab" type="button" data-agent-logs-toggle aria-expanded="${agentLogsPanelOpen ? "true" : "false"}" aria-controls="agent-logs-panel">
          <span class="dot" aria-hidden="true"></span>
          <span>Agent Logs</span>
        </button>
        ${agentLogsPanelOpen ? `
          <div class="agent-logs-tray" id="agent-logs-panel" aria-hidden="false">

              <div class="agent-log-state is-error">${escapeText(message)}</div>
            </section>
          </div>

    function renderBoard(board, sourceLabel, agentsState = currentAgents) {
      syncViewportClientWidth();
      const normalized = normalizeBoard(board);
      currentBoard = normalized;
      currentSourceLabel = sourceLabel;
      currentAgents = agentsState && typeof agentsState === "object" ? agentsState : fallbackAgents;
      renderPauseControl();
      boardNameEl.textContent = normalized.boardName || "Project Task Board";
      updatedAtEl.textContent = `Updated: ${normalized.updatedAt || "unknown"}`;
      sourceNameEl.textContent = `Source: ${sourceLabel}`;
      renderSystemOverview(currentSystemStatus);

      boardEl.classList.toggle("is-done-focus", doneFocusOpen);
      if (doneFocusOpen) {
        const foldedLanes = visualColumns
          .filter((column) => column.key !== "done")
          .map((column) => laneMarkup(column.key, column.label, visualColumnTasks(normalized, column), {
            agentRole: column.agentRole,
            agentLabel: column.agentLabel
          }))
          .join("");
        const doneColumn = visualColumns.find((column) => column.key === "done");
        const doneTasks = visualColumnTasks(normalized, doneColumn);
        boardEl.innerHTML = `
          <div class="folded-stack" aria-label="Folded task columns">${foldedLanes}</div>
          ${laneMarkup("done", "Done", doneTasks, { extraActions: doneFocusButton() })}
        `;
      } else {
        boardEl.innerHTML = visualColumns.map((column) => {
          const tasks = visualColumnTasks(normalized, column);
          return laneMarkup(column.key, column.label, tasks, {
            extraActions: column.key === "done" ? doneFocusButton() : "",
            agentRole: column.agentRole,
            agentLabel: column.agentLabel
          });
        }).join("");
      }

      const archivedTasks = columnTasks(normalized.columns.archived, "archived");
      renderWorkflowPanel(normalized);
      archiveEl.classList.toggle("is-open", archiveTrayOpen);
      archiveEl.innerHTML = `
        <button class="archive-tab" type="button" data-archive-toggle aria-expanded="${archiveTrayOpen ? "true" : "false"}" aria-controls="archived-panel">
          <span class="dot" aria-hidden="true"></span>
          <span>Archived (${archivedTasks.length})</span>
        </button>
        <div class="archive-tray" id="archived-panel" aria-hidden="${archiveTrayOpen ? "false" : "true"}">
          ${laneMarkup("archived", "Archived", archivedTasks, {
            extraClass: "archived-tray-lane",
            extraActions: archiveCloseButton(),
            showAgentStrip: false
          })}
        </div>
      `;
      try {
        renderSettingsPanel();
      } catch (error) {
        reportOptionalPanelError("Settings", error);
      }
      try {
        renderAgentLogsPanel();
      } catch (error) {
        reportOptionalPanelError("Agent Logs", error);
        renderAgentLogsErrorPanel(error);
      }
      applyPinnedAgentRunState();
      syncViewportClientWidth();
      renderActivityLog(normalized);
    }

    const ACTION_LABELS = {
      "add-task": "created task",
      "update-task": "updated task",
      "delete-task": "deleted task",
      "claim-task": "claimed task",
      "unclaim-task": "unclaimed task",
      "claim-next-worker": "claimed next task",
      "move-to-review": "moved to review",
      "claim-review": "claimed review",
      "claim-next-review": "claimed next review",
      "approve-review": "approved review",
      "request-changes": "requested changes",
      "return-to-review": "returned to review",
      "archive": "archived task",
      "register-agent": "registered",
      "heartbeat-agent": "heartbeat",
      "unregister-agent": "unregistered",
      "spawn-agent": "spawned agent",
      "terminate-agent": "terminated agent",
      "pause-plus-one-hour": "paused +1h",
      "resume-now": "resumed board",

    };

    function formatActionLabel(action) {
      return ACTION_LABELS[action] || action.replace(/-/g, " ");
    }

    function formatLogTime(isoString) {
      try {
        const date = new Date(isoString);
        return date.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
      } catch {
        return isoString || "";
      }
    }

    function renderActivityLog(board) {
      const toggleEl = document.getElementById("activityLogToggle");
      const panelEl = document.getElementById("activityLogPanel");
      const listEl = document.getElementById("activityLogList");
      const badgeEl = document.getElementById("activityLogBadge");
      if (!toggleEl || !panelEl || !listEl || !badgeEl) return;

      const auditLog = Array.isArray(board?.apiAuditLog) ? board.apiAuditLog : [];
      const entries = auditLog.slice(-50).reverse();

      badgeEl.textContent = String(auditLog.length);
      panelEl.hidden = !activityLogOpen;
      toggleEl.setAttribute("aria-expanded", activityLogOpen ? "true" : "false");

      if (!entries.length) {
        listEl.innerHTML = `<div class="activity-log-empty">No activity yet.</div>`;
        return;
      }

      listEl.innerHTML = entries.map((entry) => {
        const time = formatLogTime(entry.at);
        const agent = escapeText(entry.agentName || "unknown");
        const action = escapeText(formatActionLabel(entry.action || ""));
        const taskId = entry.taskId || "";
        return `<div class="activity-log-entry">
          <span class="activity-log-time">${escapeText(time)}</span>
          <span class="activity-log-action"><strong>${agent}</strong> ${action}</span>
          ${taskId ? `<span class="activity-log-task">${escapeText(taskId)}</span>` : ""}
        </div>`;
      }).join("");
    }

    async function copyTextToClipboard(text) {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return;
      }

      const input = document.createElement("textarea");
      input.value = text;
      input.setAttribute("readonly", "");
      input.style.position = "fixed";
      input.style.left = "-9999px";
      document.body.appendChild(input);
      input.select();
      const copied = document.execCommand("copy");
      document.body.removeChild(input);
      if (!copied) {
        throw new Error("Clipboard copy failed");
      }
    }

    boardEl.addEventListener("click", (event) => {
      const terminateButton = event.target.closest("[data-terminate-agent]");
      if (terminateButton) {
        const wrapper = terminateButton.closest("[data-agent-run-key]");
        if (wrapper) {
          const agentId = wrapper.getAttribute("data-terminate-agent-id") || "";
          const processId = wrapper.getAttribute("data-terminate-process-id") || "";
          const taskId = wrapper.getAttribute("data-terminate-task-id") || "";
          terminateAgent(agentId, processId, taskId, terminateButton);
        }
        return;
      }

      const agentRunButton = event.target.closest(".agent-run-tab");
      if (agentRunButton) {
        const wrapper = agentRunButton.closest("[data-agent-run-key]");
        if (wrapper) {
          togglePinnedAgentRun(wrapper.getAttribute("data-agent-run-key") || "");
        }
        return;
      }

      const autoDispatchButton = event.target.closest("[data-auto-dispatch-role]");
      if (autoDispatchButton) {
        const role = autoDispatchButton.dataset.autoDispatchRole;
        if (currentPauseStatus.isPaused) {
          statusEl.textContent = pausedControlMessage(`${role === "worker" ? "Worker" : "Review"} auto dispatch is paused`);
          refreshPauseStatus({ silent: true }).catch(() => {});
          return;
        }
        const current = dispatchSettingsForRole(role);
        autoDispatchButton.disabled = true;
        saveDispatchSettings(role, { enabled: !current.enabled })
          .then(() => {
            statusEl.textContent = `${role === "worker" ? "Worker" : "Review"} auto dispatch ${!current.enabled ? "enabled" : "disabled"}.`;
          })
          .catch((error) => {
            statusEl.textContent = `Auto dispatch update failed: ${error.message}`;
          })
          .finally(() => {
            autoDispatchButton.disabled = false;
          });
        return;
      }

      const spawnButton = event.target.closest("[data-spawn-agent]");
      if (spawnButton) {
        const role = spawnButton.dataset.spawnAgent;
        if (currentPauseStatus.isPaused) {
          statusEl.textContent = pausedControlMessage(`${role === "worker" ? "Worker" : "Review"} spawning is paused`);
          refreshPauseStatus({ silent: true }).catch(() => {});
          return;
        }
        const tool = spawnButton.dataset.spawnTool || dispatchSettingsForRole(role).model;
        spawnAgent(role, tool, spawnButton);
        return;
      }

      const doneFocusButton = event.target.closest("[data-done-focus-toggle]");
      if (doneFocusButton) {
        toggleDoneFocus();
        return;
      }

      const archiveButton = event.target.closest("[data-archive-task]");
      if (archiveButton) {
        archiveTask(archiveButton.dataset.archiveTask);
        return;
      }

      const unclaimButton = event.target.closest("[data-unclaim-task]");
      if (unclaimButton) {
        unclaimTask(unclaimButton.dataset.unclaimTask, unclaimButton.dataset.unclaimSource || "claimed");
        return;
      }

      const taskButton = event.target.closest("[data-task-toggle]");
      if (taskButton) {
        const key = taskButton.dataset.taskToggle;
        if (collapsedTasks.has(key)) {
          collapsedTasks.delete(key);
        } else {
          collapsedTasks.add(key);
        }
        renderBoard(currentBoard, currentSourceLabel);
        return;
      }

      const laneButton = event.target.closest("[data-lane-toggle]");
      if (!laneButton) return;

      const columnKey = laneButton.dataset.laneToggle;
      const visualColumn = visualColumns.find((column) => column.key === columnKey);
      const tasks = visualColumn
        ? visualColumnTasks(currentBoard, visualColumn)
        : columnTasks(currentBoard.columns[columnKey], columnKey);
      const keys = tasks.map(taskKey);
      const allCollapsed = keys.length > 0 && keys.every((key) => collapsedTasks.has(key));

      keys.forEach((key) => {
        if (allCollapsed) {
          collapsedTasks.delete(key);
        } else {
          collapsedTasks.add(key);
        }
      });

      renderBoard(currentBoard, currentSourceLabel);
    });

    boardEl.addEventListener("change", (event) => {
      const modelControl = event.target.closest("[data-dispatch-model]");
      if (modelControl) {
        const role = modelControl.dataset.dispatchModel;
        saveDispatchSettings(role, { model: modelControl.value })
          .then(() => {
            statusEl.textContent = `${role === "worker" ? "Worker" : "Review"} model set to ${modelControl.value}.`;
          })
          .catch((error) => {
            statusEl.textContent = `Model update failed: ${error.message}`;
          });
        return;
      }

      const maxControl = event.target.closest("[data-dispatch-max]");
      if (maxControl) {
        const role = maxControl.dataset.dispatchMax;
        const maxAgents = Math.max(0, Math.min(Number.parseInt(maxControl.value, 10) || 0, 8));
        maxControl.value = String(maxAgents);
        saveDispatchSettings(role, { maxAgents })
          .then(() => {
            statusEl.textContent = `${role === "worker" ? "Worker" : "Review"} max agents set to ${maxAgents}.`;
          })
          .catch((error) => {
            statusEl.textContent = `Max update failed: ${error.message}`;
          });
      }
    });

      });
      plannerChat.bodyEl.addEventListener("click", (event) => {
        const toggle = event.target.closest("[data-planner-diagnostics-toggle]");
        if (toggle) {
          const diagEl = toggle.parentElement.querySelector(".planner-diagnostics");
          if (diagEl) {
            const isOpen = diagEl.classList.toggle("is-open");
            toggle.textContent = isOpen ? "Hide diagnostics" : "Show diagnostics";
          }
        }
      });
      plannerChat.sendEl.addEventListener("click", sendPlannerMessage);
      plannerChat.inputEl.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          sendPlannerMessage();
        }
      });
    }

    function openPlannerChat(opts) {
      buildPlannerChatDock();
      plannerChat.detailKey = (opts && opts.detailKey) || "";
      const label = (opts && opts.label) || "Planner";
      plannerChat.titleEl.textContent = `${label} chat`;
      plannerChat.open = true;
      plannerChat.lastSignature = "";
      plannerChat.dock.classList.add("is-open");
      pollPlannerChat();
      if (plannerChat.pollTimer) window.clearInterval(plannerChat.pollTimer);
      plannerChat.pollTimer = window.setInterval(pollPlannerChat, 2000);
      window.setTimeout(() => plannerChat.inputEl && plannerChat.inputEl.focus(), 240);
    }

    function closePlannerChat() {
      plannerChat.open = false;
      if (plannerChat.dock) plannerChat.dock.classList.remove("is-open");
      if (plannerChat.pollTimer) {
        window.clearInterval(plannerChat.pollTimer);
        plannerChat.pollTimer = null;
      }
    }

    function applyPlannerChatControls(list) {
      const started = list.some((m) => m.role === "planner");
      const running = list.some((m) => m.role === "planner" && m.status === "running");
      if (plannerChat.toolEl) {
        plannerChat.toolEl.disabled = started;
        plannerChat.toolEl.title = started
          ? "Model is locked for this conversation — start a new chat to switch"
          : "Model for this conversation";
      }
      if (plannerChat.sendEl && !plannerChat.sending) {
        plannerChat.sendEl.disabled = running;
        plannerChat.sendEl.textContent = running ? "Working..." : "Send";
      }
    }

    function renderPlannerMessages(messages) {
      const list = Array.isArray(messages) ? messages : [];
      applyPlannerChatControls(list);
      const signature = JSON.stringify(list.map((m) => [m.id, m.status, (m.result || m.output || "").length, (m.text || "").length]));
      if (signature === plannerChat.lastSignature) return;
      plannerChat.lastSignature = signature;

      const body = plannerChat.bodyEl;
      if (!body) return;
      const nearBottom = body.scrollHeight - body.scrollTop - body.clientHeight < 80;
      plannerChat.hasMessages = list.length > 0;

      if (!list.length) {
        body.innerHTML = `<div class="planner-chat-empty">No messages yet. Send a request and the Planner will reply here and turn agreed work into todo tasks on the board.</div>`;
        return;
      }

      body.innerHTML = list.map((msg) => {
        if (msg.role === "owner") {
          return `<div class="planner-msg owner">${escapeText(msg.text || "")}</div>`;
        }
        const running = msg.status === "running";
        const statusText = running ? "Planner is thinking" : (msg.isError ? "Planner — error" : "Planner");
        let latencyHtml = "";
        if (!running && msg.spawnedAt && msg.finishedAt) {
          const elapsed = (Date.parse(msg.finishedAt) - Date.parse(msg.spawnedAt)) / 1000;
          if (elapsed >= 0) {
            const label = elapsed < 10 ? elapsed.toFixed(1) + "s" : Math.round(elapsed) + "s";
            latencyHtml = `<span class="planner-msg-latency">${label}</span>`;
          }
        }
        const metaHtml = `<span class="planner-msg-meta"><span class="planner-msg-status ${running ? "running" : ""}">${escapeText(statusText)}${msg.tool ? " &middot; " + escapeText(msg.tool) : ""}</span>${latencyHtml}</span>`;
        if (running) {
          return `<div class="planner-msg planner">${metaHtml}<span class="planner-result">Thinking&hellip;</span></div>`;
        }
        const resultText = msg.result || "";
        const rawOutput = msg.output || "";
        const displayText = resultText || rawOutput || "(no reply captured)";
        let diagHtml = "";
        if (rawOutput && rawOutput !== resultText) {
          diagHtml = `<button class="planner-diagnostics-toggle" type="button" data-planner-diagnostics-toggle>Show diagnostics</button><div class="planner-diagnostics"><pre>${escapeText(rawOutput)}</pre></div>`;
        }
        const renderedContent = resultText ? renderMarkdown(displayText) : escapeText(displayText);
        return `<div class="planner-msg planner">${metaHtml}<span class="planner-result">${renderedContent}</span>${diagHtml}</div>`;
      }).join("");

      if (nearBottom) body.scrollTop = body.scrollHeight;
    }

    async function newPlannerConversation() {
      if (plannerChat.hasMessages) {
        const confirmed = window.confirm("Start a new Planner chat? This clears the current conversation in this panel.");
        if (!confirmed) return;
      }
      try {
        await postJson("/viewer/planner-chat-clear", {});
      } catch (error) {
        /* ignore — render below reflects whatever the server has */
      }
      plannerChat.lastSignature = "";
      plannerChat.hasMessages = false;
      plannerChat.queue = [];
      renderPlannerMessages([]);
      if (plannerChat.inputEl) plannerChat.inputEl.focus();
      statusEl.textContent = "Started a new planner conversation.";
    }

    async function pollPlannerChat() {
      if (!plannerChat.open) return;
      try {
        const data = await loadJson("/viewer/planner-chat?agentName=Task%20board%20viewer");
        renderPlannerMessages(data.messages);
        drainPlannerQueue(data.messages);
      } catch (error) {
        /* transient; next poll retries */
      }
    }

    function plannerIsRunning(messages) {
      return Array.isArray(messages) && messages.some((m) => m.role === "planner" && m.status === "running");
    }

    async function drainPlannerQueue(messages) {
      if (plannerChat.sending || !plannerChat.queue.length) return;
      if (plannerIsRunning(messages)) return;
      const next = plannerChat.queue.shift();
      plannerChat.inputEl.value = "";
      await _doSendPlannerMessage(next.message, next.tool);
    }

    async function _doSendPlannerMessage(message, tool) {
      if (plannerChat.sending) return;
      plannerChat.sending = true;
      plannerChat.sendEl.disabled = true;
      plannerChat.sendEl.textContent = "Sending...";

      const empty = plannerChat.bodyEl.querySelector(".planner-chat-empty");
      if (empty) empty.remove();
      const ownerBubble = document.createElement("div");
      ownerBubble.className = "planner-msg owner";
      ownerBubble.textContent = message;
      plannerChat.bodyEl.appendChild(ownerBubble);
      const pendingBubble = document.createElement("div");
      pendingBubble.className = "planner-msg planner";
      pendingBubble.innerHTML = `<span class="planner-msg-meta"><span class="planner-msg-status running">Planner is thinking &middot; ${escapeText(tool)}</span></span><span class="planner-result">Thinking&hellip;</span>`;
      plannerChat.bodyEl.appendChild(pendingBubble);
      plannerChat.bodyEl.scrollTop = plannerChat.bodyEl.scrollHeight;

      try {
        const data = await postJson("/viewer/planner-chat-send", { message, tool });
        plannerChat.lastSignature = "";
        renderPlannerMessages(data.messages);
        pollPlannerChat();
      } catch (error) {
        ownerBubble.remove();
        pendingBubble.remove();
        statusEl.textContent = `Planner chat failed: ${error.message}`;
      } finally {
        plannerChat.sending = false;
        plannerChat.sendEl.disabled = false;
        plannerChat.sendEl.textContent = "Send";
        plannerChat.inputEl.focus();
      }
    }

    async function sendPlannerMessage() {
      if (plannerChat.sending) return;
      const message = String(plannerChat.inputEl.value || "").trim();
      if (!message) {
        plannerChat.inputEl.focus();
        return;
      }
      const tool = plannerChat.toolEl ? plannerChat.toolEl.value : "claude";
      plannerChat.inputEl.value = "";

      // If the planner is currently responding, queue the message.
      try {
        const current = await loadJson("/viewer/planner-chat?agentName=Task%20board%20viewer");
        if (plannerIsRunning(current.messages)) {
          plannerChat.queue.push({ message, tool });
          plannerChat.hasMessages = true;
          const empty = plannerChat.bodyEl.querySelector(".planner-chat-empty");
          if (empty) empty.remove();
          const queuedBubble = document.createElement("div");
          queuedBubble.className = "planner-msg owner";
          queuedBubble.innerHTML = escapeText(message) + ' <span style="opacity:0.7;font-size:11px">(queued)</span>';
          plannerChat.bodyEl.appendChild(queuedBubble);
          plannerChat.bodyEl.scrollTop = plannerChat.bodyEl.scrollHeight;
          statusEl.textContent = "Message queued — it will be sent after the Planner finishes.";
          return;
        }
      } catch (_) { /* fall through to direct send */ }

      await _doSendPlannerMessage(message, tool);
    }

    workflowEl.addEventListener("click", (event) => {
      const workflowToggleButton = event.target.closest("[data-workflow-toggle]");
      if (workflowToggleButton) {
        toggleWorkflowPanel();
        return;
      }

      const workflowCloseButton = event.target.closest("[data-workflow-close]");
      if (workflowCloseButton) {
        toggleWorkflowPanel(false);
        return;
      }

      const detailCloseButton = event.target.closest("[data-workflow-detail-close]");
      if (detailCloseButton) {
        workflowDetailKey = "";
        renderBoard(currentBoard, currentSourceLabel);
        return;
      }

      const detailBackdrop = event.target.closest("[data-workflow-detail-backdrop]");
      if (detailBackdrop && event.target === detailBackdrop) {
        workflowDetailKey = "";
        renderBoard(currentBoard, currentSourceLabel);
        return;
      }

      const copyButton = event.target.closest("[data-copy-start-phrase]");
      if (copyButton) {
        const phrase = copyButton.dataset.copyStartPhrase || "";
        copyTextToClipboard(phrase)
          .then(() => {
            copyButton.textContent = "Copied";
            copyButton.classList.add("is-copied");
            statusEl.textContent = `Copied "${phrase}".`;
            window.setTimeout(() => {
              copyButton.textContent = "Copy";
              copyButton.classList.remove("is-copied");
            }, 1400);
          })
          .catch(() => {
            statusEl.textContent = `Could not copy "${phrase}".`;
          });
        return;
      }

      const humanInputButton = event.target.closest("[data-human-input]");
      if (humanInputButton) {
        openPlannerChat({
          detailKey: humanInputButton.dataset.chatDetail || "",
          label: humanInputButton.dataset.chatLabel || "Planner"
        });
        return;
      }

      const detailButton = event.target.closest("[data-workflow-detail]");
      if (detailButton) {
        workflowDetailKey = detailButton.dataset.workflowDetail || "";
        workflowPanelOpen = true;
        renderBoard(currentBoard, currentSourceLabel);
        return;
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && plannerChat.open) {
        closePlannerChat();
        return;
      }
      if (event.key === "Escape" && workflowDetailKey) {
        workflowDetailKey = "";
        renderBoard(currentBoard, currentSourceLabel);
        return;
      }
      if (event.key === "Escape" && pinnedAgentRunKey) {
        pinnedAgentRunKey = "";
        applyPinnedAgentRunState();
      }
    });

    archiveEl.addEventListener("click", (event) => {
      const archiveToggleButton = event.target.closest("[data-archive-toggle]");
      if (archiveToggleButton) {
        toggleArchiveTray();
        return;
      }

      const archiveCloseButton = event.target.closest("[data-archive-close]");
      if (archiveCloseButton) {
        toggleArchiveTray(false);
        return;
      }

      const taskButton = event.target.closest("[data-task-toggle]");
      if (taskButton) {
        const key = taskButton.dataset.taskToggle;
        if (collapsedTasks.has(key)) {
          collapsedTasks.delete(key);
        } else {
          collapsedTasks.add(key);
        }
        renderBoard(currentBoard, currentSourceLabel);
        return;
      }

      const laneButton = event.target.closest("[data-lane-toggle]");
      if (!laneButton) return;

      const columnKey = laneButton.dataset.laneToggle;
      const tasks = columnTasks(currentBoard.columns[columnKey], columnKey);
      const keys = tasks.map(taskKey);
      const allCollapsed = keys.length > 0 && keys.every((key) => collapsedTasks.has(key));

      keys.forEach((key) => {
        if (allCollapsed) {
          collapsedTasks.delete(key);
        } else {
          collapsedTasks.add(key);
        }
      });

      renderBoard(currentBoard, currentSourceLabel);
    });

    async function loadDefaultBoard(options = {}) {
      const silent = Boolean(options.silent);
      if (!silent) {
        statusEl.textContent = "Loading board.json...";
      }
      try {
        const board = await loadJson("board.json", { timeoutMs: 5000 });
        renderBoard(board, "board.json", currentAgents);
        if (!silent) {
          statusEl.textContent = "Loaded board.json. Loading viewer metadata...";
        }

        const [agentsResult, , , pauseResult, systemResult] = await Promise.allSettled([
          loadAgents(),
          loadAgentSchema(),
          loadDispatchSettings(),
          loadPauseStatus(),
          loadSystemStatus()
        ]);
        const agents = agentsResult.status === "fulfilled" ? agentsResult.value : fallbackAgents;
        currentPauseStatus = pauseResult.status === "fulfilled"
          ? pauseResult.value
          : normalizePauseStatus(currentDispatchSettings?.pause || fallbackPauseStatus);
        currentSystemStatus = systemResult.status === "fulfilled"
          ? systemResult.value
          : currentSystemStatus;
        renderBoard(board, "board.json", agents);
        statusEl.textContent = silent
          ? `Auto refreshed ${new Date().toLocaleTimeString()}.`
          : "Loaded board.json.";
      } catch (error) {
        if (silent) {
          statusEl.textContent = `Auto refresh failed: ${error.message}`;
          return;
        }
        renderBoard(fallbackBoard, "fallback");
        statusEl.textContent = "Could not auto-load board.json. Use Load JSON file if the browser blocks local file access.";
      }
    }

    async function refreshAgentLogs() {
      if (agentLogRefreshInFlight) return;
      agentLogRefreshInFlight = true;
      try {
        const nextAgents = await loadAgents();
        const normalizedAgents = nextAgents && typeof nextAgents === "object" ? nextAgents : fallbackAgents;
        const beforeSignature = agentRunSignature(currentAgents);
        const afterSignature = agentRunSignature(normalizedAgents);
        currentAgents = normalizedAgents;
        if (beforeSignature !== afterSignature) {
          renderBoard(currentBoard, currentSourceLabel, currentAgents);
        } else {
          updateAgentRunPopovers(currentAgents);
        }
      } finally {
        agentLogRefreshInFlight = false;
      }
    }

    function startAgentLogRefresh() {
      if (agentLogRefreshTimer) return;
      agentLogRefreshTimer = window.setInterval(refreshAgentLogs, 1000);
    }

    function setAutoRefresh(enabled) {
      if (enabled && !autoRefreshTimer) {
        autoRefreshButton.textContent = "Auto refresh: On";
        autoRefreshButton.setAttribute("aria-pressed", "true");
        autoRefreshTimer = window.setInterval(async () => {
          if (autoRefreshInFlight) return;
          autoRefreshInFlight = true;
          try {
            await loadDefaultBoard({ silent: true });
          } finally {
            autoRefreshInFlight = false;
          }
        }, 1000);
        loadDefaultBoard({ silent: true });
        return;
      }

      if (!enabled && autoRefreshTimer) {
        window.clearInterval(autoRefreshTimer);
        autoRefreshTimer = null;
        autoRefreshButton.textContent = "Auto refresh: Off";
        autoRefreshButton.setAttribute("aria-pressed", "false");
        statusEl.textContent = "Auto refresh stopped.";
      }
    }

    fileInput.addEventListener("change", async (event) => {
      const [file] = event.target.files;
      if (!file) return;

      try {
        const text = await file.text();
        const board = JSON.parse(text);
        renderBoard(board, file.name);
        statusEl.textContent = `Loaded ${file.name}.`;
      } catch (error) {
        statusEl.textContent = `Could not load ${file.name}: ${error.message}`;
      }
    });

    reloadButton.addEventListener("click", () => loadDefaultBoard());
    autoRefreshButton.addEventListener("click", () => setAutoRefresh(!autoRefreshTimer));
    document.getElementById("activityLogToggle").addEventListener("click", () => toggleActivityLog());
    document.getElementById("activityLogClose").addEventListener("click", () => toggleActivityLog(false));
    pauseControlEl.addEventListener("click", (event) => {
      const actionButton = event.target.closest("[data-pause-action]");
      if (!actionButton) return;
      runPauseAction(actionButton.dataset.pauseAction);
    });
    window.addEventListener("resize", syncViewportClientWidth);
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", syncViewportClientWidth);
    }

    syncViewportClientWidth();
    loadDefaultBoard().finally(startAgentLogRefresh);
  </script>
</body>
</html>
