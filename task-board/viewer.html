    function syncViewportClientWidth() {
      document.documentElement.style.setProperty(
        "--viewport-client-width",
        `${document.documentElement.clientWidth || window.innerWidth}px`
      );
    }

    function escapeText(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderInlineMarkdown(text) {
      let s = escapeText(text);
      s = s.replace(/`([^`]+)`/g, "<code>$1</code>");
      s = s.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
      s = s.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, "<em>$1</em>");
      s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
      return s;
    }

    function renderMarkdown(text) {
      if (!text) return "";
      const lines = text.split("\n");
      const out = [];
      let inCodeBlock = false;
      let codeLines = [];
      let inList = false;
      let listType = "";
      const closeList = () => { if (inList) { out.push(listType === "ol" ? "</ol>" : "</ul>"); inList = false; } };

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        const trimmed = line.trim();

        if (trimmed.startsWith("```")) {
          if (inCodeBlock) {
            out.push("<pre><code>" + codeLines.map(escapeText).join("\n") + "</code></pre>");
            codeLines = [];
            inCodeBlock = false;
          } else {
            closeList();
            inCodeBlock = true;
          }
          continue;
        }
        if (inCodeBlock) { codeLines.push(line); continue; }

        if (!trimmed) { closeList(); out.push("<br>"); continue; }

        const headingMatch = trimmed.match(/^(#{1,4})\s+(.+)/);
        if (headingMatch) {
          closeList();
          const level = Math.min(headingMatch[1].length, 4);
          out.push(`<h${level} style="margin:6px 0 3px;font-size:${14 - level}px">${renderInlineMarkdown(headingMatch[2])}</h${level}>`);
          continue;
        }

        const ulMatch = trimmed.match(/^[-*]\s+(.+)/);
        if (ulMatch) {
          if (!inList || listType !== "ul") { closeList(); out.push("<ul>"); inList = true; listType = "ul"; }
          out.push("<li>" + renderInlineMarkdown(ulMatch[1]) + "</li>");
          continue;
        }

        const olMatch = trimmed.match(/^\d+\.\s+(.+)/);
        if (olMatch) {
          if (!inList || listType !== "ol") { closeList(); out.push("<ol>"); inList = true; listType = "ol"; }
          out.push("<li>" + renderInlineMarkdown(olMatch[1]) + "</li>");
          continue;
        }

        closeList();
        out.push("<p style=\"margin:2px 0\">" + renderInlineMarkdown(trimmed) + "</p>");
      }
      closeList();
      if (inCodeBlock && codeLines.length) {
        out.push("<pre><code>" + codeLines.map(escapeText).join("\n") + "</code></pre>");
      }
      return out.join("\n");
    }

    function listItems(items, formatter = escapeText) {
      if (!Array.isArray(items) || items.length === 0) return "";
      return `<ul>${items.map((item) => `<li>${formatter(item)}</li>`).join("")}</ul>`;
    }

    function renderFiles(files) {
      return listItems(files, (file) => `<code>${escapeText(file)}</code>`);
    }

    function renderInspectionTargets(targets) {
      if (!Array.isArray(targets) || targets.length === 0) return "";
      const items = targets.map((target) => {
        if (!target || typeof target !== "object") {
          return `<li>${escapeText(target)}</li>`;
        }

        const url = String(target.url || target.href || "").trim();
        const path = String(target.path || "").trim();
        const label = String(target.label || target.title || url || path || "Inspection target").trim();
        const primary = url
          ? `<a href="${escapeText(url)}" target="_blank" rel="noopener noreferrer">${escapeText(label)}</a>`
          : `<span>${escapeText(label)}</span>`;
        const detailParts = [
          path ? `Path: ${path}` : "",
          target.viewport ? `Viewport: ${target.viewport}` : "",
          target.state ? `State: ${target.state}` : "",
          target.notes ? `Notes: ${target.notes}` : ""
        ].filter(Boolean);
        const meta = detailParts.length
          ? `<span class="inspection-target-meta">${escapeText(detailParts.join(" | "))}</span>`
          : "";

        return `<li>${primary}${meta}</li>`;
      });
      return `<ul class="inspection-targets">${items.join("")}</ul>`;
    }

    function field(label, content) {
      if (!content) return "";
      return `<div class="field"><strong>${escapeText(label)}</strong>${content}</div>`;
    }

    function taskKey(task) {
      return String(task.id || `${task.project || "task"}-${task.title || "missing-title"}-${task.createdAt || ""}`);
    }

    function hasRenderableTitle(task) {
      if (!task || typeof task !== "object") return false;
      const title = String(task.title || "").trim();
      return Boolean(title && !title.toLowerCase().startsWith("untitled"));
    }

    function timestampValue(task) {
      const fields = ["archivedAt", "doneAt", "reviewedAt", "reviewRequestedAt", "claimedAt", "createdAt"];
      for (const fieldName of fields) {
        const value = Date.parse(task[fieldName] || "");
        if (!Number.isNaN(value)) return value;
      }
      return 0;
    }

    function columnTasks(tasks, columnKey) {
      const safeTasks = Array.isArray(tasks) ? [...tasks] : [];
      if (columnKey !== "done" && columnKey !== "archived") return safeTasks;
      return safeTasks.sort((a, b) => timestampValue(b) - timestampValue(a));
    }

    function decoratedColumnTasks(tasks, sourceColumnKey) {
      return columnTasks(tasks, sourceColumnKey).map((task) => ({
        ...task,
        __sourceColumn: sourceColumnKey
      }));
    }

    function visualColumnTasks(board, visualColumn) {
      const normalizedColumns = board?.columns || {};
      return visualColumn.sourceKeys.flatMap((sourceColumnKey) =>
        decoratedColumnTasks(normalizedColumns[sourceColumnKey], sourceColumnKey)
      );
    }

    function activeAgentsForRole(role) {
      return activeAgentsForRoleFromState(currentAgents, role);
    }

    function activeAgentsForRoleFromState(agentsState, role) {
      const agents = Array.isArray(agentsState?.activeAgents)
        ? agentsState.activeAgents
        : Array.isArray(agentsState?.agents)
          ? agentsState.agents.filter((agent) => agent?.status === "active")
          : [];
      return agents.filter((agent) => String(agent.role || "").toLowerCase() === role);
    }

    function isLivePendingSpawn(spawn) {
      const status = String(spawn?.status || "").toLowerCase();
      const processState = String(spawn?.processStatus?.state || "").toLowerCase();
      const terminalStates = ["exited", "pid-reused", "unknown", "missing-pid"];
      if (terminalStates.some((state) => status.includes(state) || processState === state)) {
        return false;
      }
      if (status.includes("running") || processState === "running") {
        return true;
      }
      return !status && !processState;
    }

    function pendingSpawnsForRole(role) {
      return pendingSpawnsForRoleFromState(currentAgents, role);
    }

    function pendingSpawnsForRoleFromState(agentsState, role) {
      const pending = Array.isArray(agentsState?.pendingSpawns)
        ? agentsState.pendingSpawns
        : Array.isArray(currentDispatchSettings.pendingSpawns)
          ? currentDispatchSettings.pendingSpawns
          : [];
      return pending.filter((spawn) =>
        String(spawn.role || "").toLowerCase() === role && isLivePendingSpawn(spawn)
      );
    }

    function shortTime(value) {
      const parsed = Date.parse(value || "");
      if (Number.isNaN(parsed)) return "";
      return new Date(parsed).toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
    }

    function formatDateTime(value) {
      const text = String(value || "").trim();
      if (!text) return "";
      const parsed = Date.parse(text);
      if (Number.isNaN(parsed)) return text;
      return new Date(parsed).toLocaleString([], {
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function formatBytes(value) {
      const bytes = Number(value) || 0;
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
      return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
    }

    function logFileNameFromPath(value) {
      const text = String(value || "").trim();
      if (!text) return "";
      return text.split(/[\\/]/).filter(Boolean).pop() || "";
    }

    function normalizeAgentLogPart(value, fallback = "unknown") {
      const text = String(value || "").trim().toLowerCase();
      return text || fallback;
    }

    function agentLogIdentityKey(entry) {
      return [
        normalizeAgentLogPart(entry?.role),
        normalizeAgentLogPart(entry?.model),
        normalizeAgentLogPart(entry?.personalName || entry?.agentName || entry?.name)
      ].join("|");
    }

    function agentLogDisplayName(entry) {
      const name = String(entry?.personalName || entry?.agentName || entry?.name || "").trim();
      const role = normalizeAgentLogPart(entry?.role);
      const model = normalizeAgentLogPart(entry?.model);
      if (name) return `${name} (${role}/${model})`;
      return role === "unknown" && model === "unknown" ? "Unknown agent" : `${role}/${model}`;
    }

    function normalizeAgentLogsPayload(data) {
      const source = data && typeof data === "object" ? data : fallbackAgentLogs;
      const logs = Array.isArray(source.logs)
        ? source.logs.filter((log) => log && typeof log === "object")
        : [];
      const totalLogCount = Number(source.totalLogCount);
      const safeTotalLogCount = Number.isFinite(totalLogCount) && totalLogCount >= logs.length
        ? totalLogCount
        : logs.length;
      return {
        logs,
        agents: Array.isArray(source.agents) ? source.agents.filter((agent) => agent && typeof agent === "object") : [],
        pendingSpawns: Array.isArray(source.pendingSpawns) ? source.pendingSpawns.filter((spawn) => spawn && typeof spawn === "object") : [],
        pausedRuns: Array.isArray(source.pausedRuns) ? source.pausedRuns.filter((run) => run && typeof run === "object") : [],
        totalLogCount: safeTotalLogCount,
        truncated: Boolean(source.truncated) || safeTotalLogCount > logs.length,
        limit: Number(source.limit) || logs.length
      };
    }

    function mergeAgentLogIdentity(map, entry, sourceLabel) {
      const key = agentLogIdentityKey(entry);
      if (!map.has(key)) {
        map.set(key, {
          key,
          role: normalizeAgentLogPart(entry?.role),
          model: normalizeAgentLogPart(entry?.model),
          personalName: String(entry?.personalName || entry?.agentName || entry?.name || "").trim(),
          statuses: new Set(),
          tasks: new Set(),
          sources: new Set(),
          logCount: 0,
          latestLogFileName: "",
          latestLogAt: ""
        });
      }
      const identity = map.get(key);
      identity.sources.add(sourceLabel);
      if (entry?.status) identity.statuses.add(String(entry.status));
      if (entry?.currentTaskId) identity.tasks.add(String(entry.currentTaskId));
      const latestLog = entry?.latestLog && typeof entry.latestLog === "object" ? entry.latestLog : {};
      const latestFile = latestLog.fileName || logFileNameFromPath(entry?.logPath);
      if (latestFile && !identity.latestLogFileName) identity.latestLogFileName = latestFile;
      const latestTime = latestLog.updatedAt || entry?.modifiedAt || entry?.timestamp || entry?.spawnedAt || entry?.registeredAt || entry?.stoppedAt;
      if (latestTime && (!identity.latestLogAt || Date.parse(latestTime) > Date.parse(identity.latestLogAt))) {
        identity.latestLogAt = latestTime;
      }
      return identity;
    }

    function buildAgentLogIdentities(logsData = currentAgentLogs) {
      const data = normalizeAgentLogsPayload(logsData);
      const map = new Map();
      data.agents.forEach((agent) => mergeAgentLogIdentity(map, agent, "registered"));
      data.pendingSpawns.forEach((spawn) => mergeAgentLogIdentity(map, spawn, "pending"));
      data.pausedRuns.forEach((run) => {
        const normalizedRun = {
          role: run.role,
          model: run.model,
          personalName: run.personalName,
          status: run.resumeState || run.statusBeforeStop || "paused",
          currentTaskId: run.currentTaskId,
          logPath: run.logPath || run.priorLogPath,
          stoppedAt: run.stoppedAt,
        };
        mergeAgentLogIdentity(map, normalizedRun, "paused");
      });
      data.logs.forEach((log) => {
        const identity = mergeAgentLogIdentity(map, log, "log file");
        identity.logCount += 1;
        if (!identity.latestLogFileName) identity.latestLogFileName = log.fileName || "";
        const latestTime = log.modifiedAt || log.timestamp || "";
        if (latestTime && (!identity.latestLogAt || Date.parse(latestTime) > Date.parse(identity.latestLogAt))) {
          identity.latestLogAt = latestTime;
        }
      });
      return Array.from(map.values())
        .map((identity) => ({
          ...identity,
          statuses: Array.from(identity.statuses).sort(),
          tasks: Array.from(identity.tasks).sort(),
          sources: Array.from(identity.sources).sort()
        }))
        .sort((a, b) => {
          const activeA = a.statuses.includes("active") ? 1 : 0;
          const activeB = b.statuses.includes("active") ? 1 : 0;
          if (activeA !== activeB) return activeB - activeA;
          if (a.logCount !== b.logCount) return b.logCount - a.logCount;
          return agentLogDisplayName(a).localeCompare(agentLogDisplayName(b));
        });
    }

    function selectedAgentLogIdentity() {
      if (!selectedAgentLogKey) return null;
      return buildAgentLogIdentities().find((identity) => identity.key === selectedAgentLogKey) || null;
    }

    function agentLogMatchesSelected(log) {
      return !selectedAgentLogKey || agentLogIdentityKey(log) === selectedAgentLogKey;
    }

    function visibleAgentLogFiles() {
      const data = normalizeAgentLogsPayload(currentAgentLogs);
      return data.logs.filter(agentLogMatchesSelected);
    }

    function agentLogsTabLabel(data = currentAgentLogs) {
      const normalized = normalizeAgentLogsPayload(data);
      if (!agentLogsLoaded && !agentLogsLoading) return "Agent Logs";
      return `Agent Logs (${normalized.totalLogCount})`;
    }

    function formatDuration(seconds) {
      const totalSeconds = Math.max(0, Math.ceil(Number(seconds) || 0));
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const remainingSeconds = totalSeconds % 60;
      if (hours > 0) return `${hours}h ${minutes}m ${remainingSeconds}s`;
      if (minutes > 0) return `${minutes}m ${remainingSeconds}s`;
      return `${remainingSeconds}s`;
    }

    function remainingPauseSeconds(status) {
      const pausedUntil = String(status?.pausedUntil || "").trim();
      const parsedUntil = Date.parse(pausedUntil);
      if (!Number.isNaN(parsedUntil)) {
        return Math.max(0, Math.ceil((parsedUntil - Date.now()) / 1000));
      }
      const parsedRemaining = Number.parseInt(status?.remainingSeconds, 10);
      return Number.isNaN(parsedRemaining) ? 0 : Math.max(0, parsedRemaining);
    }

    function normalizePauseStatus(status) {
      const source = status && typeof status === "object" ? status : {};
      const remainingSeconds = remainingPauseSeconds(source);
      const isPaused = Boolean(source.isPaused || source.pausedUntil) && remainingSeconds > 0;
      return {
        ...fallbackPauseStatus,
        ...source,
        isPaused,
        pausedUntil: isPaused ? String(source.pausedUntil || "").trim() : "",
        pausedBy: isPaused ? String(source.pausedBy || "").trim() : "",
        pausedAt: isPaused ? String(source.pausedAt || "").trim() : "",
        pauseReason: isPaused ? String(source.pauseReason || "").trim() : "",
        remainingSeconds: isPaused ? remainingSeconds : 0,
        remainingText: isPaused ? formatDuration(remainingSeconds) : "0s",
        message: String(source.message || "").trim()
      };
    }

    function normalizeSystemStatus(status) {
      const source = status && typeof status === "object" ? status : {};
      const board = source.board && typeof source.board === "object" ? source.board : {};
      const agents = source.agents && typeof source.agents === "object" ? source.agents : {};
      const dispatch = source.dispatch && typeof source.dispatch === "object" ? source.dispatch : {};
      const logs = source.logs && typeof source.logs === "object" ? source.logs : {};
      const normalized = {
        ...fallbackSystemStatus,
        ...source,
        board: {
          ...fallbackSystemStatus.board,
          ...board,
          counts: { ...fallbackSystemStatus.board.counts, ...(board.counts || {}) },
          activeLocks: { ...fallbackSystemStatus.board.activeLocks, ...(board.activeLocks || {}) },
          duplicateTaskIds: Array.isArray(board.duplicateTaskIds) ? board.duplicateTaskIds : [],
          missingDependencies: Array.isArray(board.missingDependencies) ? board.missingDependencies : [],
          warnings: Array.isArray(board.warnings) ? board.warnings : []
        },
        pause: normalizePauseStatus(source.pause || currentPauseStatus || fallbackPauseStatus),
        agents: { ...fallbackSystemStatus.agents, ...agents },
        dispatch: {
          worker: { ...fallbackSystemStatus.dispatch.worker, ...(dispatch.worker || {}) },
          review: { ...fallbackSystemStatus.dispatch.review, ...(dispatch.review || {}) }
        },
        logs: {
          ...fallbackSystemStatus.logs,
          ...logs,
          latestError: logs.latestError && typeof logs.latestError === "object" ? logs.latestError : {},
          recentErrors: Array.isArray(logs.recentErrors) ? logs.recentErrors : []
        },
        warnings: Array.isArray(source.warnings) ? source.warnings : []
      };
      normalized.status = String(normalized.status || (normalized.ok ? "ok" : "watch")).toLowerCase();
      return normalized;
    }

    function systemStatusLabel(status) {
      const value = String(status || "").toLowerCase();
      if (value === "ok") return "Healthy";
      if (value === "attention") return "Attention";
      if (value === "watch") return "Watch";
      return value || "Unknown";
    }

    function systemCard(title, value, details, status = "ok", badge = "") {
      const detailList = Array.isArray(details) ? details.filter(Boolean) : [];
      return `
        <article class="system-card is-${escapeText(status)}">
          <div class="system-card-title">
            <span>${escapeText(title)}</span>
            ${badge ? `<span class="system-badge">${escapeText(badge)}</span>` : ""}
          </div>
          <p class="system-value">${escapeText(value)}</p>
          <div class="system-detail">${detailList.map((item) => `<span>${escapeText(item)}</span>`).join("")}</div>
        </article>
      `;
    }

    function renderSystemOverview(status = currentSystemStatus) {
      if (!systemOverviewEl) return;
      const data = normalizeSystemStatus(status);
      currentSystemStatus = data;
      const counts = data.board.counts || {};
      const activeWork = Number(counts.todo || 0) + Number(counts.claimed || 0) + Number(counts.review || 0) + Number(counts.reviewing || 0);
      const boardWarnings = Number(data.board.warningCount || 0);
      const agentIssues = Number(data.agents.stale || 0) + Number(data.agents.pausedRuns || 0);
      const workerDispatch = data.dispatch.worker || {};
      const reviewDispatch = data.dispatch.review || {};
      const dispatchSummary = [
        `Worker ${workerDispatch.enabled ? "auto on" : "auto off"} (${workerDispatch.model || "codex"} x${workerDispatch.maxAgents ?? 0})`,
        `Review ${reviewDispatch.enabled ? "auto on" : "auto off"} (${reviewDispatch.model || "codex"} x${reviewDispatch.maxAgents ?? 0})`
      ];
      const pauseDetails = data.pause.isPaused
        ? [pauseUntilText(data.pause), data.pause.remainingText || ""]
        : ["Claims and spawns allowed"];
      const latestError = data.logs.latestError || {};
      const errorDetail = latestError.error
        ? `${latestError.path || "log"}: ${latestError.error}`
        : "No recent API errors";
      const warnings = systemStatusError
        ? [systemStatusError]
        : (Array.isArray(data.warnings) ? data.warnings : []);

      systemOverviewEl.innerHTML = [
        systemCard(
          "System",
          systemStatusLabel(data.status),
          [
            data.checkedAt ? `Checked ${formatDateTime(data.checkedAt)}` : "Not checked yet",
            data.server.uptimeSeconds ? `Uptime ${formatDuration(data.server.uptimeSeconds)}` : ""
          ],
          data.status,
          data.ok ? "OK" : "!"
        ),
        systemCard(
          "Board",
          `${activeWork} active`,
          [
            `To do ${counts.todo || 0}`,
            `Claimed ${counts.claimed || 0}`,
            `Review ${counts.review || 0}`,
            `Reviewing ${counts.reviewing || 0}`,
            `Done ${counts.done || 0}`
          ],
          boardWarnings ? "attention" : "ok",
          boardWarnings ? `${boardWarnings}` : "OK"
        ),
        systemCard(
          "Agents",
          `${data.agents.active || 0} live`,
          [
            `Pending ${data.agents.pendingSpawns || 0}`,
            `Stale ${data.agents.stale || 0}`,
            `Paused runs ${data.agents.pausedRuns || 0}`
          ],
          agentIssues ? "watch" : "ok",
          `${data.agents.total || 0}`
        ),
        systemCard(
          "Dispatch",
          data.pause.isPaused ? "Paused" : "Ready",
          [...pauseDetails, ...dispatchSummary],
          data.pause.isPaused ? "watch" : "ok",
          data.pause.isPaused ? "Pause" : "Run"
        ),
        systemCard(
          "Logs",
          `${data.logs.errorCount || 0} errors`,
          [
            errorDetail,
          ],
          data.logs.errorCount ? "attention" : "ok",
          `${data.logs.recentCount || 0}`
        ),
        warnings.length
          ? `<div class="system-warnings">${warnings.slice(0, 6).map(escapeText).join(" | ")}</div>`
          : ""
      ].join("");
    }

    function pauseUntilText(status) {
      if (!status?.pausedUntil) return "";
      const timeText = shortTime(status.pausedUntil);
      return timeText ? `Until ${timeText}` : `Until ${status.pausedUntil}`;
    }

    function pausedControlMessage(prefix = "Task board paused") {
      const untilText = pauseUntilText(currentPauseStatus);
      const countdown = currentPauseStatus?.remainingText || "";
      return [prefix, untilText, countdown].filter(Boolean).join(" | ");
    }

    function clearPauseCountdownTimer() {
      if (!pauseCountdownTimer) return;
      window.clearInterval(pauseCountdownTimer);
      pauseCountdownTimer = null;
    }

    function updatePauseCountdownText() {
      if (!currentPauseStatus.isPaused) return;
      const remainingSeconds = remainingPauseSeconds(currentPauseStatus);
      if (remainingSeconds <= 0) {
        clearPauseCountdownTimer();
        refreshPauseStatus({ silent: true }).catch(() => {
          currentPauseStatus = normalizePauseStatus({ isPaused: false });
          renderPauseControl();
          renderBoard(currentBoard, currentSourceLabel);
        });
        return;
      }
      currentPauseStatus = normalizePauseStatus({
        ...currentPauseStatus,
        remainingSeconds
      });
      const countdownEl = pauseControlEl.querySelector("[data-pause-countdown]");
      if (countdownEl) {
        countdownEl.textContent = currentPauseStatus.remainingText;
      }
    }

    function renderPauseControl(status = currentPauseStatus) {
      currentPauseStatus = normalizePauseStatus(status);
      const paused = currentPauseStatus.isPaused;
      const untilText = pauseUntilText(currentPauseStatus);
      const pauseButtonDisabled = pauseActionInFlight ? "disabled" : "";
      const resumeButton = paused
        ? `<button class="button pause-button" type="button" data-pause-action="resume" ${pauseButtonDisabled}>Resume now</button>`
        : "";
      pauseControlEl.classList.toggle("is-paused", paused);
      pauseControlEl.innerHTML = `
        <div class="pause-state">
          <span class="pause-indicator" aria-hidden="true"></span>
          <span class="pause-label">${paused ? "Paused" : "Not paused"}</span>
          ${paused && untilText ? `<span class="pause-until">${escapeText(untilText)}</span>` : ""}
          ${paused ? `<span class="pause-countdown" data-pause-countdown>${escapeText(currentPauseStatus.remainingText)}</span>` : ""}
        </div>
        <div class="pause-actions">
          <button class="button pause-button" type="button" data-pause-action="pause" ${pauseButtonDisabled}>Pause +1h</button>
          ${resumeButton}
        </div>
      `;
      clearPauseCountdownTimer();
      if (paused) {
        pauseCountdownTimer = window.setInterval(updatePauseCountdownText, 1000);
      }
    }

    function agentSchemaModel(model) {
      const lookup = currentAgentSchema?.modelBackground || {};
      return lookup[model] || lookup.unknown || fallbackAgentSchema.modelBackground.unknown;
    }

    function agentSchemaRole(role) {
      const lookup = currentAgentSchema?.roleBorder || {};
      return lookup[role] || lookup.unknown || fallbackAgentSchema.roleBorder.unknown;
    }

    function agentChipMarkup(agent) {
      const personalName = String(agent?.personalName || agent?.agentName || "Unnamed").trim();
      const model = String(agent?.model || "unknown").toLowerCase();
      const role = String(agent?.role || "unknown").toLowerCase();
      const modelSchema = agentSchemaModel(model);
      const roleSchema = agentSchemaRole(role);
      const titleParts = [
        `${personalName}`,
        `Role: ${roleSchema.label || role}`,
        `Model: ${modelSchema.label || model}`,
        agent?.currentTaskId ? `Task: ${agent.currentTaskId}` : "",
        agent?.spawnedAt ? `Spawned: ${shortTime(agent.spawnedAt) || agent.spawnedAt}` : "",
        agent?.lastHeartbeatAt ? `Seen: ${shortTime(agent.lastHeartbeatAt) || agent.lastHeartbeatAt}` : "",
        agent?.agentId ? `Id: ${agent.agentId}` : ""
      ].filter(Boolean).join(" — ");
      const styleParts = [
        `--chip-bg:${modelSchema.background || "#ffffff"}`,
        `--chip-text:${modelSchema.text || "#191816"}`,
        `--chip-border:${roleSchema.border || "#69645d"}`
      ].join(";");
      const unknownClass = (model === "unknown" || role === "unknown") ? " agent-chip-unknown" : "";
      return `<span class="agent-chip${unknownClass}" style="${styleParts}" title="${escapeText(titleParts)}">${escapeText(personalName)}</span>`;
    }

    function agentRunLogText(entry) {
      const latestLog = entry?.latestLog && typeof entry.latestLog === "object" ? entry.latestLog : {};
      const preview = String(latestLog.preview || "").trim();
      if (preview) return preview;
      const notes = String(entry?.notes || "").trim();
      if (notes) return notes;
      return "No log output recorded yet.";
    }

    function agentRunKey(entry, state) {
      const role = String(entry?.role || "").trim().toLowerCase();
      const model = String(entry?.model || "").trim().toLowerCase();
      const name = String(entry?.personalName || entry?.agentName || "agent").trim().toLowerCase();
      const stableId = state === "pending"
        ? String(entry?.processId || entry?.logPath || entry?.spawnedAt || "").trim()
        : String(entry?.agentId || entry?.currentTaskId || "").trim();
      return [state, role, model, name, stableId].join("|");
    }

    function agentRunEntriesForState(agentsState) {
      return ["worker", "review"].flatMap((role) => [
        ...activeAgentsForRoleFromState(agentsState, role).map((entry) => ({
          entry,
          state: "registered",
          key: agentRunKey(entry, "registered"),
        })),
        ...pendingSpawnsForRoleFromState(agentsState, role).map((entry) => ({
          entry,
          state: "pending",
          key: agentRunKey(entry, "pending"),
        })),
      ]);
    }

    function agentRunSignature(agentsState) {
      return agentRunEntriesForState(agentsState)
        .map(({ entry, state, key }) => {
          const displayState = state === "pending"
            ? pendingSpawnDisplayState(entry)
            : { className: "is-registered", stateLabel: "registered live" };
          return [key, displayState.className, displayState.stateLabel].join(":");
        })
        .join("||");
    }

    function applyPinnedAgentRunState() {
      let foundPinned = false;
      document.querySelectorAll("[data-agent-run-key]").forEach((wrap) => {
        const key = wrap.getAttribute("data-agent-run-key") || "";
        const isPinned = Boolean(pinnedAgentRunKey && key === pinnedAgentRunKey);
        wrap.classList.toggle("is-pinned", isPinned);
        const button = wrap.querySelector(".agent-run-tab");
        if (button) {
          button.setAttribute("aria-expanded", isPinned ? "true" : "false");
        }
        if (isPinned) foundPinned = true;
      });
      if (pinnedAgentRunKey && !foundPinned) {
        pinnedAgentRunKey = "";
      }
    }

    function togglePinnedAgentRun(key) {
      pinnedAgentRunKey = pinnedAgentRunKey === key ? "" : key;
      applyPinnedAgentRunState();
    }

    function agentRunMeta(entry, stateLabel) {
      const latestLog = entry?.latestLog && typeof entry.latestLog === "object" ? entry.latestLog : {};
      const processStatus = entry?.processStatus && typeof entry.processStatus === "object" ? entry.processStatus : {};
      const parts = [
        `State: ${stateLabel}`,
        entry?.model ? `Model: ${entry.model}` : "",
        entry?.currentTaskId ? `Task: ${entry.currentTaskId}` : "",
        entry?.processId ? `PID: ${entry.processId}` : "",
        processStatus.state ? `PID state: ${processStatus.state}` : "",
        processStatus.createdAt ? `PID started: ${shortTime(processStatus.createdAt) || processStatus.createdAt}` : "",
        processStatus.checkedAt ? `PID checked: ${shortTime(processStatus.checkedAt) || processStatus.checkedAt}` : "",
        entry?.lastHeartbeatAt ? `Seen: ${shortTime(entry.lastHeartbeatAt) || entry.lastHeartbeatAt}` : "",
        entry?.spawnedAt ? `Spawned: ${shortTime(entry.spawnedAt) || entry.spawnedAt}` : "",
        latestLog.updatedAt ? `Log: ${shortTime(latestLog.updatedAt) || latestLog.updatedAt}` : "",
        latestLog.fileName ? latestLog.fileName : "",
      ].filter(Boolean);
      return parts.join(" | ");
    }

    function pendingSpawnDisplayState(entry) {
      const status = String(entry?.status || "").toLowerCase();
      const processState = String(entry?.processStatus?.state || "").toLowerCase();
      if (status.includes("running") || processState === "running") {
        return { className: "is-running", stateLabel: "spawned running" };
      }
      if (status.includes("exited") || processState === "exited") {
        return { className: "is-exited", stateLabel: "spawned exited" };
      }
      if (status.includes("pid-reused") || processState === "pid-reused") {
        return { className: "is-reused", stateLabel: "spawned pid reused" };
      }
      if (status.includes("unknown") || processState === "unknown") {
        return { className: "is-unknown", stateLabel: "spawned unknown" };
      }
      return { className: "is-pending", stateLabel: "pending registration" };
    }

    function agentRunTabMarkup(entry, state) {
      const displayState = state === "pending"
        ? pendingSpawnDisplayState(entry)
        : { className: "is-registered", stateLabel: "registered live" };
      const stateLabel = displayState.stateLabel;
      const name = String(entry?.personalName || entry?.agentName || "agent").trim();
      const displayName = name || "agent";
      const meta = agentRunMeta(entry, stateLabel);
      const logText = agentRunLogText(entry);
      const key = agentRunKey(entry, state);
      const isPinned = pinnedAgentRunKey === key;
      const agentId = String(entry?.agentId || "").trim();
      const processId = String(entry?.processId || "").trim();
      const currentTaskId = String(entry?.currentTaskId || "").trim();
      return `
        <div class="agent-run-tab-wrap${isPinned ? " is-pinned" : ""}" data-agent-run-key="${escapeText(key)}" data-terminate-agent-id="${escapeText(agentId)}" data-terminate-process-id="${escapeText(processId)}" data-terminate-task-id="${escapeText(currentTaskId)}">
          <button class="agent-run-tab ${displayState.className}" type="button" aria-expanded="${isPinned ? "true" : "false"}" aria-label="${escapeText(displayName)} ${escapeText(stateLabel)} agent log">
            <span class="agent-run-dot" aria-hidden="true"></span>
            <span class="agent-run-name">${escapeText(displayName)}</span>
          </button>
          <div class="agent-run-popover" role="tooltip">
            <div class="agent-run-popover-title">${escapeText(displayName)}</div>
            <div class="agent-run-popover-meta">${escapeText(meta)}</div>
            <pre class="agent-run-log">${escapeText(logText)}</pre>
            <div class="agent-run-popover-actions">
              <button class="terminate-agent-button" type="button" data-terminate-agent title="Unclaim task and terminate agent process">Terminate</button>
            </div>
          </div>
        </div>
      `;
    }

    function updateAgentRunPopovers(agentsState) {
      const entriesByKey = new Map(
        agentRunEntriesForState(agentsState).map(({ entry, state, key }) => [key, { entry, state }])
      );
      document.querySelectorAll("[data-agent-run-key]").forEach((wrap) => {
        const key = wrap.getAttribute("data-agent-run-key") || "";
        const match = entriesByKey.get(key);
        if (!match) return;
        const { entry, state } = match;
        const displayState = state === "pending"
          ? pendingSpawnDisplayState(entry)
          : { className: "is-registered", stateLabel: "registered live" };
        const displayName = String(entry?.personalName || entry?.agentName || "agent").trim() || "agent";
        const button = wrap.querySelector(".agent-run-tab");
        const nameEl = wrap.querySelector(".agent-run-name");
        const titleEl = wrap.querySelector(".agent-run-popover-title");
        const metaEl = wrap.querySelector(".agent-run-popover-meta");
        const logEl = wrap.querySelector(".agent-run-log");
        if (button) {
          button.className = `agent-run-tab ${displayState.className}`;
          button.setAttribute("aria-label", `${displayName} ${displayState.stateLabel} agent log`);
          button.setAttribute("aria-expanded", key === pinnedAgentRunKey ? "true" : "false");
        }
        if (nameEl) nameEl.textContent = displayName;
        if (titleEl) titleEl.textContent = displayName;
        if (metaEl) metaEl.textContent = agentRunMeta(entry, displayState.stateLabel);
        if (logEl) logEl.textContent = agentRunLogText(entry);
        wrap.setAttribute("data-terminate-agent-id", String(entry?.agentId || "").trim());
        wrap.setAttribute("data-terminate-process-id", String(entry?.processId || "").trim());
        wrap.setAttribute("data-terminate-task-id", String(entry?.currentTaskId || "").trim());
      });
      applyPinnedAgentRunState();
    }

    function laneAgentStripMarkup(role) {
      if (!role) {
        return `<div class="lane-agent-strip is-blank" aria-hidden="true"></div>`;
      }
      const registeredTabs = activeAgentsForRole(role).map((agent) => agentRunTabMarkup(agent, "registered"));
      const pendingTabs = pendingSpawnsForRole(role).map((spawn) => agentRunTabMarkup(spawn, "pending"));
      const tabs = [...registeredTabs, ...pendingTabs];
      if (!tabs.length) {
        return `<div class="lane-agent-strip is-blank" aria-label="No active or pending agents"></div>`;
      }
      return `
        <div class="lane-agent-strip" aria-label="${escapeText(role)} agents">
          <div class="lane-agent-tabs">${tabs.join("")}</div>
        </div>
      `;
    }

    function agentSummaryMarkup(role, label) {
      if (!role) return "";
      const agents = activeAgentsForRole(role);
      const count = agents.length;
      const title = `${label}: ${count}`;
      const chipsRow = agents.length
        ? `<div class="agent-chip-row">${agents.map((agent) => agentChipMarkup(agent)).join("")}</div>`
        : `<div class="agent-meta">No active ${escapeText(label.toLowerCase())}</div>`;
      const detailList = agents.length
        ? agents.map((agent) => {
            const metaParts = [
              agent.currentTaskId ? `Task: ${agent.currentTaskId}` : "",
              agent.spawnedAt ? `Spawned: ${shortTime(agent.spawnedAt) || agent.spawnedAt}` : "",
              agent.lastHeartbeatAt ? `Seen: ${shortTime(agent.lastHeartbeatAt) || agent.lastHeartbeatAt}` : ""
            ].filter(Boolean);
            return `
              <li>
                ${agentChipMarkup(agent)}
                ${metaParts.length ? `<span class="agent-meta">${escapeText(metaParts.join(" | "))}</span>` : ""}
              </li>
            `;
          }).join("")
        : `<li><span class="agent-name">No active ${escapeText(label.toLowerCase())}</span></li>`;
      return `
        <div class="agent-summary">
          <button class="agent-pill" type="button" aria-label="${escapeText(title)}">${escapeText(title)}</button>
          <div class="agent-popover" role="tooltip">
            <div class="agent-popover-title">${escapeText(label)}</div>
            <ul class="agent-list">${detailList}</ul>
          </div>
        </div>
      `;
    }

    function spawnButtonsMarkup(role) {
      if (!role) return "";
      const safeRole = escapeText(role);
      const roleLabel = role === "worker" ? "Worker" : role === "review" ? "Review" : role;
      const dispatch = dispatchSettingsForRole(role);
      const codexSelected = dispatch.model === "codex" ? "selected" : "";
      const claudeSelected = dispatch.model === "claude" ? "selected" : "";
      const qwenSelected = dispatch.model === "qwen" ? "selected" : "";
      const autoLabel = dispatch.enabled ? "Auto: On" : "Auto: Off";
      const paused = Boolean(currentPauseStatus?.isPaused);
      const pausedClass = paused ? " is-paused" : "";
      const pausedAttr = paused ? "disabled aria-disabled=\"true\"" : "";
      const pauseTitle = paused
        ? pausedControlMessage(`${roleLabel} dispatch is paused`)
        : "";
      const spawnTitle = paused
        ? pauseTitle
        : `Spawn one ${roleLabel} agent with the selected model`;
      const autoTitle = paused
        ? pauseTitle
        : `Automatically spawn ${roleLabel} agents when work exists and active count is below max`;
      return `
        <span class="dispatch-controls${pausedClass}" role="group" aria-label="${escapeText(roleLabel)} dispatch controls">
          <select class="dispatch-select" data-dispatch-model="${safeRole}" title="${escapeText(roleLabel)} model" ${pausedAttr}>
            <option value="codex" ${codexSelected}>Codex</option>
            <option value="claude" ${claudeSelected}>Claude</option>
            <option value="qwen" ${qwenSelected}>Qwen</option>
          </select>
          <input class="dispatch-max" type="number" min="0" max="8" step="1" value="${escapeText(dispatch.maxAgents)}" data-dispatch-max="${safeRole}" title="Maximum active ${escapeText(roleLabel)} agents" ${pausedAttr}>
          <button class="spawn-button${pausedClass}" type="button" data-spawn-agent="${safeRole}" title="${escapeText(spawnTitle)}" ${pausedAttr}>${paused ? "Paused" : "Spawn"}</button>
          <button class="spawn-button auto-dispatch-toggle${pausedClass}" type="button" data-auto-dispatch-role="${safeRole}" aria-pressed="${dispatch.enabled ? "true" : "false"}" title="${escapeText(autoTitle)}" ${pausedAttr}>${paused ? "Auto paused" : autoLabel}</button>
        </span>
      `;
    }

    function taskRedoCount(task) {
      const parsed = Number.parseInt(task?.redoCount, 10);
      if (Number.isNaN(parsed) || parsed <= 0) return 0;
      return parsed;
    }

    function taskClaimOwner(task, columnKey) {
      if (columnKey === "claimed") {
        return {
          label: "Worker",
          name: String(task.claimedBy || "").trim() || "Unknown agent"
        };
      }
      if (columnKey === "reviewing") {
        return {
          label: "Reviewer",
          name: String(task.reviewClaimedBy || task.reviewingBy || "").trim() || "Unknown agent"
        };
      }
      return null;
    }

    function doneStatusBadge(task, columnKey) {
      if (columnKey !== "done") return "";
      const reviewDecision = String(task.reviewDecision || "").toLowerCase();
      const closedAs = String(task.closedAs || "").toLowerCase();
      const isFailed = reviewDecision === "changes_requested" || closedAs === "replaced_by_follow_up" || task.replacedByTaskId;
      const label = isFailed ? "Failed" : "Success";
      const statusClass = isFailed ? "failed" : "success";
      return `<span class="done-status-badge ${statusClass}">${label}</span>`;
    }

    function isFailedDoneTask(task, columnKey) {
      if (columnKey !== "done") return false;
      const reviewDecision = String(task.reviewDecision || "").toLowerCase();
      const closedAs = String(task.closedAs || "").toLowerCase();
      return reviewDecision === "changes_requested" || closedAs === "replaced_by_follow_up" || Boolean(task.replacedByTaskId);
    }

    function failureBriefPanel(task, columnKey) {
      if (!isFailedDoneTask(task, columnKey)) return "";
      const brief = task.failureBrief && typeof task.failureBrief === "object" ? task.failureBrief : {};
      const expected = String(task.failureExpected || brief.expected || "").trim();
      const actual = String(task.failureActual || brief.actual || "").trim();
      const decision = String(task.failureDecision || brief.decision || task.reviewNotes || "").trim();
      const replacement = String(task.replacedByTaskId || task.latestFollowUpTaskId || "").trim();
      const items = [
        expected ? ["Should be", expected] : null,
        actual ? ["Actually happening", actual] : null,
        decision ? ["Why it failed", decision] : null,
        replacement ? ["Follow-up task", replacement] : null
      ].filter(Boolean);
      if (!items.length) return "";
      return `
        <section class="failure-brief" aria-label="Failed review summary">
          <div class="failure-brief-label">Failed review summary</div>
          <div class="failure-brief-grid">
            ${items.map(([label, value]) => `
              <div class="failure-brief-item">
                <strong>${escapeText(label)}</strong>
                <p>${escapeText(value)}</p>
              </div>
            `).join("")}
          </div>
        </section>
      `;
    }

    function doneFeedbackForm(task, key, columnKey) {
      if (columnKey !== "done") return "";
      const feedback = Array.isArray(task.ownerFeedback) && task.ownerFeedback.length
        ? task.ownerFeedback[task.ownerFeedback.length - 1]?.feedback || ""
        : "";

      return `
        <form class="done-feedback" data-review-feedback-form="${escapeText(key)}">
          <label for="feedback-${escapeText(key)}">Feedback for reviewer</label>
          <textarea id="feedback-${escapeText(key)}" data-review-feedback-input placeholder="Write feedback, then send this task back to Review.">${escapeText(feedback)}</textarea>
          <div class="done-feedback-actions">
            <button class="text-button" type="submit">Send to Review</button>
          </div>
        </form>
      `;
    }

    function latestOwnerFeedback(task) {
      const feedback = task?.ownerFeedback;
      if (Array.isArray(feedback)) {
        return feedback.length ? feedback[feedback.length - 1] : null;
      }
      if (feedback && typeof feedback === "object") return feedback;
      if (typeof feedback === "string" && feedback.trim()) {
        return { feedback };
      }
      return null;
    }

    function ownerFeedbackPanel(task, columnKey) {
      if (columnKey === "done") return "";
      const entry = latestOwnerFeedback(task);
      const feedback = String(entry?.feedback || "").trim();
      if (!feedback) return "";
      const meta = [
        entry.returnedBy ? `From ${entry.returnedBy}` : "",
        entry.returnedAt ? `Returned ${entry.returnedAt}` : ""
      ].filter(Boolean).join(" - ");

      return `
        <section class="owner-feedback" aria-label="Owner feedback">
          <div class="owner-feedback-label">Owner feedback</div>
          <p>${escapeText(feedback)}</p>
          ${meta ? `<div class="owner-feedback-meta">${escapeText(meta)}</div>` : ""}
        </section>
      `;
    }

    function taskStatusBadge(sourceColumnKey) {
      if (sourceColumnKey === "claimed") {
        return `<span class="status-badge">In progress</span>`;
      }
      if (sourceColumnKey === "reviewing") {
        return `<span class="status-badge">Reviewing</span>`;
      }
      return "";
    }

    function taskLifecycleMarkup(task) {
      const entries = [
        task.createdAt ? `Created: ${formatDateTime(task.createdAt)}` : "",
        task.claimedAt ? `Claimed: ${formatDateTime(task.claimedAt)}` : "",
        task.reviewRequestedAt ? `Review requested: ${formatDateTime(task.reviewRequestedAt)}` : "",
        task.reviewedAt ? `Reviewed: ${formatDateTime(task.reviewedAt)}` : "",
        task.doneAt ? `Done: ${formatDateTime(task.doneAt)}` : ""
      ].filter(Boolean);
      if (!entries.length) return "";
      return `<div class="ticket-lifecycle">${entries.map((e) => `<span class="lifecycle-entry">${escapeText(e)}</span>`).join("")}</div>`;
    }

    function doneMetricsPanel(task, columnKey) {
      if (columnKey !== "done") return "";
      const workerTime = String(task.workerTime || "").trim();
      const workerTokens = task.workerTokens != null ? String(task.workerTokens) : "";
      const reviewerTime = String(task.reviewerTime || "").trim();
      const reviewerTokens = task.reviewerTokens != null ? String(task.reviewerTokens) : "";
      if (!workerTime && !workerTokens && !reviewerTime && !reviewerTokens) return "";
      const dash = "–";
      const groups = [
        `<div class="ticket-metrics-group"><span class="ticket-metrics-label">Worker:</span> <span class="ticket-metrics-value">${escapeText(workerTime || dash)} · ${escapeText(workerTokens ? `${workerTokens} tokens` : dash)}</span></div>`,
        `<div class="ticket-metrics-group"><span class="ticket-metrics-label">Reviewer:</span> <span class="ticket-metrics-value">${escapeText(reviewerTime || dash)} · ${escapeText(reviewerTokens ? `${reviewerTokens} tokens` : dash)}</span></div>`
      ];
      return `<div class="ticket-metrics" aria-label="Agent metrics">${groups.join("")}</div>`;
    }

    function ticketCard(task, columnKey) {
      const sourceColumnKey = task.__sourceColumn || columnKey;
      const title = String(task.title || "").trim();
      const priority = escapeText(task.priority || "normal");
      const key = taskKey(task);
      const isCollapsed = collapsedTasks.has(key);
      const toggleLabel = isCollapsed ? "Expand task" : "Collapse task";
      const redoCount = taskRedoCount(task);
      const claimOwner = taskClaimOwner(task, sourceColumnKey);
      const isActiveTask = sourceColumnKey === "claimed" || sourceColumnKey === "reviewing";
      const chips = [
        task.project,
        task.type,
        task.claimedBy ? `Claimed: ${task.claimedBy}` : "",
        task.reviewClaimedBy ? `Reviewing: ${task.reviewClaimedBy}` : "",
        task.requestedBy ? `Requested: ${task.requestedBy}` : ""
      ].filter(Boolean);
      const redoBadge = redoCount > 0 ? `<span class="redo-badge">Redo x${redoCount}</span>` : "";
      const ownerBadge = claimOwner
        ? `<span class="owner-badge">${escapeText(claimOwner.label)}: ${escapeText(claimOwner.name)}</span>`
        : "";
      const doneBadge = doneStatusBadge(task, sourceColumnKey);
      const statusBadge = taskStatusBadge(sourceColumnKey);
      const archiveButton = sourceColumnKey === "done"
        ? `<button class="text-button archive-task" type="button" data-archive-task="${escapeText(key)}">Archive</button>`
        : "";
      const unclaimButton = sourceColumnKey === "claimed"
        ? `<div class="ticket-actions"><button class="text-button" type="button" data-unclaim-task="${escapeText(key)}" data-unclaim-source="claimed">Unclaim task</button></div>`
        : sourceColumnKey === "reviewing"
          ? `<div class="ticket-actions"><button class="text-button" type="button" data-unclaim-task="${escapeText(key)}" data-unclaim-source="reviewing">Unclaim review</button></div>`
          : "";
      const activeClass = isActiveTask ? ` is-active-task ticket-${sourceColumnKey}-active` : "";

      return `
        <article class="ticket ${isCollapsed ? "is-collapsed" : ""}${activeClass}" data-task-id="${escapeText(key)}" data-source-column="${escapeText(sourceColumnKey)}">
          <div class="ticket-title-row">
            <div class="ticket-main">
              <h2>${escapeText(title)}</h2>
              <div class="ticket-meta">${statusBadge}${doneBadge}${ownerBadge}${redoBadge}</div>
            </div>
            <div class="ticket-title-actions">
              ${archiveButton}
              <button class="icon-button ticket-toggle" type="button" data-task-toggle="${escapeText(key)}" aria-label="${toggleLabel}" title="${toggleLabel}">${isCollapsed ? "+" : "-"}</button>
            </div>
          </div>
          <div class="ticket-details" ${isCollapsed ? "hidden" : ""}>
            ${failureBriefPanel(task, sourceColumnKey)}
            ${doneFeedbackForm(task, key, sourceColumnKey)}
            ${unclaimButton}
            <div class="ticket-head">
              <div class="ticket-id">${escapeText(task.id || "No ID")}</div>
              <div class="priority ${priority.toLowerCase()}">${priority}</div>
            </div>
            ${taskLifecycleMarkup(task)}
            ${doneMetricsPanel(task, sourceColumnKey)}
            ${ownerFeedbackPanel(task, sourceColumnKey)}
            ${field("Inspect Change", renderInspectionTargets(task.inspectionTargets))}
            ${task.summary ? `<p class="summary">${escapeText(task.summary)}</p>` : ""}
            ${chips.length ? `<div class="chips">${chips.map((chip) => `<span class="chip">${escapeText(chip)}</span>`).join("")}</div>` : ""}
            ${field("Requirements", listItems(task.requirements))}
            ${field("Acceptance", listItems(task.acceptanceCriteria))}
            ${field("Files", renderFiles(task.files))}
            ${field("Blockers", listItems(task.blockers))}
            ${task.notes ? field("Notes", `<p class="summary">${escapeText(task.notes)}</p>`) : ""}
          </div>
        </article>
      `;
    }

      return `<button class="icon-button archive-close" type="button" data-archive-close aria-label="Close archived panel" title="Close archived panel">&times;</button>`;
    }

    function workflowNode(step, badge) {

        ? `<span class="count workflow-state-count" style="background: ${step.color}">${escapeText(badge)}</span>`

        ? ` data-human-input="1" data-chat-detail="${escapeText(step.key)}" data-chat-label="${escapeText(step.label)}"`

        ? `<span class="workflow-human-badge" title="Accepts human input — click to open chat">&#128172; Human input</span>`
        : "";
      return `

    function workflowBranch(detailKey, title, text) {
      return `

    function buildWorkflowGraph(normalized) {
      var todoCount = workflowCount(normalized, "todo");
      var claimedCount = workflowCount(normalized, "claimed");
      var reviewCount = workflowCount(normalized, "review");
      var reviewingCount = workflowCount(normalized, "reviewing");
      var activeWorkerCount = activeAgentsForRole("worker").length;
      var activeReviewCount = activeAgentsForRole("review").length;

      var nodeDefs = {
        planner:  { key: "planning-agent",    kind: "Agent",          label: "Planner",                color: "#476f8f", meta: "Turns requirements into todo cards.", acceptsHumanInput: true },
        worker:   { key: "worker-agent",      kind: "Agent",          label: "Worker",                 color: "var(--claimed)", meta: "Claims todo work, implements it, and requests review." },
        reviewer: { key: "review-agent",      kind: "Agent",          label: "Reviewer",               color: "#7f6cae", meta: "Claims review work, validates it, and decides outcome." }
      };

      var badges = {
        planner:  todoCount,
        worker:   activeWorkerCount ? (activeWorkerCount + " active") : claimedCount,
        reviewer: activeReviewCount ? (activeReviewCount + " active") : reviewCount + reviewingCount
      };

      var layout = [
        { ids: ["planner"] },
        { ids: ["worker"] },
        { ids: ["reviewer"] }
      ];

      var edges = [
        { from: "planner",  to: "worker",   label: "todo tickets" },
        { from: "worker",   to: "reviewer", label: "inspection targets + review request" }
      ];

      var rows = layout.map(function(row) {
        return {
          nodes: row.ids.map(function(id) {
            return { id: id, step: nodeDefs[id], badge: badges[id] || null };
          })
        };
      });

      return { rows: rows, edges: edges };
    }

    function workflowGraphEdgeBlock(sourceRow, targetRow, edges) {
      var VB_W = 1000;
      var VB_H = 52;
      var ARROW_SIZE = 6;
      var sCols = sourceRow.nodes.length;
      var tCols = targetRow.nodes.length;
      var MID_Y = VB_H * 0.40;
      var BOTTOM_Y = VB_H - ARROW_SIZE - 2;

      function colCenterX(col, totalCols) {
        return (col + 0.5) / totalCols * VB_W;
      }

      function arrowAt(x, y) {
        return '<polygon points="' + (x - ARROW_SIZE) + ',' + y + ' ' + (x + ARROW_SIZE) + ',' + y + ' ' + x + ',' + (y + ARROW_SIZE + 1) + '" class="wf-graph-edge-arrow"/>';
      }

      function labelPill(x, y, text) {
        var safeLabel = escapeText(text || "");
        var charW = 6.2;
        var padX = 14;
        var textW = safeLabel.length * charW;
        var pillW = Math.max(textW + padX, 32);
        var pillH = 16;
        var html = '<rect x="' + (x - pillW / 2) + '" y="' + (y - pillH / 2) + '" width="' + pillW + '" height="' + pillH + '" class="wf-graph-edge-label-bg"/>';
        html += '<text x="' + x + '" y="' + y + '" class="wf-graph-edge-label-text">' + safeLabel + '</text>';
        return html;
      }

      function nodeIdx(row, id) {
        for (var i = 0; i < row.nodes.length; i++) {
          if (row.nodes[i].id === id) return i;
        }
        return -1;
      }

      var paths = "";
      var labels = "";

      var bySource = {};
      var byTarget = {};
      edges.forEach(function(e) {
        if (!bySource[e.from]) bySource[e.from] = [];
        bySource[e.from].push(e);
        if (!byTarget[e.to]) byTarget[e.to] = [];
        byTarget[e.to].push(e);
      });

      var rendered = {};

      // 1. Merge groups: multiple sources → single target
      Object.keys(byTarget).forEach(function(targetId) {
        var targetEdges = byTarget[targetId];
        if (targetEdges.length <= 1) return;

        var ti = nodeIdx(targetRow, targetId);
        if (ti < 0) return;
        var tx = colCenterX(ti, tCols);

        var sourceXs = [];
        targetEdges.forEach(function(e) {
          var si = nodeIdx(sourceRow, e.from);
          if (si >= 0) sourceXs.push(colCenterX(si, sCols));
        });
        sourceXs.sort(function(a, b) { return a - b; });

        sourceXs.forEach(function(sx) {
          paths += '<line x1="' + sx + '" y1="0" x2="' + sx + '" y2="' + MID_Y + '" class="wf-graph-edge-line"/>';
        });
        if (sourceXs.length > 1) {
          paths += '<line x1="' + sourceXs[0] + '" y1="' + MID_Y + '" x2="' + sourceXs[sourceXs.length - 1] + '" y2="' + MID_Y + '" class="wf-graph-edge-line"/>';
        }
        paths += '<line x1="' + tx + '" y1="' + MID_Y + '" x2="' + tx + '" y2="' + BOTTOM_Y + '" class="wf-graph-edge-line"/>';
        paths += arrowAt(tx, BOTTOM_Y);

        var mergeLx = sourceXs.reduce(function(a, b) { return a + b; }, 0) / sourceXs.length;
        labels += labelPill(mergeLx, MID_Y, targetEdges[0].label || "");
        targetEdges.forEach(function(e) { rendered[e.from + "\u2192" + e.to] = true; });
      });

      // 2. Split groups: single source → multiple targets
      Object.keys(bySource).forEach(function(sourceId) {
        var sourceEdges = bySource[sourceId];
        if (sourceEdges.length <= 1) return;
        var allDone = sourceEdges.every(function(e) { return rendered[e.from + "\u2192" + e.to]; });
        if (allDone) return;

        var si = nodeIdx(sourceRow, sourceId);
        if (si < 0) return;
        var sx = colCenterX(si, sCols);

        var targetXs = [];
        sourceEdges.forEach(function(e) {
          if (rendered[e.from + "\u2192" + e.to]) return;
          var ti = nodeIdx(targetRow, e.to);
          if (ti >= 0) targetXs.push(colCenterX(ti, tCols));
        });
        targetXs.sort(function(a, b) { return a - b; });
        if (!targetXs.length) return;

        paths += '<line x1="' + sx + '" y1="0" x2="' + sx + '" y2="' + MID_Y + '" class="wf-graph-edge-line"/>';

        var spanMin = Math.min(sx, targetXs[0]);
        var spanMax = Math.max(sx, targetXs[targetXs.length - 1]);
        if (targetXs.length > 1 || Math.abs(sx - targetXs[0]) > 4) {
          paths += '<line x1="' + spanMin + '" y1="' + MID_Y + '" x2="' + spanMax + '" y2="' + MID_Y + '" class="wf-graph-edge-line"/>';
        }

        targetXs.forEach(function(tx) {
          paths += '<line x1="' + tx + '" y1="' + MID_Y + '" x2="' + tx + '" y2="' + BOTTOM_Y + '" class="wf-graph-edge-line"/>';
          paths += arrowAt(tx, BOTTOM_Y);
        });

        labels += labelPill(sx, MID_Y, sourceEdges[0].label || "");
        sourceEdges.forEach(function(e) { rendered[e.from + "\u2192" + e.to] = true; });
      });

      // 3. Simple 1:1 edges
      edges.forEach(function(e) {
        if (rendered[e.from + "\u2192" + e.to]) return;

        var si = nodeIdx(sourceRow, e.from);
        var ti = nodeIdx(targetRow, e.to);
        if (si < 0 || ti < 0) return;
        var sx = colCenterX(si, sCols);
        var tx = colCenterX(ti, tCols);

        if (Math.abs(sx - tx) < 4) {
          paths += '<line x1="' + sx + '" y1="0" x2="' + tx + '" y2="' + BOTTOM_Y + '" class="wf-graph-edge-line"/>';
          labels += labelPill(sx, VB_H * 0.42, e.label || "");
        } else {
          paths += '<path d="M' + sx + ',0 L' + sx + ',' + MID_Y + ' L' + tx + ',' + MID_Y + ' L' + tx + ',' + BOTTOM_Y + '" class="wf-graph-edge-line"/>';
          labels += labelPill((sx + tx) / 2, MID_Y, e.label || "");
        }
        paths += arrowAt(tx, BOTTOM_Y);
      });

      return '<div class="wf-graph-edge-block" aria-hidden="true"><svg viewBox="0 0 ' + VB_W + ' ' + VB_H + '" preserveAspectRatio="xMidYMid meet">' + paths + labels + '</svg></div>';
    }

    function workflowGraphMarkup(normalized) {
      var graph = buildWorkflowGraph(normalized);
      var activeCount = ["todo", "claimed", "review", "reviewing"].reduce(function(total, key) { return total + workflowCount(normalized, key); }, 0);
      var doneCount = workflowCount(normalized, "done");
      var archivedCount = workflowCount(normalized, "archived");

      var canvasHtml = '<div class="wf-graph-canvas" aria-label="Agent workflow map">';

      graph.rows.forEach(function(row, rowIdx) {
        var colCount = row.nodes.length;
        canvasHtml += '<div class="wf-graph-row" data-cols="' + colCount + '">';
        row.nodes.forEach(function(node) {
          canvasHtml += workflowNode(node.step, node.badge);
        });
        canvasHtml += '</div>';

        if (rowIdx < graph.rows.length - 1) {
          var nextRow = graph.rows[rowIdx + 1];
          var rowEdges = graph.edges.filter(function(e) {
            return row.nodes.some(function(n) { return n.id === e.from; }) &&
                   nextRow.nodes.some(function(n) { return n.id === e.to; });
          });
          if (rowEdges.length) {
            canvasHtml += workflowGraphEdgeBlock(row, nextRow, rowEdges);
          }
        }
      });

      canvasHtml += '</div>';

      return '\n        <section class="workflow-panel" id="workflow-panel" aria-hidden="' + (workflowPanelOpen ? "false" : "true") + '">\n          <div class="workflow-panel-header">\n            <div>\n              <h2>Agent Workflow Map</h2>\n              <p>Each clickable block is an agent. Open one to see its context, goal, behavior, permissions, and hard rules.</p>\n            </div>\n            ' + workflowCloseButton() + '\n          </div>\n          <div class="workflow-graph">\n            ' + canvasHtml + '\n          </div>\n          <div class="workflow-stats">\n            <div class="workflow-stat"><strong>' + activeCount + '</strong><span>todo / claimed / review</span></div>\n            <div class="workflow-stat"><strong>' + doneCount + '</strong><span>done visible</span></div>\n            <div class="workflow-stat"><strong>' + archivedCount + '</strong><span>archived</span></div>\n          </div>\n        </section>\n      ';
    }

          </section>

      return `

          <h4>${escapeText(title)}</h4>

    function normalizeBoard(board) {
      const source = board && typeof board === "object" ? board : {};
      const normalized = { ...fallbackBoard, ...source };
      normalized.columns = { ...fallbackBoard.columns, ...(source.columns || {}) };
      const taskLookup = normalized.tasks && typeof normalized.tasks === "object" ? normalized.tasks : {};
      Object.keys(normalized.columns).forEach((columnKey) => {
        const tasks = Array.isArray(normalized.columns[columnKey]) ? normalized.columns[columnKey] : [];
        normalized.columns[columnKey] = tasks
          .map((task) => {
            if (typeof task === "string") return taskLookup[task] || null;
            return task;
          })
          .filter(hasRenderableTitle);
      });
      return normalized;
    }

    async function loadJson(url, options = {}) {
      const timeoutMs = Math.max(0, Number(options.timeoutMs) || 0);
      if (typeof window.fetch === "function") {
        const controller = timeoutMs > 0 && typeof AbortController === "function"
          ? new AbortController()
          : null;
        const timeoutId = controller
          ? window.setTimeout(() => controller.abort(), timeoutMs)
          : null;
        try {
          const fetchOptions = { cache: "no-store" };
          if (controller) fetchOptions.signal = controller.signal;
          const response = await window.fetch(url, fetchOptions);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return response.json();
        } catch (error) {
          if (error?.name === "AbortError") {
            throw new Error(`${url} timed out after ${timeoutMs}ms`);
          }
          throw error;
        } finally {
          if (timeoutId) window.clearTimeout(timeoutId);
        }
      }

      return new Promise((resolve, reject) => {
        const request = new XMLHttpRequest();
        request.open("GET", url, true);
        request.overrideMimeType("application/json");
        if (timeoutMs > 0) request.timeout = timeoutMs;
        request.onload = () => {
          if (request.status >= 200 && request.status < 300) {
            try {
              resolve(JSON.parse(request.responseText));
            } catch (error) {
              reject(error);
            }
            return;
          }
          reject(new Error(`HTTP ${request.status}`));
        };
        request.ontimeout = () => reject(new Error(`${url} timed out after ${timeoutMs}ms`));
        request.onerror = () => reject(new Error("Could not load JSON"));
        request.send();
      });
    }

    async function loadAgentLogContent(fileName) {
      const url = `/viewer/agent-log-content?agentName=Task%20board%20viewer&fileName=${encodeURIComponent(fileName)}`;
      if (typeof window.fetch === "function") {
        const response = await window.fetch(url, { cache: "no-store" });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          const error = new Error(data.error || `HTTP ${response.status}`);
          error.status = response.status;
          throw error;
        }
        return data;
      }
      return loadJson(url);
    }

      agentLogsLoading = true;

      renderAgentLogsPanel();

        if (selectedAgentLogKey && !identities.some((identity) => identity.key === selectedAgentLogKey)) {

          statusEl.textContent = `Loaded ${currentAgentLogs.logs.length} agent logs.`;

        agentLogsLoading = false;
        renderAgentLogsPanel();

      selectedAgentLogError = "";

    async function loadSystemStatus() {
      try {
        const status = normalizeSystemStatus(await loadJson("/viewer/system-status?agentName=Task%20board%20viewer", { timeoutMs: 2500 }));
        systemStatusError = "";
        currentSystemStatus = status;

        currentSystemStatus = normalizeSystemStatus({

        });

    async function refreshSystemStatus(options = {}) {
      const status = await loadSystemStatus();
      renderSystemOverview(status);
      if (!options.silent && statusEl) {
        statusEl.textContent = status.ok
          ? "System status refreshed."
          : `System status: ${systemStatusLabel(status.status)}.`;

    async function refreshPauseStatus(options = {}) {
      const previousPaused = currentPauseStatus.isPaused;
      currentPauseStatus = await loadPauseStatus();
      renderPauseControl();
      refreshSystemStatus({ silent: true }).catch(() => {});
      if (previousPaused !== currentPauseStatus.isPaused) {
        renderBoard(currentBoard, currentSourceLabel);
      }
      if (!options.silent) {
        statusEl.textContent = currentPauseStatus.isPaused
          ? pausedControlMessage("Task board paused")
          : "Task board pause cleared.";
      }
      return currentPauseStatus;
    }

    async function runPauseAction(action) {
      if (pauseActionInFlight) return;
      const isResume = action === "resume";
      pauseActionInFlight = true;
      renderPauseControl();
      statusEl.textContent = isResume ? "Resuming task board..." : "Pausing task board for one hour...";
      try {
        const endpoint = isResume ? "/viewer/resume-now" : "/viewer/pause-plus-one-hour";
        const payload = isResume ? {} : { pauseReason: "Owner clicked Pause +1h in viewer" };
        currentPauseStatus = normalizePauseStatus(await postJson(endpoint, payload));
        renderBoard(currentBoard, currentSourceLabel);
        statusEl.textContent = currentPauseStatus.isPaused
          ? pausedControlMessage(isResume ? "Task board paused" : "Task board pause extended")
          : "Task board pause cleared.";
      } catch (error) {
        statusEl.textContent = `${isResume ? "Resume" : "Pause"} failed: ${error.message}`;
        await refreshPauseStatus({ silent: true }).catch(() => {});

        pauseActionInFlight = false;
        renderPauseControl();

      return {

        maxAgents: Number.isNaN(maxAgents) ? 1 : Math.max(0, Math.min(maxAgents, 8))

    function isMissingHealthCheckRoute(error) {
      const status = Number(error?.status || 0);
      const message = String(error?.message || error || "");
      return status === 404 || /\bHTTP 404\b/i.test(message) || /Unknown endpoint/i.test(message);
    }

    async function runAgentHealthCheck(tool, command, triggerButton) {
      const label = agentToolLabel(tool);
      const previousLabel = triggerButton ? triggerButton.textContent : "";
      if (triggerButton) {
        triggerButton.disabled = true;
        triggerButton.textContent = "Testing...";
      }
      statusEl.textContent = `Testing ${label} command...`;
      try {
        const result = await postJson("/viewer/agent-health-check", { tool, command });
        const seconds = result?.durationMs ? ` in ${(Number(result.durationMs) / 1000).toFixed(1)}s` : "";
        const output = String(result?.outputPreview || "").trim();
        const failureDetail = output ? ` Output: ${output}` : "";
        const suggestion = String(result?.suggestion || "").trim();
        const nextStep = suggestion ? ` Next step: ${suggestion}` : "";
        if (result?.ok) {
          statusEl.textContent = `${label} health check passed${seconds}.`;
        } else {
          const error = String(result?.error || result?.status || "command exited with an error").trim();
          statusEl.textContent = `${label} health check failed${seconds}: ${error}.${nextStep}${failureDetail}`;
        }
      } catch (error) {
        if (isMissingHealthCheckRoute(error)) {
          statusEl.textContent = `${label} health check is not available from the running backend. Restart task-board/server.py, refresh this page, and run the test again.`;
        } else {
          statusEl.textContent = `${label} health check failed: ${error.message}`;
        }
      } finally {
        if (triggerButton) {
          triggerButton.disabled = false;
          triggerButton.textContent = previousLabel;
        }
      }
    }
