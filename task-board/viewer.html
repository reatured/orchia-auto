<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Project Task Board</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23191816'/%3E%3Crect x='13' y='14' width='8' height='36' rx='4' fill='%233f6f8f'/%3E%3Crect x='25' y='10' width='8' height='44' rx='4' fill='%239b5b25'/%3E%3Crect x='37' y='16' width='8' height='32' rx='4' fill='%236f5aa8'/%3E%3Crect x='49' y='20' width='8' height='28' rx='4' fill='%2334785d'/%3E%3C/svg%3E">
  <style>
    :root {
      --page: #f6f4ef;
      --ink: #191816;
      --muted: #69645d;
      --line: #d8d2c7;
      --panel: #ffffff;
      --todo: #3f6f8f;
      --claimed: #9b5b25;
      --review: #6f5aa8;
      --done: #34785d;
      --archived: #5f6872;
      --workflow: #2f6f79;
      --archive-tab-height: 132px;
      --archive-tab-width: 40px;
      --workflow-tab-height: 132px;
      --workflow-tab-width: 40px;
      --settings-tab-height: 118px;
      --settings-tab-width: 40px;
      --side-tab-gutter: 64px;
      --shell-edge-gap: 16px;
      --viewport-client-width: 100vw;
      --shadow: 0 14px 34px rgba(25, 24, 22, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--page);
      color: var(--ink);
      font: 14px/1.45 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .shell {
      width: min(1480px, calc(var(--viewport-client-width) - var(--side-tab-gutter) - var(--shell-edge-gap)));
      margin-left: max(var(--side-tab-gutter), calc((var(--viewport-client-width) - 1480px) / 2));
      margin-right: var(--shell-edge-gap);
      padding: 24px 0 84px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .meta {
      margin-top: 8px;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pause-control {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      min-height: 36px;
      max-width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
      padding: 5px 6px 5px 10px;
      box-shadow: 0 1px 0 rgba(25, 24, 22, 0.04);
    }

    .pause-control.is-paused {
      border-color: #d3aa6c;
      background: #fff8ec;
    }

    .pause-state {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
    }

    .pause-indicator {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--done);
      flex: 0 0 auto;
    }

    .pause-control.is-paused .pause-indicator {
      background: #a85a28;
    }

    .pause-label {
      color: var(--ink);
      font-weight: 760;
      white-space: nowrap;
    }

    .pause-until {
      white-space: nowrap;
    }

    .pause-countdown {
      min-width: 52px;
      border: 1px solid #d7c7ab;
      border-radius: 999px;
      background: #ffffff;
      color: #665333;
      padding: 2px 7px;
      text-align: center;
      font-weight: 760;
      white-space: nowrap;
    }

    .pause-actions {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      flex: 0 0 auto;
    }

    .pause-button {
      min-height: 28px;
      padding: 4px 8px;
      font-size: 12px;
      line-height: 1;
      white-space: nowrap;
    }

    .button,
    .file-label {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      padding: 8px 12px;
      cursor: pointer;
      box-shadow: 0 1px 0 rgba(25, 24, 22, 0.04);
    }

    .button:hover,
    .file-label:hover {
      border-color: #aaa197;
    }

    .file-label input {
      display: none;
    }

    .status {
      width: 100%;
      min-height: 28px;
      margin: 0 0 14px;
      color: var(--muted);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, minmax(260px, 1fr));
      gap: 14px;
      align-items: start;
    }

    .board.is-done-focus {
      display: flex;
      gap: 10px;
      align-items: start;
    }

    .board.is-done-focus .folded-stack {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 10px;
      flex: 0 0 64px;
      width: 64px;
      min-width: 0;
    }

    .archive-board {
      position: fixed;
      inset: 0 auto 0 0;
      z-index: 6;
      pointer-events: none;
      isolation: isolate;
    }

    .archive-tab {
      pointer-events: auto;
      position: fixed;
      left: 0;
      top: 50%;
      width: var(--archive-tab-width);
      min-height: var(--archive-tab-height);
      border: 1px solid var(--line);
      border-left: 0;
      border-radius: 0 8px 8px 0;
      background: var(--panel);
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 6px;
      font-size: 13px;
      font-weight: 760;
      cursor: pointer;
      box-shadow: var(--shadow);
      transform: translateY(-50%);
      writing-mode: vertical-rl;
      text-orientation: mixed;
      z-index: 9;
    }

    .archive-tab:hover {
      border-color: #aaa197;
      background: #fbfaf7;
    }

    .archive-tab .count {
      color: #ffffff;
      writing-mode: horizontal-tb;
    }

    .archive-tab .dot {
      --lane-color: var(--archived);
    }

    .archive-tray {
      pointer-events: auto;
      position: fixed;
      left: 0;
      top: 0;
      height: 100vh;
      width: min(980px, calc(100vw - var(--archive-tab-width)));
      background: rgba(246, 244, 239, 0.96);
      transform: translateX(calc(-100% - 8px));
      transition: transform 220ms ease;
      z-index: 7;
      overflow: hidden;
      display: block;
      align-items: stretch;
      padding: 16px 16px 16px calc(var(--archive-tab-width) + 12px);
      box-sizing: border-box;
      box-shadow: 18px 0 42px rgba(25, 24, 22, 0.16);
    }

    .archive-tray > .lane {
      height: calc(100vh - 32px);
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: rgba(255, 255, 255, 0.78);
    }

    .archive-tray .lane-body {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      padding-right: 6px;
    }

    .archive-tray .lane-body .field,
    .archive-tray .lane-body .summary,
    .archive-tray .lane-body .chips {
      max-width: 100%;
      overflow-wrap: anywhere;
    }

    .archive-tray .lane-body .ticket {
      min-width: 0;
    }

    .archive-tray .lane-actions {
      justify-content: flex-end;
      gap: 6px;
      flex-wrap: nowrap;
    }

    .archive-close {
      margin-left: auto;
    }

    .archive-board.is-open .archive-tray {
      transform: translateX(0);
    }

    .workflow-board {
      position: fixed;
      inset: 0 auto 0 0;
      z-index: 8;
      pointer-events: none;
      isolation: isolate;
    }

    .workflow-tab {
      pointer-events: auto;
      position: fixed;
      left: 0;
      top: calc(50% - 158px);
      width: var(--workflow-tab-width);
      min-height: var(--workflow-tab-height);
      border: 1px solid var(--line);
      border-left: 0;
      border-radius: 0 8px 8px 0;
      background: var(--panel);
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 6px;
      font-size: 13px;
      font-weight: 760;
      cursor: pointer;
      box-shadow: var(--shadow);
      transform: translateY(-50%);
      writing-mode: vertical-rl;
      text-orientation: mixed;
      z-index: 11;
    }

    .workflow-tab:hover {
      border-color: #aaa197;
      background: #fbfaf7;
    }

    .workflow-tab .dot {
      --lane-color: var(--workflow);
    }

    .workflow-tray {
      pointer-events: auto;
      position: fixed;
      left: 0;
      top: 0;
      height: 100vh;
      width: min(1040px, calc(100vw - var(--workflow-tab-width)));
      background: rgba(246, 244, 239, 0.98);
      transform: translateX(calc(-100% - 8px));
      transition: transform 220ms ease;
      z-index: 10;
      overflow: auto;
      padding: 18px 18px 18px calc(var(--workflow-tab-width) + 14px);
      box-sizing: border-box;
      box-shadow: 18px 0 42px rgba(25, 24, 22, 0.16);
    }

    .workflow-board.is-open .workflow-tray {
      transform: translateX(0);
    }

    .settings-board {
      position: fixed;
      inset: auto auto 0 0;
      z-index: 12;
      pointer-events: none;
      isolation: isolate;
    }

    .settings-tab {
      pointer-events: auto;
      position: fixed;
      left: 0;
      bottom: 22px;
      width: var(--settings-tab-width);
      min-height: var(--settings-tab-height);
      border: 1px solid var(--line);
      border-left: 0;
      border-radius: 0 8px 8px 0;
      background: var(--panel);
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 6px;
      font-size: 13px;
      font-weight: 760;
      cursor: pointer;
      box-shadow: var(--shadow);
      writing-mode: vertical-rl;
      text-orientation: mixed;
      z-index: 15;
    }

    .settings-tab:hover {
      border-color: #aaa197;
      background: #fbfaf7;
    }

    .settings-tab .dot {
      --lane-color: var(--todo);
    }

    .settings-tray {
      pointer-events: auto;
      position: fixed;
      left: 0;
      bottom: 0;
      width: min(460px, calc(100vw - var(--settings-tab-width)));
      max-height: min(72vh, 520px);
      background: rgba(246, 244, 239, 0.98);
      transform: translateX(calc(-100% - 8px));
      transition: transform 220ms ease;
      z-index: 14;
      overflow: auto;
      padding: 16px 16px 16px calc(var(--settings-tab-width) + 14px);
      box-sizing: border-box;
      box-shadow: 18px 0 42px rgba(25, 24, 22, 0.16);
    }

    .settings-board.is-open .settings-tray {
      transform: translateX(0);
    }

    .settings-panel {
      border: 1px solid var(--line);
      border-top: 5px solid var(--todo);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: var(--shadow);
      padding: 14px;
      min-width: 0;
    }

    .settings-panel-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .settings-panel h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .settings-fields {
      display: grid;
      gap: 12px;
    }

    .settings-field {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .settings-field label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
      text-transform: uppercase;
    }

    .settings-command-input {
      width: 100%;
      min-height: 38px;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      padding: 8px 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
      line-height: 1.3;
    }

    .settings-command-input:focus {
      border-color: color-mix(in srgb, var(--todo) 58%, var(--line));
      outline: none;
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--todo) 14%, transparent);
    }

    .settings-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .settings-save-button,
    .settings-health-button {
      min-height: 34px;
      border: 1px solid color-mix(in srgb, var(--todo) 44%, var(--line));
      border-radius: 8px;
      background: color-mix(in srgb, var(--todo) 12%, #ffffff);
      color: color-mix(in srgb, var(--todo) 82%, #191816);
      padding: 7px 12px;
      cursor: pointer;
      font-weight: 760;
    }

    .settings-save-button:hover,
    .settings-save-button:focus-visible,
    .settings-health-button:hover,
    .settings-health-button:focus-visible {
      border-color: color-mix(in srgb, var(--todo) 62%, var(--line));
      background: color-mix(in srgb, var(--todo) 20%, #ffffff);
      outline: none;
    }

    .settings-save-button:disabled,
    .settings-health-button:disabled {
      cursor: progress;
      opacity: 0.62;
    }

    .workflow-panel {
      min-height: calc(100vh - 36px);
      border: 1px solid var(--line);
      border-top: 5px solid var(--workflow);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .workflow-panel-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .workflow-panel h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .workflow-panel p {
      margin: 6px 0 0;
      color: var(--muted);
    }

    .workflow-graph {
      display: grid;
      gap: 14px;
      margin-top: 12px;
    }

    .workflow-state-line {
      display: grid;
      grid-template-columns: minmax(220px, 300px) minmax(0, 1fr);
      gap: 12px;
      align-items: start;
    }

    .workflow-state-stack {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 0;
    }

    .workflow-state {
      border: 1px solid var(--line);
      border-left: 5px solid var(--node-color);
      border-radius: 8px;
      background: var(--panel);
      padding: 11px 12px;
      min-width: 0;
      min-height: 98px;
      display: grid;
      align-content: space-between;
      gap: 10px;
      color: var(--ink);
      text-align: left;
      cursor: pointer;
      appearance: none;
      font: inherit;
      width: 100%;
      box-shadow: 0 1px 0 rgba(25, 24, 22, 0.04);
      transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    .workflow-state:hover,
    .workflow-state:focus-visible,
    .workflow-branch:hover,
    .workflow-branch:focus-visible {
      border-color: #aaa197;
      box-shadow: 0 10px 22px rgba(25, 24, 22, 0.1);
      outline: none;
      transform: translateY(-1px);
    }

    .workflow-state-kicker {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 760;
      text-transform: uppercase;
    }

    .workflow-state-link {
      width: 2px;
      height: 28px;
      background: var(--line);
      margin: 0 auto;
      position: relative;
    }

    .workflow-state-link::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -1px;
      width: 8px;
      height: 8px;
      border-right: 2px solid var(--line);
      border-bottom: 2px solid var(--line);
      transform: translateX(-50%) rotate(45deg);
      background: var(--page);
    }

    .workflow-state-title {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      font-weight: 760;
    }

    .workflow-state-title span:first-child {
      overflow-wrap: anywhere;
    }

    .workflow-state-count {
      flex: 0 0 auto;
    }

    .workflow-state-meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .workflow-state.has-human-input {
      border-left-width: 5px;
      box-shadow: 0 1px 0 rgba(25, 24, 22, 0.04), inset 0 0 0 1px rgba(71, 111, 143, 0.18);
    }

    .workflow-human-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      align-self: start;
      margin-top: 2px;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(71, 111, 143, 0.14);
      color: var(--node-color, #476f8f);
      font-size: 10.5px;
      font-weight: 760;
      letter-spacing: 0.01em;
      text-transform: uppercase;
    }

    /* Planner chat dock */
    .planner-chat-dock {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: min(420px, 92vw);
      background: var(--panel);
      border-left: 1px solid var(--line);
      box-shadow: -14px 0 40px rgba(25, 24, 22, 0.18);
      display: flex;
      flex-direction: column;
      transform: translateX(105%);
      transition: transform 220ms ease;
      z-index: 1200;
    }

    .planner-chat-dock.is-open {
      transform: translateX(0);
    }

    .planner-chat-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      border-top: 5px solid var(--workflow);
    }

    .planner-chat-header h3 {
      margin: 0;
      font-size: 15px;
      font-weight: 800;
      flex: 1 1 auto;
    }

    .planner-chat-header .planner-chat-sub {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: none;
    }

    .planner-chat-tool {
      font: inherit;
      font-size: 12px;
      padding: 4px 6px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--page);
      color: var(--ink);
    }

    .planner-chat-iconbtn {
      appearance: none;
      border: 1px solid var(--line);
      background: var(--page);
      color: var(--ink);
      border-radius: 6px;
      width: 28px;
      height: 28px;
      cursor: pointer;
      font-size: 15px;
      line-height: 1;
    }

    .planner-chat-iconbtn:hover { border-color: #aaa197; }

    .planner-chat-body {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .planner-chat-empty {
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      margin: auto 0;
      padding: 24px 8px;
    }

    .planner-msg {
      max-width: 92%;
      padding: 9px 12px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.45;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .planner-msg.owner {
      align-self: flex-end;
      background: var(--workflow);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .planner-msg.planner {
      align-self: flex-start;
      background: var(--page);
      border: 1px solid var(--line);
      border-bottom-left-radius: 4px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
    }

    .planner-msg .planner-msg-meta {
      display: block;
      margin-bottom: 4px;
      font-size: 10.5px;
      font-weight: 760;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      opacity: 0.75;
      font-family: var(--app-font, inherit);
    }

    .planner-msg .planner-msg-status {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .planner-msg .planner-msg-status.running::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #c98a3d;
      animation: planner-pulse 1s ease-in-out infinite;
    }

    @keyframes planner-pulse {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 1; }
    }

    .planner-chat-footer {
      border-top: 1px solid var(--line);
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .planner-chat-input {
      width: 100%;
      resize: vertical;
      min-height: 64px;
      max-height: 200px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      font: inherit;
      font-size: 13px;
      background: var(--page);
      color: var(--ink);
      box-sizing: border-box;
    }

    .planner-chat-send {
      align-self: flex-end;
      appearance: none;
      border: none;
      background: var(--workflow);
      color: #fff;
      font: inherit;
      font-weight: 760;
      padding: 8px 18px;
      border-radius: 8px;
      cursor: pointer;
    }

    .planner-chat-send:disabled { opacity: 0.5; cursor: default; }

    .planner-chat-hint {
      font-size: 11px;
      color: var(--muted);
    }

    .wf-graph-canvas {
      display: grid;
      gap: 0;
      width: 100%;

    .workflow-detail-section {

    .lane {

      background: rgba(255, 255, 255, 0.62);

      border-radius: 8px;

    }

    .ticket-reviewing-active {
      --ticket-accent: #7f6cae;
    }

    .ticket.is-collapsed {
      padding: 10px 12px;
    }

    .ticket-title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      min-width: 0;
    }

    .ticket-main {
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 6px;
    }

    .ticket-title-actions {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      flex: 0 0 auto;
      max-width: 100%;
    }

    .ticket-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
      min-width: 0;
    }

    .ticket-id {
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .priority {
      flex: 0 0 auto;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 760;
      text-transform: uppercase;
      color: #ffffff;
      background: #5f6872;
    }

    .priority.high {
      background: #a43f37;
    }

    .priority.low {
      background: #58736b;
    }

    .ticket h2 {
      margin: 0;
      font-size: 14px;
      line-height: 1.25;
      letter-spacing: 0;
      overflow-wrap: anywhere;
      min-width: 0;
      flex: 1 1 auto;
      word-break: break-word;
    }

    .ticket-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      min-width: 0;
    }

    .redo-badge {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 8px;
      background: #f5f5f1;
      color: #444038;
      font-size: 11px;
      font-weight: 760;
      white-space: nowrap;
    }

    .status-badge {
      border: 1px solid color-mix(in srgb, var(--ticket-accent, var(--lane-color)) 46%, var(--line));
      border-radius: 999px;
      padding: 2px 8px;
      background: color-mix(in srgb, var(--ticket-accent, var(--lane-color)) 12%, #ffffff);
      color: color-mix(in srgb, var(--ticket-accent, var(--lane-color)) 84%, #191816);
      font-size: 11px;
      font-weight: 760;
      white-space: nowrap;
    }

    .owner-badge {
      border: 1px solid color-mix(in srgb, var(--lane-color) 46%, var(--line));
      border-radius: 999px;
      padding: 2px 8px;
      background: color-mix(in srgb, var(--lane-color) 10%, #ffffff);
      color: color-mix(in srgb, var(--lane-color) 82%, #191816);
      font-size: 11px;
      font-weight: 760;
      white-space: normal;
      overflow-wrap: anywhere;
    }

    .done-status-badge {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 760;
      white-space: nowrap;
    }

    .done-status-badge.success {
      border-color: #b8d1c3;
      background: #edf8f1;
      color: #276044;
    }

    .done-status-badge.failed {
      border-color: #e1b4ad;
      background: #fff0ed;
      color: #94382f;
    }

    .ticket-details {
      margin-top: 8px;
      min-width: 0;
    }

    .ticket-details[hidden] {
      display: none;
    }

    .done-feedback {
      display: grid;
      gap: 8px;
      margin: 0 0 10px;
      padding: 10px;
      border: 1px solid #d7c7ab;
      border-radius: 8px;
      background: #fff9ed;
      min-width: 0;
      max-width: 100%;
    }

    .done-feedback label {
      font-size: 12px;
      font-weight: 760;
      color: #665333;
      text-transform: uppercase;
    }

    .done-feedback textarea {
      width: 100%;
      min-width: 0;
      max-width: 100%;
      min-height: 72px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      background: #ffffff;
      color: var(--ink);
    }

    .done-feedback-actions {
      display: flex;
      justify-content: flex-end;
    }

    .owner-feedback {
      display: grid;
      gap: 6px;
      margin: 0 0 10px;
      padding: 10px;
      border: 1px solid #d7c7ab;
      border-radius: 8px;
      background: #fff9ed;
      min-width: 0;
      max-width: 100%;
    }

    .owner-feedback-label {
      font-size: 12px;
      font-weight: 760;
      color: #665333;
      text-transform: uppercase;
    }

    .owner-feedback p {
      margin: 0;
      color: #37332e;
      min-width: 0;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .owner-feedback-meta {
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .failure-brief {
      display: grid;
      gap: 8px;
      margin: 0 0 10px;
      padding: 10px;
      border: 1px solid #e1b4ad;
      border-radius: 8px;
      background: #fff4f1;
      min-width: 0;
      max-width: 100%;
    }

    .failure-brief-label {
      font-size: 12px;
      font-weight: 760;
      color: #94382f;
      text-transform: uppercase;
    }

    .failure-brief-grid {
      display: grid;
      gap: 8px;
    }

    .failure-brief-item strong {
      display: block;
      margin-bottom: 2px;
      color: #6f302a;
      font-size: 12px;
      text-transform: uppercase;
    }

    .failure-brief-item p {
      margin: 0;
      color: #37332e;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .ticket-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
    }

    .text-button {
      min-height: 32px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fbfaf7;
      color: var(--ink);
      padding: 6px 10px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 760;
      white-space: nowrap;
    }

    .text-button:hover {
      border-color: #aaa197;
    }

    .summary {
      margin: 0 0 10px;
      color: #37332e;
      min-width: 0;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
      min-width: 0;
    }

    .chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 8px;
      background: #fbfaf7;
      color: #3d3934;
      font-size: 12px;
      overflow-wrap: anywhere;
      min-width: 0;
      max-width: 100%;
    }

    .field {
      margin-top: 9px;
      min-width: 0;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .field strong {
      display: block;
      margin-bottom: 4px;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .inspection-targets a {
      color: #245f89;
      font-weight: 700;
      text-decoration-thickness: 1px;
      text-underline-offset: 2px;
      overflow-wrap: anywhere;
    }

    .inspection-target-meta {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    ul {
      margin: 0;
      padding-left: 18px;
      min-width: 0;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    li {
      min-width: 0;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    li + li {
      margin-top: 3px;
    }

    code {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .todo {
      --lane-color: var(--todo);
    }

    .claimed {
      --lane-color: var(--claimed);
    }

    .review {
      --lane-color: var(--review);
    }

    .reviewing {
      --lane-color: #7f6cae;
    }

    .done {
      --lane-color: var(--done);
    }

    .archived {
      --lane-color: var(--archived);
    }

    @media (max-width: 1280px) {
      .board {
        grid-template-columns: repeat(3, minmax(240px, 1fr));
      }
    }

    @media (max-width: 1120px) {
      .board {
        grid-template-columns: repeat(2, minmax(260px, 1fr));
      }
    }

    @media (max-width: 680px) {
      :root {
        --side-tab-gutter: 54px;
        --shell-edge-gap: 10px;
      }

      .shell {
        width: calc(var(--viewport-client-width) - var(--side-tab-gutter) - var(--shell-edge-gap));
        margin-left: var(--side-tab-gutter);
        margin-right: var(--shell-edge-gap);
        padding-top: 16px;
        padding-bottom: 68px;
      }

      .topbar {
        display: block;
      }

      .toolbar {
        justify-content: flex-start;
        margin-top: 14px;
      }

      .pause-control {
        width: 100%;
        justify-content: flex-start;
      }

      .pause-state {
        flex: 1 1 160px;
        flex-wrap: wrap;
      }

      .board {
        grid-template-columns: 1fr;
      }

      .board.is-done-focus {
        grid-template-columns: 1fr;
      }

      .board.is-done-focus .lane:not(.done) {
        display: none;
      }

      .archive-tab {
        left: 10px;
        right: 10px;
      }

      .archive-tray {
        padding-left: 10px;
        padding-right: 10px;
      }

      .workflow-tab {
        top: calc(50% - 148px);
      }

      .settings-tab {
        bottom: 16px;
      }

      .workflow-tray {
        padding-left: 10px;
        padding-right: 10px;
      }

      .settings-tray {
        width: calc(100vw - 10px);
        max-height: 76vh;
        padding-left: 10px;
        padding-right: 10px;
        padding-bottom: calc(16px + var(--settings-tab-height));
      }

      .workflow-state-line,
      .workflow-state-stack,
      .wf-graph-row,
      .workflow-detail-grid {
        grid-template-columns: 1fr;
        width: 100%;
      }

      .wf-graph-edge-block {
        height: 44px;
      }

      .wf-graph-edge-label-text {
        font-size: 9px;
      }

      .workflow-stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <h1 id="boardName">Project Task Board</h1>
        <div class="meta">
          <span id="updatedAt">Updated: unknown</span>
          <span id="sourceName">Source: board.json</span>
        </div>
      </div>
      <div class="toolbar">
        <div class="pause-control" id="pauseControl" aria-live="polite">
          <div class="pause-state">
            <span class="pause-indicator" aria-hidden="true"></span>
            <span class="pause-label">Pause status loading</span>
          </div>
        </div>
        <button class="button" type="button" id="reloadButton">Reload JSON</button>
        <button class="button" type="button" id="autoRefreshButton" aria-pressed="false">Auto refresh: Off</button>
        <label class="file-label">
          Load JSON file
          <input type="file" id="fileInput" accept="application/json,.json">
        </label>
      </div>
    </header>

    <p class="status" id="status"></p>

    <section class="board" id="board" aria-label="Agent task board"></section>
    <section class="workflow-board" id="workflowBoard" aria-label="Workflow graph"></section>
    <section class="archive-board" id="archiveBoard" aria-label="Archived task board"></section>
    <section class="settings-board" id="settingsBoard" aria-label="Settings"></section>
  </main>

  <script>
    const visualColumns = [
      { key: "todo", label: "To Do", sourceKeys: ["claimed", "todo"], agentRole: "worker", agentLabel: "Workers" },
      { key: "review", label: "Review", sourceKeys: ["reviewing", "review"], agentRole: "review", agentLabel: "Reviewers" },
      { key: "done", label: "Done", sourceKeys: ["done"] }
    ];

    const fallbackBoard = {
      boardName: "Project Task Board",
      updatedAt: "",
      columns: {
        todo: [],
        claimed: [],
        review: [],
        reviewing: [],
        done: [],
        archived: []
      }
    };
    const fallbackAgents = {
      updatedAt: "",
      agents: [],
      activeAgents: [],
      pendingSpawns: []
    };
    const fallbackDispatchSettings = {
      commands: {
        claude: "claude",
        codex: "codex",
        qwen: "qwen"
      },
      worker: {
        enabled: false,
        model: "codex",
        maxAgents: 1
      },
      review: {
        enabled: false,
        model: "codex",
        maxAgents: 1
      },
      pause: {
        pausedUntil: "",
        pausedBy: "",
        pausedAt: "",
        pauseReason: ""
      },
      pendingSpawns: []
    };
    const fallbackPauseStatus = {
      isPaused: false,
      pausedUntil: "",
      pausedBy: "",
      pausedAt: "",
      pauseReason: "",
      remainingSeconds: 0,
      remainingText: "0s",
      message: ""
    };
    const fallbackAgentSchema = {
      modelBackground: {
        claude: { label: "Claude", background: "#f4a86b", text: "#3b1f08" },
        codex: { label: "Codex", background: "#7eb1d6", text: "#0d2538" },
        qwen: { label: "Qwen", background: "#a78bfa", text: "#1e0d3a" },
        unknown: { label: "Unknown model", background: "#e3ddd2", text: "#191816" }
      },
      roleBorder: {
        planning: { label: "Planner", border: "#c98a3d" },
        worker: { label: "Worker", border: "#3f6f8f" },
        review: { label: "Reviewer", border: "#6f5aa8" },
        unknown: { label: "Unknown role", border: "#69645d" }
      },
      personalNamePool: []
    };
    let currentAgentSchema = fallbackAgentSchema;

    const boardEl = document.getElementById("board");
    const workflowEl = document.getElementById("workflowBoard");
    const archiveEl = document.getElementById("archiveBoard");
    const settingsEl = document.getElementById("settingsBoard");
    const statusEl = document.getElementById("status");
    const boardNameEl = document.getElementById("boardName");
    const updatedAtEl = document.getElementById("updatedAt");
    const sourceNameEl = document.getElementById("sourceName");
    const pauseControlEl = document.getElementById("pauseControl");
    const reloadButton = document.getElementById("reloadButton");
    const autoRefreshButton = document.getElementById("autoRefreshButton");
    const fileInput = document.getElementById("fileInput");
    const collapsedTasks = new Set();
    let workflowPanelOpen = false;
    let workflowDetailKey = "";
    let archiveTrayOpen = false;
    let doneFocusOpen = false;
    let settingsPanelOpen = false;
    let currentBoard = fallbackBoard;
    let currentSourceLabel = "fallback";
    let currentAgents = fallbackAgents;
    let currentDispatchSettings = fallbackDispatchSettings;
    let currentPauseStatus = fallbackPauseStatus;
    let autoRefreshTimer = null;
    let autoRefreshInFlight = false;
    let agentLogRefreshTimer = null;
    let agentLogRefreshInFlight = false;
    let pauseCountdownTimer = null;
    let pauseActionInFlight = false;
    let pinnedAgentRunKey = "";

    function syncViewportClientWidth() {
      document.documentElement.style.setProperty(
        "--viewport-client-width",
        `${document.documentElement.clientWidth || window.innerWidth}px`
      );
    }

    function escapeText(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function listItems(items, formatter = escapeText) {
      if (!Array.isArray(items) || items.length === 0) return "";
      return `<ul>${items.map((item) => `<li>${formatter(item)}</li>`).join("")}</ul>`;
    }

    function renderFiles(files) {
      return listItems(files, (file) => `<code>${escapeText(file)}</code>`);
    }

    function renderInspectionTargets(targets) {
      if (!Array.isArray(targets) || targets.length === 0) return "";
      const items = targets.map((target) => {
        if (!target || typeof target !== "object") {
          return `<li>${escapeText(target)}</li>`;
        }

        const url = String(target.url || target.href || "").trim();
        const path = String(target.path || "").trim();
        const label = String(target.label || target.title || url || path || "Inspection target").trim();
        const primary = url
          ? `<a href="${escapeText(url)}" target="_blank" rel="noopener noreferrer">${escapeText(label)}</a>`
          : `<span>${escapeText(label)}</span>`;
        const detailParts = [
          path ? `Path: ${path}` : "",
          target.viewport ? `Viewport: ${target.viewport}` : "",
          target.state ? `State: ${target.state}` : "",
          target.notes ? `Notes: ${target.notes}` : ""
        ].filter(Boolean);
        const meta = detailParts.length
          ? `<span class="inspection-target-meta">${escapeText(detailParts.join(" | "))}</span>`
          : "";

        return `<li>${primary}${meta}</li>`;
      });
      return `<ul class="inspection-targets">${items.join("")}</ul>`;
    }

    function field(label, content) {
      if (!content) return "";
      return `<div class="field"><strong>${escapeText(label)}</strong>${content}</div>`;
    }

    function taskKey(task) {
      return String(task.id || `${task.project || "task"}-${task.title || "missing-title"}-${task.createdAt || ""}`);
    }

    function hasRenderableTitle(task) {
      if (!task || typeof task !== "object") return false;
      const title = String(task.title || "").trim();
      return Boolean(title && !title.toLowerCase().startsWith("untitled"));
    }

    function timestampValue(task) {
      const fields = ["archivedAt", "doneAt", "reviewedAt", "reviewRequestedAt", "claimedAt", "createdAt"];
      for (const fieldName of fields) {
        const value = Date.parse(task[fieldName] || "");
        if (!Number.isNaN(value)) return value;
      }
      return 0;
    }

    function columnTasks(tasks, columnKey) {
      const safeTasks = Array.isArray(tasks) ? [...tasks] : [];
      if (columnKey !== "done" && columnKey !== "archived") return safeTasks;
      return safeTasks.sort((a, b) => timestampValue(b) - timestampValue(a));
    }

    function decoratedColumnTasks(tasks, sourceColumnKey) {
      return columnTasks(tasks, sourceColumnKey).map((task) => ({
        ...task,
        __sourceColumn: sourceColumnKey
      }));
    }

    function visualColumnTasks(board, visualColumn) {
      const normalizedColumns = board?.columns || {};
      return visualColumn.sourceKeys.flatMap((sourceColumnKey) =>
        decoratedColumnTasks(normalizedColumns[sourceColumnKey], sourceColumnKey)
      );
    }

    function activeAgentsForRole(role) {
      return activeAgentsForRoleFromState(currentAgents, role);
    }

    function activeAgentsForRoleFromState(agentsState, role) {
      const agents = Array.isArray(agentsState?.activeAgents)
        ? agentsState.activeAgents
        : Array.isArray(agentsState?.agents)
          ? agentsState.agents.filter((agent) => agent?.status === "active")
          : [];
      return agents.filter((agent) => String(agent.role || "").toLowerCase() === role);
    }

    function isLivePendingSpawn(spawn) {
      const status = String(spawn?.status || "").toLowerCase();
      const processState = String(spawn?.processStatus?.state || "").toLowerCase();
      const terminalStates = ["exited", "pid-reused", "unknown", "missing-pid"];
      if (terminalStates.some((state) => status.includes(state) || processState === state)) {
        return false;
      }
      if (status.includes("running") || processState === "running") {
        return true;
      }
      return !status && !processState;
    }

    function pendingSpawnsForRole(role) {
      return pendingSpawnsForRoleFromState(currentAgents, role);
    }

    function pendingSpawnsForRoleFromState(agentsState, role) {
      const pending = Array.isArray(agentsState?.pendingSpawns)
        ? agentsState.pendingSpawns
        : Array.isArray(currentDispatchSettings.pendingSpawns)
          ? currentDispatchSettings.pendingSpawns
          : [];
      return pending.filter((spawn) =>
        String(spawn.role || "").toLowerCase() === role && isLivePendingSpawn(spawn)
      );
    }

    function shortTime(value) {
      const parsed = Date.parse(value || "");
      if (Number.isNaN(parsed)) return "";
      return new Date(parsed).toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
    }

    function formatDuration(seconds) {
      const totalSeconds = Math.max(0, Math.ceil(Number(seconds) || 0));
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const remainingSeconds = totalSeconds % 60;
      if (hours > 0) return `${hours}h ${minutes}m ${remainingSeconds}s`;
      if (minutes > 0) return `${minutes}m ${remainingSeconds}s`;
      return `${remainingSeconds}s`;
    }

    function remainingPauseSeconds(status) {
      const pausedUntil = String(status?.pausedUntil || "").trim();
      const parsedUntil = Date.parse(pausedUntil);
      if (!Number.isNaN(parsedUntil)) {
        return Math.max(0, Math.ceil((parsedUntil - Date.now()) / 1000));
      }
      const parsedRemaining = Number.parseInt(status?.remainingSeconds, 10);
      return Number.isNaN(parsedRemaining) ? 0 : Math.max(0, parsedRemaining);
    }

    function normalizePauseStatus(status) {
      const source = status && typeof status === "object" ? status : {};
      const remainingSeconds = remainingPauseSeconds(source);
      const isPaused = Boolean(source.isPaused || source.pausedUntil) && remainingSeconds > 0;
      return {
        ...fallbackPauseStatus,
        ...source,
        isPaused,
        pausedUntil: isPaused ? String(source.pausedUntil || "").trim() : "",
        pausedBy: isPaused ? String(source.pausedBy || "").trim() : "",
        pausedAt: isPaused ? String(source.pausedAt || "").trim() : "",
        pauseReason: isPaused ? String(source.pauseReason || "").trim() : "",
        remainingSeconds: isPaused ? remainingSeconds : 0,
        remainingText: isPaused ? formatDuration(remainingSeconds) : "0s",
        message: String(source.message || "").trim()
      };
    }

    function pauseUntilText(status) {
      if (!status?.pausedUntil) return "";
      const timeText = shortTime(status.pausedUntil);
      return timeText ? `Until ${timeText}` : `Until ${status.pausedUntil}`;
    }

    function pausedControlMessage(prefix = "Task board paused") {
      const untilText = pauseUntilText(currentPauseStatus);
      const countdown = currentPauseStatus?.remainingText || "";
      return [prefix, untilText, countdown].filter(Boolean).join(" | ");
    }

    function clearPauseCountdownTimer() {
      if (!pauseCountdownTimer) return;
      window.clearInterval(pauseCountdownTimer);
      pauseCountdownTimer = null;
    }

    function updatePauseCountdownText() {
      if (!currentPauseStatus.isPaused) return;
      const remainingSeconds = remainingPauseSeconds(currentPauseStatus);
      if (remainingSeconds <= 0) {
        clearPauseCountdownTimer();
        refreshPauseStatus({ silent: true }).catch(() => {
          currentPauseStatus = normalizePauseStatus({ isPaused: false });
          renderPauseControl();
          renderBoard(currentBoard, currentSourceLabel);
        });
        return;
      }
      currentPauseStatus = normalizePauseStatus({
        ...currentPauseStatus,
        remainingSeconds
      });
      const countdownEl = pauseControlEl.querySelector("[data-pause-countdown]");
      if (countdownEl) {
        countdownEl.textContent = currentPauseStatus.remainingText;
      }
    }

    function renderPauseControl(status = currentPauseStatus) {
      currentPauseStatus = normalizePauseStatus(status);
      const paused = currentPauseStatus.isPaused;
      const untilText = pauseUntilText(currentPauseStatus);
      const pauseButtonDisabled = pauseActionInFlight ? "disabled" : "";
      const resumeButton = paused
        ? `<button class="button pause-button" type="button" data-pause-action="resume" ${pauseButtonDisabled}>Resume now</button>`
        : "";
      pauseControlEl.classList.toggle("is-paused", paused);
      pauseControlEl.innerHTML = `
        <div class="pause-state">
          <span class="pause-indicator" aria-hidden="true"></span>
          <span class="pause-label">${paused ? "Paused" : "Not paused"}</span>
          ${paused && untilText ? `<span class="pause-until">${escapeText(untilText)}</span>` : ""}
          ${paused ? `<span class="pause-countdown" data-pause-countdown>${escapeText(currentPauseStatus.remainingText)}</span>` : ""}
        </div>
        <div class="pause-actions">
          <button class="button pause-button" type="button" data-pause-action="pause" ${pauseButtonDisabled}>Pause +1h</button>
          ${resumeButton}
        </div>
      `;
      clearPauseCountdownTimer();
      if (paused) {
        pauseCountdownTimer = window.setInterval(updatePauseCountdownText, 1000);
      }
    }

    function agentSchemaModel(model) {
      const lookup = currentAgentSchema?.modelBackground || {};
      return lookup[model] || lookup.unknown || fallbackAgentSchema.modelBackground.unknown;
    }

    function agentSchemaRole(role) {
      const lookup = currentAgentSchema?.roleBorder || {};
      return lookup[role] || lookup.unknown || fallbackAgentSchema.roleBorder.unknown;
    }

    function agentChipMarkup(agent) {
      const personalName = String(agent?.personalName || agent?.agentName || "Unnamed").trim();
      const model = String(agent?.model || "unknown").toLowerCase();
      const role = String(agent?.role || "unknown").toLowerCase();
      const modelSchema = agentSchemaModel(model);
      const roleSchema = agentSchemaRole(role);
      const titleParts = [
        `${personalName}`,
        `Role: ${roleSchema.label || role}`,
        `Model: ${modelSchema.label || model}`,
        agent?.currentTaskId ? `Task: ${agent.currentTaskId}` : "",
        agent?.lastHeartbeatAt ? `Seen: ${shortTime(agent.lastHeartbeatAt) || agent.lastHeartbeatAt}` : "",
        agent?.agentId ? `Id: ${agent.agentId}` : ""
      ].filter(Boolean).join(" — ");
      const styleParts = [
        `--chip-bg:${modelSchema.background || "#ffffff"}`,
        `--chip-text:${modelSchema.text || "#191816"}`,
        `--chip-border:${roleSchema.border || "#69645d"}`
      ].join(";");
      const unknownClass = (model === "unknown" || role === "unknown") ? " agent-chip-unknown" : "";
      return `<span class="agent-chip${unknownClass}" style="${styleParts}" title="${escapeText(titleParts)}">${escapeText(personalName)}</span>`;
    }

    function agentRunLogText(entry) {
      const latestLog = entry?.latestLog && typeof entry.latestLog === "object" ? entry.latestLog : {};
      const preview = String(latestLog.preview || "").trim();
      if (preview) return preview;
      const notes = String(entry?.notes || "").trim();
      if (notes) return notes;
      return "No log output recorded yet.";
    }

    function agentRunKey(entry, state) {
      const role = String(entry?.role || "").trim().toLowerCase();
      const model = String(entry?.model || "").trim().toLowerCase();
      const name = String(entry?.personalName || entry?.agentName || "agent").trim().toLowerCase();
      const stableId = state === "pending"
        ? String(entry?.processId || entry?.logPath || entry?.spawnedAt || "").trim()
        : String(entry?.agentId || entry?.currentTaskId || "").trim();
      return [state, role, model, name, stableId].join("|");
    }

    function agentRunEntriesForState(agentsState) {
      return ["worker", "review"].flatMap((role) => [
        ...activeAgentsForRoleFromState(agentsState, role).map((entry) => ({
          entry,
          state: "registered",
          key: agentRunKey(entry, "registered"),
        })),
        ...pendingSpawnsForRoleFromState(agentsState, role).map((entry) => ({
          entry,
          state: "pending",
          key: agentRunKey(entry, "pending"),
        })),
      ]);
    }

    function agentRunSignature(agentsState) {
      return agentRunEntriesForState(agentsState)
        .map(({ entry, state, key }) => {
          const displayState = state === "pending"
            ? pendingSpawnDisplayState(entry)
            : { className: "is-registered", stateLabel: "registered live" };
          return [key, displayState.className, displayState.stateLabel].join(":");
        })
        .join("||");
    }

    function applyPinnedAgentRunState() {
      let foundPinned = false;
      document.querySelectorAll("[data-agent-run-key]").forEach((wrap) => {
        const key = wrap.getAttribute("data-agent-run-key") || "";
        const isPinned = Boolean(pinnedAgentRunKey && key === pinnedAgentRunKey);
        wrap.classList.toggle("is-pinned", isPinned);
        const button = wrap.querySelector(".agent-run-tab");
        if (button) {
          button.setAttribute("aria-expanded", isPinned ? "true" : "false");
        }
        if (isPinned) foundPinned = true;
      });
      if (pinnedAgentRunKey && !foundPinned) {
        pinnedAgentRunKey = "";
      }
    }

    function togglePinnedAgentRun(key) {
      pinnedAgentRunKey = pinnedAgentRunKey === key ? "" : key;
      applyPinnedAgentRunState();
    }

    function agentRunMeta(entry, stateLabel) {
      const latestLog = entry?.latestLog && typeof entry.latestLog === "object" ? entry.latestLog : {};
      const processStatus = entry?.processStatus && typeof entry.processStatus === "object" ? entry.processStatus : {};
      const parts = [
        `State: ${stateLabel}`,
        entry?.model ? `Model: ${entry.model}` : "",
        entry?.currentTaskId ? `Task: ${entry.currentTaskId}` : "",
        entry?.processId ? `PID: ${entry.processId}` : "",
        processStatus.state ? `PID state: ${processStatus.state}` : "",
        processStatus.createdAt ? `PID started: ${shortTime(processStatus.createdAt) || processStatus.createdAt}` : "",
        processStatus.checkedAt ? `PID checked: ${shortTime(processStatus.checkedAt) || processStatus.checkedAt}` : "",
        entry?.lastHeartbeatAt ? `Seen: ${shortTime(entry.lastHeartbeatAt) || entry.lastHeartbeatAt}` : "",
        entry?.spawnedAt ? `Spawned: ${shortTime(entry.spawnedAt) || entry.spawnedAt}` : "",
        latestLog.updatedAt ? `Log: ${shortTime(latestLog.updatedAt) || latestLog.updatedAt}` : "",
        latestLog.fileName ? latestLog.fileName : "",
      ].filter(Boolean);
      return parts.join(" | ");
    }

    function pendingSpawnDisplayState(entry) {
      const status = String(entry?.status || "").toLowerCase();
      const processState = String(entry?.processStatus?.state || "").toLowerCase();
      if (status.includes("running") || processState === "running") {
        return { className: "is-running", stateLabel: "spawned running" };
      }
      if (status.includes("exited") || processState === "exited") {
        return { className: "is-exited", stateLabel: "spawned exited" };
      }
      if (status.includes("pid-reused") || processState === "pid-reused") {
        return { className: "is-reused", stateLabel: "spawned pid reused" };
      }
      if (status.includes("unknown") || processState === "unknown") {
        return { className: "is-unknown", stateLabel: "spawned unknown" };
      }
      return { className: "is-pending", stateLabel: "pending registration" };
    }

    function agentRunTabMarkup(entry, state) {
      const displayState = state === "pending"
        ? pendingSpawnDisplayState(entry)
        : { className: "is-registered", stateLabel: "registered live" };
      const stateLabel = displayState.stateLabel;
      const name = String(entry?.personalName || entry?.agentName || "agent").trim();
      const displayName = name || "agent";
      const meta = agentRunMeta(entry, stateLabel);
      const logText = agentRunLogText(entry);
      const key = agentRunKey(entry, state);
      const isPinned = pinnedAgentRunKey === key;
      const agentId = String(entry?.agentId || "").trim();
      const processId = String(entry?.processId || "").trim();
      const currentTaskId = String(entry?.currentTaskId || "").trim();
      return `
        <div class="agent-run-tab-wrap${isPinned ? " is-pinned" : ""}" data-agent-run-key="${escapeText(key)}" data-terminate-agent-id="${escapeText(agentId)}" data-terminate-process-id="${escapeText(processId)}" data-terminate-task-id="${escapeText(currentTaskId)}">
          <button class="agent-run-tab ${displayState.className}" type="button" aria-expanded="${isPinned ? "true" : "false"}" aria-label="${escapeText(displayName)} ${escapeText(stateLabel)} agent log">
            <span class="agent-run-dot" aria-hidden="true"></span>
            <span class="agent-run-name">${escapeText(displayName)}</span>
          </button>
          <div class="agent-run-popover" role="tooltip">
            <div class="agent-run-popover-title">${escapeText(displayName)}</div>
            <div class="agent-run-popover-meta">${escapeText(meta)}</div>
            <pre class="agent-run-log">${escapeText(logText)}</pre>
            <div class="agent-run-popover-actions">
              <button class="terminate-agent-button" type="button" data-terminate-agent title="Unclaim task and terminate agent process">Terminate</button>
            </div>
          </div>
        </div>
      `;
    }

    function updateAgentRunPopovers(agentsState) {
      const entriesByKey = new Map(
        agentRunEntriesForState(agentsState).map(({ entry, state, key }) => [key, { entry, state }])
      );
      document.querySelectorAll("[data-agent-run-key]").forEach((wrap) => {
        const key = wrap.getAttribute("data-agent-run-key") || "";
        const match = entriesByKey.get(key);
        if (!match) return;
        const { entry, state } = match;
        const displayState = state === "pending"
          ? pendingSpawnDisplayState(entry)
          : { className: "is-registered", stateLabel: "registered live" };
        const displayName = String(entry?.personalName || entry?.agentName || "agent").trim() || "agent";
        const button = wrap.querySelector(".agent-run-tab");
        const nameEl = wrap.querySelector(".agent-run-name");
        const titleEl = wrap.querySelector(".agent-run-popover-title");
        const metaEl = wrap.querySelector(".agent-run-popover-meta");
        const logEl = wrap.querySelector(".agent-run-log");
        if (button) {
          button.className = `agent-run-tab ${displayState.className}`;
          button.setAttribute("aria-label", `${displayName} ${displayState.stateLabel} agent log`);
          button.setAttribute("aria-expanded", key === pinnedAgentRunKey ? "true" : "false");
        }
        if (nameEl) nameEl.textContent = displayName;
        if (titleEl) titleEl.textContent = displayName;
        if (metaEl) metaEl.textContent = agentRunMeta(entry, displayState.stateLabel);
        if (logEl) logEl.textContent = agentRunLogText(entry);
        wrap.setAttribute("data-terminate-agent-id", String(entry?.agentId || "").trim());
        wrap.setAttribute("data-terminate-process-id", String(entry?.processId || "").trim());
        wrap.setAttribute("data-terminate-task-id", String(entry?.currentTaskId || "").trim());
      });
      applyPinnedAgentRunState();
    }

    function laneAgentStripMarkup(role) {
      if (!role) {
        return `<div class="lane-agent-strip is-blank" aria-hidden="true"></div>`;
      }
      const registeredTabs = activeAgentsForRole(role).map((agent) => agentRunTabMarkup(agent, "registered"));
      const pendingTabs = pendingSpawnsForRole(role).map((spawn) => agentRunTabMarkup(spawn, "pending"));
      const tabs = [...registeredTabs, ...pendingTabs];
      if (!tabs.length) {
        return `<div class="lane-agent-strip is-blank" aria-label="No active or pending agents"></div>`;
      }
      return `
        <div class="lane-agent-strip" aria-label="${escapeText(role)} agents">
          <div class="lane-agent-tabs">${tabs.join("")}</div>
        </div>
      `;
    }

    function agentSummaryMarkup(role, label) {
      if (!role) return "";
      const agents = activeAgentsForRole(role);
      const count = agents.length;
      const title = `${label}: ${count}`;
      const chipsRow = agents.length
        ? `<div class="agent-chip-row">${agents.map((agent) => agentChipMarkup(agent)).join("")}</div>`
        : `<div class="agent-meta">No active ${escapeText(label.toLowerCase())}</div>`;
      const detailList = agents.length
        ? agents.map((agent) => {
            const metaParts = [
              agent.currentTaskId ? `Task: ${agent.currentTaskId}` : "",
              agent.lastHeartbeatAt ? `Seen: ${shortTime(agent.lastHeartbeatAt) || agent.lastHeartbeatAt}` : ""
            ].filter(Boolean);
            return `
              <li>
                ${agentChipMarkup(agent)}
                ${metaParts.length ? `<span class="agent-meta">${escapeText(metaParts.join(" | "))}</span>` : ""}
              </li>
            `;
          }).join("")
        : `<li><span class="agent-name">No active ${escapeText(label.toLowerCase())}</span></li>`;
      return `
        <div class="agent-summary">
          <button class="agent-pill" type="button" aria-label="${escapeText(title)}">${escapeText(title)}</button>
          <div class="agent-popover" role="tooltip">
            <div class="agent-popover-title">${escapeText(label)}</div>
            <ul class="agent-list">${detailList}</ul>
          </div>
        </div>
      `;
    }

    function spawnButtonsMarkup(role) {
      if (!role) return "";
      const safeRole = escapeText(role);
      const roleLabel = role === "worker" ? "Worker" : role === "review" ? "Review" : role;
      const dispatch = dispatchSettingsForRole(role);
      const codexSelected = dispatch.model === "codex" ? "selected" : "";
      const claudeSelected = dispatch.model === "claude" ? "selected" : "";
      const qwenSelected = dispatch.model === "qwen" ? "selected" : "";
      const autoLabel = dispatch.enabled ? "Auto: On" : "Auto: Off";
      const paused = Boolean(currentPauseStatus?.isPaused);
      const pausedClass = paused ? " is-paused" : "";
      const pausedAttr = paused ? "disabled aria-disabled=\"true\"" : "";
      const pauseTitle = paused
        ? pausedControlMessage(`${roleLabel} dispatch is paused`)
        : "";
      const spawnTitle = paused
        ? pauseTitle
        : `Spawn one ${roleLabel} agent with the selected model`;
      const autoTitle = paused
        ? pauseTitle
        : `Automatically spawn ${roleLabel} agents when work exists and active count is below max`;
      return `
        <span class="dispatch-controls${pausedClass}" role="group" aria-label="${escapeText(roleLabel)} dispatch controls">
          <select class="dispatch-select" data-dispatch-model="${safeRole}" title="${escapeText(roleLabel)} model" ${pausedAttr}>
            <option value="codex" ${codexSelected}>Codex</option>
            <option value="claude" ${claudeSelected}>Claude</option>
            <option value="qwen" ${qwenSelected}>Qwen</option>
          </select>
          <input class="dispatch-max" type="number" min="0" max="8" step="1" value="${escapeText(dispatch.maxAgents)}" data-dispatch-max="${safeRole}" title="Maximum active ${escapeText(roleLabel)} agents" ${pausedAttr}>
          <button class="spawn-button${pausedClass}" type="button" data-spawn-agent="${safeRole}" title="${escapeText(spawnTitle)}" ${pausedAttr}>${paused ? "Paused" : "Spawn"}</button>
          <button class="spawn-button auto-dispatch-toggle${pausedClass}" type="button" data-auto-dispatch-role="${safeRole}" aria-pressed="${dispatch.enabled ? "true" : "false"}" title="${escapeText(autoTitle)}" ${pausedAttr}>${paused ? "Auto paused" : autoLabel}</button>
        </span>
      `;
    }

    function taskRedoCount(task) {
      const parsed = Number.parseInt(task?.redoCount, 10);
      if (Number.isNaN(parsed) || parsed <= 0) return 0;
      return parsed;
    }

    function taskClaimOwner(task, columnKey) {
      if (columnKey === "claimed") {
        return {
          label: "Worker",
          name: String(task.claimedBy || "").trim() || "Unknown agent"
        };
      }
      if (columnKey === "reviewing") {
        return {
          label: "Reviewer",
          name: String(task.reviewClaimedBy || task.reviewingBy || "").trim() || "Unknown agent"
        };
      }
      return null;
    }

    function doneStatusBadge(task, columnKey) {
      if (columnKey !== "done") return "";
      const reviewDecision = String(task.reviewDecision || "").toLowerCase();
      const closedAs = String(task.closedAs || "").toLowerCase();
      const isFailed = reviewDecision === "changes_requested" || closedAs === "replaced_by_follow_up" || task.replacedByTaskId;
      const label = isFailed ? "Failed" : "Success";
      const statusClass = isFailed ? "failed" : "success";
      return `<span class="done-status-badge ${statusClass}">${label}</span>`;
    }

    function isFailedDoneTask(task, columnKey) {
      if (columnKey !== "done") return false;
      const reviewDecision = String(task.reviewDecision || "").toLowerCase();
      const closedAs = String(task.closedAs || "").toLowerCase();
      return reviewDecision === "changes_requested" || closedAs === "replaced_by_follow_up" || Boolean(task.replacedByTaskId);
    }

    function failureBriefPanel(task, columnKey) {
      if (!isFailedDoneTask(task, columnKey)) return "";
      const brief = task.failureBrief && typeof task.failureBrief === "object" ? task.failureBrief : {};
      const expected = String(task.failureExpected || brief.expected || "").trim();
      const actual = String(task.failureActual || brief.actual || "").trim();
      const decision = String(task.failureDecision || brief.decision || task.reviewNotes || "").trim();
      const replacement = String(task.replacedByTaskId || task.latestFollowUpTaskId || "").trim();
      const items = [
        expected ? ["Should be", expected] : null,
        actual ? ["Actually happening", actual] : null,
        decision ? ["Why it failed", decision] : null,
        replacement ? ["Follow-up task", replacement] : null
      ].filter(Boolean);
      if (!items.length) return "";
      return `
        <section class="failure-brief" aria-label="Failed review summary">
          <div class="failure-brief-label">Failed review summary</div>
          <div class="failure-brief-grid">
            ${items.map(([label, value]) => `
              <div class="failure-brief-item">
                <strong>${escapeText(label)}</strong>
                <p>${escapeText(value)}</p>
              </div>
            `).join("")}
          </div>
        </section>
      `;
    }

    function doneFeedbackForm(task, key, columnKey) {
      if (columnKey !== "done") return "";
      const feedback = Array.isArray(task.ownerFeedback) && task.ownerFeedback.length
        ? task.ownerFeedback[task.ownerFeedback.length - 1]?.feedback || ""
        : "";

      return `
        <form class="done-feedback" data-review-feedback-form="${escapeText(key)}">
          <label for="feedback-${escapeText(key)}">Feedback for reviewer</label>
          <textarea id="feedback-${escapeText(key)}" data-review-feedback-input placeholder="Write feedback, then send this task back to Review.">${escapeText(feedback)}</textarea>
          <div class="done-feedback-actions">
            <button class="text-button" type="submit">Send to Review</button>
          </div>
        </form>
      `;
    }

    function latestOwnerFeedback(task) {
      const feedback = task?.ownerFeedback;
      if (Array.isArray(feedback)) {
        return feedback.length ? feedback[feedback.length - 1] : null;
      }
      if (feedback && typeof feedback === "object") return feedback;
      if (typeof feedback === "string" && feedback.trim()) {
        return { feedback };
      }
      return null;
    }

    function ownerFeedbackPanel(task, columnKey) {
      if (columnKey === "done") return "";
      const entry = latestOwnerFeedback(task);
      const feedback = String(entry?.feedback || "").trim();
      if (!feedback) return "";
      const meta = [
        entry.returnedBy ? `From ${entry.returnedBy}` : "",
        entry.returnedAt ? `Returned ${entry.returnedAt}` : ""
      ].filter(Boolean).join(" - ");

      return `
        <section class="owner-feedback" aria-label="Owner feedback">
          <div class="owner-feedback-label">Owner feedback</div>
          <p>${escapeText(feedback)}</p>
          ${meta ? `<div class="owner-feedback-meta">${escapeText(meta)}</div>` : ""}
        </section>
      `;
    }

    function taskStatusBadge(sourceColumnKey) {
      if (sourceColumnKey === "claimed") {
        return `<span class="status-badge">In progress</span>`;
      }
      if (sourceColumnKey === "reviewing") {
        return `<span class="status-badge">Reviewing</span>`;
      }
      return "";
    }

    function ticketCard(task, columnKey) {
      const sourceColumnKey = task.__sourceColumn || columnKey;
      const title = String(task.title || "").trim();
      const priority = escapeText(task.priority || "normal");
      const key = taskKey(task);
      const isCollapsed = collapsedTasks.has(key);
      const toggleLabel = isCollapsed ? "Expand task" : "Collapse task";
      const redoCount = taskRedoCount(task);
      const claimOwner = taskClaimOwner(task, sourceColumnKey);
      const isActiveTask = sourceColumnKey === "claimed" || sourceColumnKey === "reviewing";
      const chips = [
        task.project,
        task.type,
        task.claimedBy ? `Claimed: ${task.claimedBy}` : "",
        task.reviewClaimedBy ? `Reviewing: ${task.reviewClaimedBy}` : "",
        task.requestedBy ? `Requested: ${task.requestedBy}` : ""
      ].filter(Boolean);
      const redoBadge = redoCount > 0 ? `<span class="redo-badge">Redo x${redoCount}</span>` : "";
      const ownerBadge = claimOwner
        ? `<span class="owner-badge">${escapeText(claimOwner.label)}: ${escapeText(claimOwner.name)}</span>`
        : "";
      const doneBadge = doneStatusBadge(task, sourceColumnKey);
      const statusBadge = taskStatusBadge(sourceColumnKey);
      const archiveButton = sourceColumnKey === "done"
        ? `<button class="text-button archive-task" type="button" data-archive-task="${escapeText(key)}">Archive</button>`
        : "";
      const unclaimButton = sourceColumnKey === "claimed"
        ? `<div class="ticket-actions"><button class="text-button" type="button" data-unclaim-task="${escapeText(key)}" data-unclaim-source="claimed">Unclaim task</button></div>`
        : sourceColumnKey === "reviewing"
          ? `<div class="ticket-actions"><button class="text-button" type="button" data-unclaim-task="${escapeText(key)}" data-unclaim-source="reviewing">Unclaim review</button></div>`
          : "";
      const activeClass = isActiveTask ? ` is-active-task ticket-${sourceColumnKey}-active` : "";

      return `
        <article class="ticket ${isCollapsed ? "is-collapsed" : ""}${activeClass}" data-task-id="${escapeText(key)}" data-source-column="${escapeText(sourceColumnKey)}">
          <div class="ticket-title-row">
            <div class="ticket-main">
              <h2>${escapeText(title)}</h2>
              <div class="ticket-meta">${statusBadge}${doneBadge}${ownerBadge}${redoBadge}</div>
            </div>
            <div class="ticket-title-actions">
              ${archiveButton}
              <button class="icon-button ticket-toggle" type="button" data-task-toggle="${escapeText(key)}" aria-label="${toggleLabel}" title="${toggleLabel}">${isCollapsed ? "+" : "-"}</button>
            </div>
          </div>
          <div class="ticket-details" ${isCollapsed ? "hidden" : ""}>
            ${failureBriefPanel(task, sourceColumnKey)}
            ${doneFeedbackForm(task, key, sourceColumnKey)}
            ${unclaimButton}
            <div class="ticket-head">
              <div class="ticket-id">${escapeText(task.id || "No ID")}</div>
              <div class="priority ${priority.toLowerCase()}">${priority}</div>
            </div>
            ${ownerFeedbackPanel(task, sourceColumnKey)}
            ${field("Inspect Change", renderInspectionTargets(task.inspectionTargets))}
            ${task.summary ? `<p class="summary">${escapeText(task.summary)}</p>` : ""}
            ${chips.length ? `<div class="chips">${chips.map((chip) => `<span class="chip">${escapeText(chip)}</span>`).join("")}</div>` : ""}
            ${field("Requirements", listItems(task.requirements))}
            ${field("Acceptance", listItems(task.acceptanceCriteria))}
            ${field("Files", renderFiles(task.files))}
            ${field("Blockers", listItems(task.blockers))}
            ${task.notes ? field("Notes", `<p class="summary">${escapeText(task.notes)}</p>`) : ""}
          </div>
        </article>
      `;
    }

    function archiveCloseButton() {
      return `<button class="icon-button archive-close" type="button" data-archive-close aria-label="Close archived panel" title="Close archived panel">&times;</button>`;
    }

    function workflowCloseButton() {
      return `<button class="icon-button workflow-close" type="button" data-workflow-close aria-label="Close workflow panel" title="Close workflow panel">&times;</button>`;
    }

    function doneFocusButton() {
      const label = doneFocusOpen ? "Restore all columns" : "Expand Done column";
      const icon = doneFocusOpen ? "&#x21A9;" : "&#x26F6;";
      return `<button class="icon-button done-focus-toggle" type="button" data-done-focus-toggle aria-pressed="${doneFocusOpen ? "true" : "false"}" aria-label="${label}" title="${label}">${icon}</button>`;
    }

    function workflowCount(normalized, columnKey) {
      return columnTasks(normalized.columns[columnKey], columnKey).length;
    }

    function workflowDetailDefinitions(normalized) {
      const todoCount = workflowCount(normalized, "todo");
      const claimedCount = workflowCount(normalized, "claimed");
      const reviewCount = workflowCount(normalized, "review");
      const reviewingCount = workflowCount(normalized, "reviewing");
      const doneCount = workflowCount(normalized, "done");
      const archivedCount = workflowCount(normalized, "archived");
      return {
        "frontend-auditor": {
          kind: "Upstream agent",
