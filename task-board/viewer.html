<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Project Task Board</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23191816'/%3E%3Crect x='13' y='14' width='8' height='36' rx='4' fill='%233f6f8f'/%3E%3Crect x='25' y='10' width='8' height='44' rx='4' fill='%239b5b25'/%3E%3Crect x='37' y='16' width='8' height='32' rx='4' fill='%236f5aa8'/%3E%3Crect x='49' y='20' width='8' height='28' rx='4' fill='%2334785d'/%3E%3C/svg%3E">
  <style>
    :root {
      --page: #f7f8fb;
      --ink: #17202a;
      --muted: #626f7f;
      --line: #d6dde8;
      --panel: #ffffff;
      --todo: #2c7da0;
      --claimed: #b35c1e;
      --review: #725ac1;
      --done: #2f855a;
      --archived: #617386;
      --workflow: #0f766e;
      --agent-logs: #8a6f22;
      --archive-tab-height: 132px;
      --archive-tab-width: 40px;
      --workflow-tab-height: 132px;
      --workflow-tab-width: 40px;
      --agent-logs-tab-height: 146px;
      --agent-logs-tab-width: 40px;
      --settings-tab-height: 118px;
      --settings-tab-width: 40px;
      --side-tab-gutter: 64px;
      --shell-edge-gap: 16px;
      --viewport-client-width: 100vw;
      --shadow: 0 14px 34px rgba(23, 32, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--page);
      color: var(--ink);
      font: 14px/1.45 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .shell {
      width: min(1480px, calc(var(--viewport-client-width) - var(--side-tab-gutter) - var(--shell-edge-gap)));
      margin-left: max(var(--side-tab-gutter), calc((var(--viewport-client-width) - 1480px) / 2));
      margin-right: var(--shell-edge-gap);
      padding: 24px 0 84px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .meta {
      margin-top: 8px;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pause-control {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      min-height: 36px;
      max-width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
      padding: 5px 6px 5px 10px;
      box-shadow: 0 1px 0 rgba(25, 24, 22, 0.04);
    }

    .pause-control.is-paused {
      border-color: #d3aa6c;
      background: #fff8ec;
    }

    .pause-state {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
    }

    .pause-indicator {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--done);
      flex: 0 0 auto;
    }

    .pause-control.is-paused .pause-indicator {
      background: #a85a28;
    }

    .pause-label {
      color: var(--ink);
      font-weight: 760;
      white-space: nowrap;
    }

    .pause-until {
      white-space: nowrap;
    }

    .pause-countdown {
      min-width: 52px;
      border: 1px solid #d7c7ab;
      border-radius: 999px;
      background: #ffffff;
      color: #665333;
      padding: 2px 7px;
      text-align: center;
      font-weight: 760;
      white-space: nowrap;
    }

    .pause-actions {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      flex: 0 0 auto;
    }

    .pause-button {
      min-height: 28px;
      padding: 4px 8px;
      font-size: 12px;
      line-height: 1;
      white-space: nowrap;
    }

    .button,
    .file-label {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      padding: 8px 12px;
      cursor: pointer;
      box-shadow: 0 1px 0 rgba(25, 24, 22, 0.04);
    }

    .button:hover,
    .file-label:hover {
      border-color: #aaa197;
    }

    .file-label input {
      display: none;
    }

    .status {
      width: 100%;
      min-height: 28px;
      margin: 0 0 14px;
      color: var(--muted);
    }

    .system-overview {
      display: grid;
      grid-template-columns: minmax(260px, 1.25fr) repeat(4, minmax(150px, 1fr));
      gap: 10px;
      margin: 0 0 14px;
      align-items: stretch;
    }

    .system-card {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 8px 22px rgba(23, 32, 42, 0.06);
      padding: 11px 12px;
      display: grid;
      gap: 8px;
      align-content: start;
      border-top: 4px solid var(--card-accent, var(--todo));
    }

    .system-card.is-ok {
      --card-accent: var(--done);
    }

    .system-card.is-watch {
      --card-accent: #c07a2f;
    }

    .system-card.is-attention,
    .system-card.is-error {
      --card-accent: #b0473f;
    }

    .system-card-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
      color: var(--muted);
      font-size: 11px;
      font-weight: 760;
      text-transform: uppercase;
    }

    .system-card-title span:first-child {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .system-value {
      margin: 0;
      color: var(--ink);
      font-size: 22px;
      line-height: 1.05;
      font-weight: 800;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .system-detail {
      display: flex;
      flex-wrap: wrap;
      gap: 5px 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
      min-width: 0;
    }

    .system-detail span {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .system-badge {
      flex: 0 0 auto;
      min-width: 24px;
      border-radius: 999px;
      border: 1px solid color-mix(in srgb, var(--card-accent, var(--todo)) 42%, var(--line));
      background: color-mix(in srgb, var(--card-accent, var(--todo)) 11%, #ffffff);
      color: color-mix(in srgb, var(--card-accent, var(--todo)) 82%, var(--ink));
      padding: 2px 7px;
      text-align: center;
      font-size: 11px;
      font-weight: 760;
      white-space: nowrap;
    }

    .system-warnings {
      grid-column: 1 / -1;
      min-width: 0;
      border: 1px solid #ddb6a9;
      border-radius: 8px;
      background: #fff4f1;
      color: #7a352c;
      padding: 9px 12px;
      font-size: 12px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, minmax(260px, 1fr));
      gap: 14px;
      align-items: start;
    }

    .board.is-done-focus {
      display: flex;
      gap: 10px;
      align-items: start;
    }

    .board.is-done-focus .folded-stack {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 10px;
      flex: 0 0 64px;
      width: 64px;
      min-width: 0;
    }

    .archive-board {
      position: fixed;
      inset: 0 auto 0 0;
      z-index: 6;
      pointer-events: none;
      isolation: isolate;
    }

    .archive-tab {
      pointer-events: auto;
      position: fixed;
      left: 0;
      top: 50%;
      width: var(--archive-tab-width);
      min-height: var(--archive-tab-height);
      border: 1px solid var(--line);
      border-left: 0;
      border-radius: 0 8px 8px 0;
      background: var(--panel);
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 6px;
      font-size: 13px;
      font-weight: 760;
      cursor: pointer;
      box-shadow: var(--shadow);
      transform: translateY(-50%);
      writing-mode: vertical-rl;
      text-orientation: mixed;
      z-index: 9;
    }

    .archive-tab:hover {
      border-color: #aaa197;
      background: #fbfaf7;
    }

    .archive-tab .count {
      color: #ffffff;
      writing-mode: horizontal-tb;
    }

    .archive-tab .dot {
      --lane-color: var(--archived);
    }

    .archive-tray {
      pointer-events: auto;
      position: fixed;
      left: 0;
      top: 0;
      height: 100vh;
      width: min(980px, calc(100vw - var(--archive-tab-width)));
      background: rgba(246, 244, 239, 0.96);
      transform: translateX(calc(-100% - 8px));
      transition: transform 220ms ease;
      z-index: 7;
      overflow: hidden;
      display: block;
      align-items: stretch;
      padding: 16px 16px 16px calc(var(--archive-tab-width) + 12px);
      box-sizing: border-box;
      box-shadow: 18px 0 42px rgba(25, 24, 22, 0.16);
    }

    .archive-tray > .lane {
      height: calc(100vh - 32px);
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: rgba(255, 255, 255, 0.78);
    }

    .archive-tray .lane-body {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      padding-right: 6px;
    }

    .archive-tray .lane-body .field,
    .archive-tray .lane-body .summary,
    .archive-tray .lane-body .chips {
      max-width: 100%;
      overflow-wrap: anywhere;
    }

    .archive-tray .lane-body .ticket {
      min-width: 0;
    }

    .archive-tray .lane-actions {
      justify-content: flex-end;
      gap: 6px;
      flex-wrap: nowrap;
    }

    .archive-close {
      margin-left: auto;
    }

    .archive-board.is-open .archive-tray {
      transform: translateX(0);
    }

    .workflow-board {
      position: fixed;
      inset: 0 auto 0 0;
      z-index: 8;
      pointer-events: none;
      isolation: isolate;
    }

    .workflow-tab {
      pointer-events: auto;
      position: fixed;
      left: 0;
      top: calc(50% - 158px);
      width: var(--workflow-tab-width);
      min-height: var(--workflow-tab-height);
      border: 1px solid var(--line);
      border-left: 0;
      border-radius: 0 8px 8px 0;
      background: var(--panel);
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 6px;
      font-size: 13px;
      font-weight: 760;
      cursor: pointer;
      box-shadow: var(--shadow);
      transform: translateY(-50%);
      writing-mode: vertical-rl;
      text-orientation: mixed;
      z-index: 11;
    }

    .workflow-tab:hover {
      border-color: #aaa197;
      background: #fbfaf7;
    }

    .workflow-tab .dot {
      --lane-color: var(--workflow);
    }

    .workflow-tray {
      pointer-events: auto;
      position: fixed;
      left: 0;
      top: 0;
      height: 100vh;
      width: min(1040px, calc(100vw - var(--workflow-tab-width)));
      background: rgba(246, 244, 239, 0.98);
      transform: translateX(calc(-100% - 8px));
      transition: transform 220ms ease;
      z-index: 10;
      overflow: auto;
      padding: 18px 18px 18px calc(var(--workflow-tab-width) + 14px);
      box-sizing: border-box;
      box-shadow: 18px 0 42px rgba(25, 24, 22, 0.16);
    }

    .workflow-board.is-open .workflow-tray {
      transform: translateX(0);
    }

    .agent-logs-board {
      position: fixed;
      inset: 0 auto 0 0;
      z-index: 10;
      pointer-events: none;
      isolation: isolate;
    }

    .agent-logs-tab {
      pointer-events: auto;
      position: fixed;
      left: 0;
      top: calc(50% + 158px);
      width: var(--agent-logs-tab-width);
      min-height: var(--agent-logs-tab-height);
      border: 1px solid var(--line);
      border-left: 0;
      border-radius: 0 8px 8px 0;
      background: var(--panel);
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 6px;
      font-size: 13px;
      font-weight: 760;
      cursor: pointer;
      box-shadow: var(--shadow);
      transform: translateY(-50%);
      writing-mode: vertical-rl;
      text-orientation: mixed;
      z-index: 13;
    }

    .agent-logs-tab:hover {
      border-color: #aaa197;
      background: #fbfaf7;
    }

    .agent-logs-tab .dot {
      --lane-color: var(--agent-logs);
    }

    .agent-logs-tray {
      pointer-events: auto;
      position: fixed;
      left: 0;
      top: 0;
      height: 100vh;
      width: calc(100vw - var(--agent-logs-tab-width));
      background: rgba(246, 244, 239, 0.98);
      transform: translateX(calc(-100% - 8px));
      transition: transform 220ms ease;
      z-index: 12;
      overflow: auto;
      padding: 18px 18px 18px calc(var(--agent-logs-tab-width) + 14px);
      box-sizing: border-box;
      box-shadow: 18px 0 42px rgba(25, 24, 22, 0.16);
    }

    .agent-logs-board.is-open .agent-logs-tray {
      transform: translateX(0);
    }

    .agent-logs-panel {
      min-height: calc(100vh - 36px);
      border: 1px solid var(--line);
      border-top: 5px solid var(--agent-logs);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: var(--shadow);
      padding: 16px;
      min-width: 0;
    }

    .agent-logs-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .agent-logs-header h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .agent-logs-subtitle {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .agent-logs-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .agent-logs-refresh {
      min-height: 30px;
      border: 1px solid color-mix(in srgb, var(--agent-logs) 42%, var(--line));
      border-radius: 8px;
      background: color-mix(in srgb, var(--agent-logs) 10%, #ffffff);
      color: color-mix(in srgb, var(--agent-logs) 78%, #191816);
      padding: 5px 10px;
      cursor: pointer;
      font-weight: 760;
      white-space: nowrap;
    }

    .agent-logs-refresh:hover,
    .agent-logs-refresh:focus-visible {
      border-color: color-mix(in srgb, var(--agent-logs) 62%, var(--line));
      background: color-mix(in srgb, var(--agent-logs) 18%, #ffffff);
      outline: none;
    }

    .agent-logs-refresh:disabled {
      cursor: progress;
      opacity: 0.62;
    }

    .agent-logs-grid {
      display: grid;
      grid-template-columns: minmax(170px, 220px) minmax(220px, 280px) minmax(0, 1fr);
      gap: 12px;
      align-items: stretch;
      min-width: 0;
    }

    .agent-logs-column {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfaf7;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 520px;
    }

    .agent-logs-column-header {
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.72);
    }

    .agent-logs-column-header h3 {
      margin: 0;
      font-size: 12px;
      line-height: 1.2;
      color: var(--muted);
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .agent-logs-clear {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: var(--ink);
      padding: 4px 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 760;
      white-space: nowrap;
    }

    .agent-logs-clear:hover,
    .agent-logs-clear:focus-visible {
      border-color: #aaa197;
      outline: none;
    }

    .agent-logs-scroll {
      min-height: 0;
      overflow: auto;
      padding: 10px;
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .agent-log-agent,
    .agent-log-file {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: var(--ink);
      padding: 9px 10px;
      cursor: pointer;
      text-align: left;
      display: grid;
      gap: 5px;
      box-shadow: 0 1px 0 rgba(25, 24, 22, 0.04);
    }

    .agent-log-agent:hover,
    .agent-log-agent:focus-visible,
    .agent-log-file:hover,
    .agent-log-file:focus-visible {
      border-color: #aaa197;
      outline: none;
    }

    .agent-log-agent.is-selected,
    .agent-log-file.is-selected {
      border-color: color-mix(in srgb, var(--agent-logs) 68%, var(--line));
      background: color-mix(in srgb, var(--agent-logs) 9%, #ffffff);
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--agent-logs) 18%, transparent);
    }

    .agent-log-agent-main,
    .agent-log-file-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
      font-weight: 760;
    }

    .agent-log-name,
    .agent-log-file-name {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .agent-log-count {
      flex: 0 0 auto;
      min-width: 24px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--agent-logs) 18%, #ffffff);
      color: color-mix(in srgb, var(--agent-logs) 80%, #191816);
      padding: 2px 7px;
      text-align: center;
      font-size: 11px;
      font-weight: 760;
    }

    .agent-log-meta {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .agent-log-detail {
      min-height: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .agent-log-detail-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin: 10px 0;
    }

    .agent-log-detail-meta div {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      padding: 8px 9px;
      overflow-wrap: anywhere;
    }

    .agent-log-detail-meta strong {
      display: block;
      margin-bottom: 3px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
      text-transform: uppercase;
    }

    .agent-log-content {
      flex: 1 1 auto;
      min-height: 320px;
      max-height: calc(100vh - 285px);
      margin: 0;
      overflow: auto;
      border: 1px solid #cfc7ba;
      border-radius: 8px;
      background: #1f1f1f;
      color: #f7f3ea;
      padding: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .agent-log-state {
      min-height: 116px;
      display: grid;
      place-items: center;
      border: 1px dashed var(--line);
      border-radius: 8px;
      color: var(--muted);
      text-align: center;
      padding: 14px;
      background: rgba(255, 255, 255, 0.58);
      overflow-wrap: anywhere;
    }

    .agent-log-state.is-error {
      border-color: #d6a38c;
      background: #fff5ef;
      color: #7e3d20;
    }

    .settings-board {
      position: fixed;
      inset: auto auto 0 0;
      z-index: 12;
      pointer-events: none;
      isolation: isolate;
    }

    .settings-tab {
      pointer-events: auto;
      position: fixed;
      left: 0;
      bottom: 22px;
      width: var(--settings-tab-width);
      min-height: var(--settings-tab-height);
      border: 1px solid var(--line);
      border-left: 0;
      border-radius: 0 8px 8px 0;
      background: var(--panel);
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 6px;
      font-size: 13px;
      font-weight: 760;
      cursor: pointer;
      box-shadow: var(--shadow);
      writing-mode: vertical-rl;
      text-orientation: mixed;
      z-index: 15;
    }

    .settings-tab:hover {
      border-color: #aaa197;
      background: #fbfaf7;
    }

    .settings-tab .dot {
      --lane-color: var(--todo);
    }

    .settings-tray {
      pointer-events: auto;
      position: fixed;
      left: 0;
      bottom: 0;
      width: min(460px, calc(100vw - var(--settings-tab-width)));
      max-height: min(72vh, 520px);
      background: rgba(246, 244, 239, 0.98);
      transform: translateX(calc(-100% - 8px));

      z-index: 14;
      overflow: auto;
      padding: 16px 16px 16px calc(var(--settings-tab-width) + 14px);

      box-shadow: 18px 0 42px rgba(25, 24, 22, 0.16);

    .settings-board.is-open .settings-tray {
      transform: translateX(0);
    }

    .settings-panel {
      border: 1px solid var(--line);
      border-top: 5px solid var(--todo);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: var(--shadow);
      padding: 14px;
      min-width: 0;
    }

    .settings-panel-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .settings-panel h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .settings-fields {
      display: grid;
      gap: 12px;
    }

    .settings-field {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .settings-field label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
      text-transform: uppercase;
    }

    .settings-command-input {
      width: 100%;
      min-height: 38px;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      padding: 8px 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
      line-height: 1.3;

    .settings-command-input:focus {
      border-color: color-mix(in srgb, var(--todo) 58%, var(--line));

      box-shadow: 0 0 0 3px color-mix(in srgb, var(--todo) 14%, transparent);
    }

    .settings-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .settings-save-button,
    .settings-health-button {
      min-height: 34px;
      border: 1px solid color-mix(in srgb, var(--todo) 44%, var(--line));
      border-radius: 8px;
      background: color-mix(in srgb, var(--todo) 12%, #ffffff);
      color: color-mix(in srgb, var(--todo) 82%, #191816);
      padding: 7px 12px;
      cursor: pointer;
      font-weight: 760;
    }

    .settings-save-button:hover,
    .settings-save-button:focus-visible,
    .settings-health-button:hover,
    .settings-health-button:focus-visible {
      border-color: color-mix(in srgb, var(--todo) 62%, var(--line));
      background: color-mix(in srgb, var(--todo) 20%, #ffffff);
      outline: none;
    }

    .settings-save-button:disabled,
    .settings-health-button:disabled {
      cursor: progress;
      opacity: 0.62;
    }

    .workflow-panel {
      min-height: calc(100vh - 36px);
      border: 1px solid var(--line);
      border-top: 5px solid var(--workflow);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .workflow-panel-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .workflow-panel h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .workflow-panel p {
      margin: 6px 0 0;
      color: var(--muted);
    }

    .workflow-graph {
      display: grid;
      gap: 14px;
      margin-top: 12px;
    }

    .workflow-state-line {
      display: grid;
      grid-template-columns: minmax(220px, 300px) minmax(0, 1fr);
      gap: 12px;
      align-items: start;
    }

    .workflow-state-stack {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 0;
    }

    .workflow-state {
      border: 1px solid var(--line);
      border-left: 5px solid var(--node-color);
      border-radius: 8px;
      background: var(--panel);
      padding: 11px 12px;
      min-width: 0;
      min-height: 98px;
      display: grid;
      align-content: space-between;
      gap: 10px;
      color: var(--ink);
      text-align: left;
      cursor: pointer;
      appearance: none;
      font: inherit;
      width: 100%;
      box-shadow: 0 1px 0 rgba(25, 24, 22, 0.04);
      transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    .workflow-state:hover,
    .workflow-state:focus-visible,
    .workflow-branch:hover,
    .workflow-branch:focus-visible {
      border-color: #aaa197;
      box-shadow: 0 10px 22px rgba(25, 24, 22, 0.1);
      outline: none;
      transform: translateY(-1px);
    }

    .workflow-state-kicker {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 760;
      text-transform: uppercase;
    }

    .workflow-state-link {
      width: 2px;
      height: 28px;
      background: var(--line);
      margin: 0 auto;
      position: relative;
    }

    .workflow-state-link::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -1px;
      width: 8px;
      height: 8px;
      border-right: 2px solid var(--line);
      border-bottom: 2px solid var(--line);
      transform: translateX(-50%) rotate(45deg);
      background: var(--page);
    }

    .workflow-state-title {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      font-weight: 760;
    }

    .workflow-state-title span:first-child {
      overflow-wrap: anywhere;
    }

    .workflow-state-count {
      flex: 0 0 auto;
    }

    .workflow-state-meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .workflow-state.has-human-input {
      border-left-width: 5px;
      box-shadow: 0 1px 0 rgba(25, 24, 22, 0.04), inset 0 0 0 1px rgba(71, 111, 143, 0.18);
    }

    .workflow-human-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      align-self: start;
      margin-top: 2px;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(71, 111, 143, 0.14);
      color: var(--node-color, #476f8f);
      font-size: 10.5px;
      font-weight: 760;
      letter-spacing: 0.01em;
      text-transform: uppercase;
    }

    /* Planner chat dock */
    .planner-chat-dock {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: min(420px, 92vw);
      background: var(--panel);
      border-left: 1px solid var(--line);
      box-shadow: -14px 0 40px rgba(25, 24, 22, 0.18);
      display: flex;
      flex-direction: column;
      transform: translateX(105%);
      transition: transform 220ms ease;
      z-index: 1200;
    }

    .planner-chat-dock.is-open {
      transform: translateX(0);
    }

    .planner-chat-header {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      border-top: 5px solid var(--workflow);
    }

    .planner-chat-title {
      flex: 1 1 150px;
      min-width: 0;
    }

    .planner-chat-header h3 {
      margin: 0;
      font-size: 15px;
      font-weight: 800;
    }

    .planner-chat-header .planner-chat-sub {
      display: block;
      font-size: 11px;
      font-weight: 600;

      text-transform: none;

    .planner-chat-tool {
      font: inherit;
      font-size: 12px;
      padding: 4px 6px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--page);
      color: var(--ink);

    .planner-chat-controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex: 0 0 auto;
      min-width: 0;
      margin-left: auto;
    }

    .planner-chat-iconbtn {
      appearance: none;
      border: 1px solid var(--line);
      background: var(--page);
      color: var(--ink);
      border-radius: 6px;
      width: 28px;
      height: 28px;
      cursor: pointer;
      font-size: 15px;
      line-height: 1;

    .planner-chat-newbtn {
      width: auto;
      min-width: 74px;
      padding: 0 10px;
      font-size: 12px;
      font-weight: 760;
      white-space: nowrap;
    }

    .planner-chat-iconbtn:hover,
    .planner-chat-iconbtn:focus-visible {
      border-color: #aaa197;
      outline: none;
    }

    @media (max-width: 520px) {
      .planner-chat-title {
        flex-basis: 100%;
      }

      .planner-chat-controls {
        width: 100%;
      }
    }

    @media (max-width: 380px) {
      .planner-chat-newbtn {
        min-width: 56px;
        padding: 0 8px;
      }
    }

    .planner-chat-body {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .planner-chat-empty {
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      margin: auto 0;
      padding: 24px 8px;
    }

    .planner-msg {
      max-width: 92%;
      padding: 9px 12px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.45;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .planner-msg.owner {
      align-self: flex-end;
      background: var(--workflow);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .planner-msg.planner {
      align-self: flex-start;
      background: var(--page);
      border: 1px solid var(--line);
      border-bottom-left-radius: 4px;
      font-family: var(--app-font, inherit);
      font-size: 13px;
      white-space: normal;
    }

    .planner-msg.planner .planner-result {
      white-space: normal;
      overflow-wrap: anywhere;
    }
    .planner-msg.planner .planner-result p { margin: 2px 0; }
    .planner-msg.planner .planner-result ul,
    .planner-msg.planner .planner-result ol { margin: 4px 0; padding-left: 20px; }
    .planner-msg.planner .planner-result li { margin: 1px 0; }
    .planner-msg.planner .planner-result code {
      background: rgba(0,0,0,0.06);
      padding: 1px 4px;
      border-radius: 3px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
    }
    .planner-msg.planner .planner-result pre {
      background: rgba(0,0,0,0.04);
      padding: 8px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 4px 0;
    }
    .planner-msg.planner .planner-result pre code {
      background: none;
      padding: 0;
    }
    .planner-msg.planner .planner-result a {
      color: var(--workflow, #4a90d9);
      text-decoration: underline;
    }
    .planner-msg.planner .planner-result strong { font-weight: 600; }

    .planner-diagnostics-toggle {
      display: inline-block;
      margin-top: 8px;
      padding: 2px 8px;
      font-size: 11px;
      color: var(--muted);
      background: none;
      border: 1px solid var(--line);
      border-radius: 4px;
      cursor: pointer;
      font-family: var(--app-font, inherit);
    }
    .planner-diagnostics-toggle:hover {
      background: var(--line);
      color: var(--text);
    }

    .planner-diagnostics {
      display: none;
      margin-top: 8px;
      max-height: 300px;
      overflow: auto;
      border-top: 1px solid var(--line);
      padding-top: 8px;
    }
    .planner-diagnostics.is-open { display: block; }
    .planner-diagnostics pre {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      margin: 0;
      opacity: 0.8;
    }

    .planner-msg .planner-msg-meta {
      display: block;
      margin-bottom: 4px;
      font-size: 10.5px;
      font-weight: 760;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      opacity: 0.75;
      font-family: var(--app-font, inherit);
    }

    .planner-msg .planner-msg-status {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .planner-msg .planner-msg-status.running::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #c98a3d;
      animation: planner-pulse 1s ease-in-out infinite;
    }

    .planner-msg-latency {
      margin-left: 6px;
      opacity: 0.6;
      font-variant-numeric: tabular-nums;
    }

    @keyframes planner-pulse {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 1; }
    }

    .planner-chat-footer {
      border-top: 1px solid var(--line);
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .planner-chat-input {
      width: 100%;
      resize: vertical;
      min-height: 64px;
      max-height: 200px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      font: inherit;
      font-size: 13px;
      background: var(--page);
      color: var(--ink);
      box-sizing: border-box;
    }

    .planner-chat-send {
      align-self: flex-end;
      appearance: none;
      border: none;
      background: var(--workflow);
      color: #fff;
      font: inherit;
      font-weight: 760;
      padding: 8px 18px;
      border-radius: 8px;
      cursor: pointer;
    }

    .planner-chat-send:disabled { opacity: 0.5; cursor: default; }

    .planner-chat-hint {
      font-size: 11px;
      color: var(--muted);
    }

    .wf-graph-canvas {
      display: grid;
      gap: 0;
      width: 100%;
      max-width: 100%;
    }

    .wf-graph-row {
      display: grid;
      gap: 12px;
      justify-content: center;
      min-width: 0;
      padding: 0 8px;
    }

    .wf-graph-row[data-cols="1"] {
      grid-template-columns: minmax(260px, 1fr);
    }

    .wf-graph-row[data-cols="2"] {
      grid-template-columns: repeat(2, minmax(200px, 1fr));
    }

    .wf-graph-row[data-cols="3"] {
      grid-template-columns: repeat(3, minmax(180px, 1fr));
    }

    .wf-graph-edge-block {
      position: relative;
      height: 52px;
      min-width: 0;
      overflow: visible;
    }

    .wf-graph-edge-block svg {
      display: block;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .wf-graph-edge-line {
      stroke: var(--line);
      stroke-width: 2;
      fill: none;
    }

    .wf-graph-edge-arrow {
      fill: var(--line);
    }

    .wf-graph-edge-label-bg {
      fill: #fbfaf7;
      stroke: var(--line);
      stroke-width: 1;
      rx: 99;
    }

    .wf-graph-edge-label-text {
      fill: var(--muted);
      font-size: 10px;
      font-weight: 760;
      text-anchor: middle;
      dominant-baseline: central;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .workflow-branch-column {
      display: grid;
      gap: 10px;
      padding-top: 2px;
    }

    .workflow-branch-group {
      display: grid;
      gap: 10px;
    }

    .workflow-branch-group + .workflow-branch-group {
      padding-top: 10px;
      border-top: 1px solid var(--line);
    }

    .workflow-branch-label {
      font-size: 12px;
      font-weight: 760;
      color: var(--muted);
      text-transform: uppercase;
    }

    .workflow-branch {
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: #fbfaf7;
      padding: 10px 12px;
      color: #37332e;
      min-width: 0;
      width: 100%;
      font: inherit;
      text-align: left;
      cursor: pointer;
      appearance: none;
      transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    .workflow-branch strong {
      display: block;
      margin-bottom: 4px;
      color: var(--ink);
      font-weight: 760;
    }

    .workflow-branch code {
      color: #245f89;
      font-weight: 700;
    }

    .workflow-stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 14px;
    }

    .workflow-stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfaf7;
      padding: 9px 10px;
    }

    .workflow-stat strong {
      display: block;
      font-size: 18px;
      line-height: 1.1;
    }

    .workflow-stat span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .workflow-detail-backdrop {
      position: fixed;
      inset: 0;
      z-index: 24;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(25, 24, 22, 0.36);
      pointer-events: auto;
    }

    .workflow-detail-modal {
      width: min(760px, calc(100vw - 32px));
      max-height: calc(100vh - 48px);
      overflow: auto;
      border: 1px solid var(--line);
      border-top: 5px solid var(--modal-color, var(--workflow));
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 24px 64px rgba(25, 24, 22, 0.22);
      padding: 18px;
    }

    .workflow-detail-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 12px;
    }

    .workflow-detail-header h3 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .workflow-detail-kicker {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 760;
      text-transform: uppercase;
    }

    .workflow-detail-summary {
      margin: 0 0 14px;
      color: #37332e;
    }

    .workflow-detail-grid {

      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;

    .workflow-detail-section {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfaf7;
      padding: 10px 12px;
      min-width: 0;
    }

    .workflow-detail-section h4 {
      margin: 0 0 8px;
      font-size: 12px;
      line-height: 1.2;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .workflow-detail-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .workflow-detail-section-header h4 {
      margin: 0;
    }

    .copy-start-phrase {
      min-height: 28px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: var(--ink);
      padding: 4px 10px;
      font: inherit;
      font-size: 12px;
      font-weight: 760;
      cursor: pointer;
      white-space: nowrap;
    }

    .copy-start-phrase:hover,
    .copy-start-phrase:focus-visible {
      border-color: #aaa197;

      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 0;
      min-width: 0;

    .workflow-detail-section .start-phrase-text {
      min-width: 0;
      overflow-wrap: anywhere;

    .workflow-detail-section ul {
      margin: 0;
      padding-left: 18px;
    }

    .workflow-detail-section li {
      margin: 4px 0;
    }

    .workflow-detail-section code {
      color: #245f89;
      font-weight: 700;
    }

    .board.is-done-focus .lane:not(.done) {
      flex: 0 0 64px;
      width: 64px;
      min-height: 148px;
      cursor: default;
    }

    .board.is-done-focus .lane:not(.done) .lane-header {
      display: flex;
      height: 148px;
      min-height: 148px;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 6px 12px;
    }

    .board.is-done-focus .lane:not(.done) .lane-title {
      flex: 1 1 auto;
      flex-direction: column;
      align-items: center;

      gap: 8px;

  <script>
