<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Project Task Board</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23191816'/%3E%3Crect x='13' y='14' width='8' height='36' rx='4' fill='%233f6f8f'/%3E%3Crect x='25' y='10' width='8' height='44' rx='4' fill='%239b5b25'/%3E%3Crect x='37' y='16' width='8' height='32' rx='4' fill='%236f5aa8'/%3E%3Crect x='49' y='20' width='8' height='28' rx='4' fill='%2334785d'/%3E%3C/svg%3E">
  <style>
    :root {
      --page: #f6f4ef;
      --ink: #191816;
      --muted: #69645d;
      --line: #d8d2c7;
      --panel: #ffffff;
      --todo: #3f6f8f;
      --claimed: #9b5b25;
      --review: #6f5aa8;
      --done: #34785d;
      --archived: #5f6872;
      --workflow: #2f6f79;
      --archive-tab-height: 132px;
      --archive-tab-width: 40px;
      --workflow-tab-height: 132px;
      --workflow-tab-width: 40px;
      --shadow: 0 14px 34px rgba(25, 24, 22, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--page);
      color: var(--ink);
      font: 14px/1.45 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .shell {
      width: min(1480px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 24px 0 84px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .meta {
      margin-top: 8px;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .button,
    .file-label {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      padding: 8px 12px;
      cursor: pointer;
      box-shadow: 0 1px 0 rgba(25, 24, 22, 0.04);
    }

    .button:hover,
    .file-label:hover {
      border-color: #aaa197;
    }

    .file-label input {
      display: none;
    }

    .status {
      width: 100%;
      min-height: 28px;
      margin: 0 0 14px;
      color: var(--muted);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, minmax(260px, 1fr));
      gap: 14px;
      align-items: start;
    }

    .board.is-done-focus {
      display: flex;
      gap: 10px;
      align-items: start;
    }

    .board.is-done-focus .folded-stack {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 10px;
      flex: 0 0 64px;
      width: 64px;
      min-width: 0;
    }

    .archive-board {
      position: fixed;
      inset: 0 auto 0 0;
      z-index: 6;
      pointer-events: none;
      isolation: isolate;
    }

    .archive-tab {
      pointer-events: auto;
      position: fixed;
      left: 0;
      top: 50%;
      width: var(--archive-tab-width);
      min-height: var(--archive-tab-height);
      border: 1px solid var(--line);
      border-left: 0;
      border-radius: 0 8px 8px 0;
      background: var(--panel);
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 6px;
      font-size: 13px;
      font-weight: 760;
      cursor: pointer;
      box-shadow: var(--shadow);
      transform: translateY(-50%);
      writing-mode: vertical-rl;
      text-orientation: mixed;
      z-index: 9;
    }

    .archive-tab:hover {
      border-color: #aaa197;
      background: #fbfaf7;
    }

    .archive-tab .count {
      color: #ffffff;
      writing-mode: horizontal-tb;
    }

    .archive-tab .dot {
      --lane-color: var(--archived);
    }

    .archive-tray {
      pointer-events: auto;
      position: fixed;
      left: 0;
      top: 0;
      height: 100vh;
      width: min(980px, calc(100vw - var(--archive-tab-width)));
      background: rgba(246, 244, 239, 0.96);
      transform: translateX(calc(-100% - 8px));
      transition: transform 220ms ease;
      z-index: 7;
      overflow: hidden;
      display: block;
      align-items: stretch;
      padding: 16px 16px 16px calc(var(--archive-tab-width) + 12px);
      box-sizing: border-box;
      box-shadow: 18px 0 42px rgba(25, 24, 22, 0.16);
    }

    .archive-tray > .lane {
      height: calc(100vh - 32px);
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: rgba(255, 255, 255, 0.78);
    }

    .archive-tray .lane-body {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      padding-right: 6px;
    }

    .archive-tray .lane-body .field,
    .archive-tray .lane-body .summary,
    .archive-tray .lane-body .chips {
      max-width: 100%;
      overflow-wrap: anywhere;
    }

    .archive-tray .lane-body .ticket {
      min-width: 0;
    }

    .archive-tray .lane-actions {
      justify-content: flex-end;
      gap: 6px;
      flex-wrap: nowrap;
    }

    .archive-close {
      margin-left: auto;
    }

    .archive-board.is-open .archive-tray {
      transform: translateX(0);
    }

    .workflow-board {
      position: fixed;
      inset: 0 auto 0 0;
      z-index: 8;
      pointer-events: none;
      isolation: isolate;
    }

    .workflow-tab {
      pointer-events: auto;
      position: fixed;
      left: 0;
      top: calc(50% - 158px);
      width: var(--workflow-tab-width);
      min-height: var(--workflow-tab-height);
      border: 1px solid var(--line);
      border-left: 0;
      border-radius: 0 8px 8px 0;
      background: var(--panel);
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 6px;
      font-size: 13px;
      font-weight: 760;
      cursor: pointer;
      box-shadow: var(--shadow);
      transform: translateY(-50%);
      writing-mode: vertical-rl;
      text-orientation: mixed;
      z-index: 11;
    }

    .workflow-tab:hover {
      border-color: #aaa197;
      background: #fbfaf7;
    }

    .workflow-tab .dot {
      --lane-color: var(--workflow);
    }

    .workflow-tray {
      pointer-events: auto;
      position: fixed;
      left: 0;
      top: 0;
      height: 100vh;
      width: min(1040px, calc(100vw - var(--workflow-tab-width)));
      background: rgba(246, 244, 239, 0.98);
      transform: translateX(calc(-100% - 8px));
      transition: transform 220ms ease;
      z-index: 10;
      overflow: auto;
      padding: 18px 18px 18px calc(var(--workflow-tab-width) + 14px);
      box-sizing: border-box;
      box-shadow: 18px 0 42px rgba(25, 24, 22, 0.16);
    }

    .workflow-board.is-open .workflow-tray {
      transform: translateX(0);
    }

    .workflow-panel {
      min-height: calc(100vh - 36px);
      border: 1px solid var(--line);
      border-top: 5px solid var(--workflow);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .workflow-panel-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .workflow-panel h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .workflow-panel p {
      margin: 6px 0 0;
      color: var(--muted);
    }

    .workflow-graph {
      display: grid;
      gap: 14px;
      margin-top: 12px;
    }

    .workflow-state-line {
      display: grid;
      grid-template-columns: minmax(220px, 300px) minmax(0, 1fr);
      gap: 12px;
      align-items: start;
    }

    .workflow-state-stack {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 0;
    }

    .workflow-state {
      border: 1px solid var(--line);
      border-left: 5px solid var(--node-color);
      border-radius: 8px;
      background: var(--panel);
      padding: 11px 12px;
      min-width: 0;
      min-height: 98px;
      display: grid;
      align-content: space-between;
      gap: 10px;
      color: var(--ink);
      text-align: left;
      cursor: pointer;
      appearance: none;
      font: inherit;
      width: 100%;
      box-shadow: 0 1px 0 rgba(25, 24, 22, 0.04);
      transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    .workflow-state:hover,
    .workflow-state:focus-visible,
    .workflow-branch:hover,
    .workflow-branch:focus-visible {
      border-color: #aaa197;
      box-shadow: 0 10px 22px rgba(25, 24, 22, 0.1);
      outline: none;
      transform: translateY(-1px);
    }

    .workflow-state-kicker {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 760;
      text-transform: uppercase;
    }

    .workflow-state-link {
      width: 2px;
      height: 28px;
      background: var(--line);
      margin: 0 auto;
      position: relative;
    }

    .workflow-state-link::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -1px;
      width: 8px;
      height: 8px;
      border-right: 2px solid var(--line);
      border-bottom: 2px solid var(--line);
      transform: translateX(-50%) rotate(45deg);
      background: var(--page);
    }

    .workflow-state-title {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      font-weight: 760;
    }

    .workflow-state-title span:first-child {
      overflow-wrap: anywhere;
    }

    .workflow-state-count {
      flex: 0 0 auto;
    }

    .workflow-state-meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .workflow-parallel-start {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      align-items: stretch;
    }

    .workflow-parallel-start + .workflow-state-link {
      height: 32px;
    }

    .workflow-agent-flow {
      display: grid;
      gap: 0;
      max-width: 760px;
      margin: 0 auto;
    }

    .workflow-agent-row {
      display: grid;
      grid-template-columns: minmax(240px, 420px);
      justify-content: center;
      gap: 10px;
      min-width: 0;
    }

    .workflow-agent-row-upstream {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .workflow-agent-edge {
      display: grid;
      justify-items: center;
      min-height: 44px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 760;
      text-align: center;
      text-transform: uppercase;
      position: relative;
    }

    .workflow-agent-edge::before {
      content: "";
      width: 2px;
      height: 100%;
      background: var(--line);
      display: block;
    }

    .workflow-agent-edge::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 6px;
      width: 8px;
      height: 8px;
      border-right: 2px solid var(--line);
      border-bottom: 2px solid var(--line);
      transform: translateX(-50%) rotate(45deg);
      background: var(--page);
    }

    .workflow-agent-edge span {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      max-width: min(260px, calc(100vw - 96px));
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fbfaf7;
      padding: 3px 9px;
      line-height: 1.25;
    }

    .workflow-agent-edge-merge {
      min-height: 64px;
    }

    .workflow-agent-edge-merge::before {
      margin-top: 10px;
      height: calc(100% - 10px);
    }

    .workflow-agent-edge-merge span {
      top: 34px;
    }

    .workflow-agent-edge-merge i {
      position: absolute;
      top: 10px;
      left: 25%;
      right: 25%;
      height: 2px;
      background: var(--line);
      display: block;
    }

    .workflow-agent-edge-merge i::before,
    .workflow-agent-edge-merge i::after {
      content: "";
      position: absolute;
      top: -12px;
      width: 2px;
      height: 12px;
      background: var(--line);
    }

    .workflow-agent-edge-merge i::before {
      left: 0;
    }

    .workflow-agent-edge-merge i::after {
      right: 0;
    }

    .workflow-edge-block {
      min-height: 98px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: var(--muted);
      font-size: 11px;
      text-align: center;
      min-width: 0;
    }

    .workflow-edge-block::before {
      content: attr(data-arrow);
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fbfaf7;
      color: var(--ink);
      font-weight: 760;
    }

    .workflow-edge-label {
      max-width: 70px;
      overflow-wrap: anywhere;
    }

    .workflow-branch-column {
      display: grid;
      gap: 10px;
      padding-top: 2px;
    }

    .workflow-branch-group {
      display: grid;
      gap: 10px;
    }

    .workflow-branch-group + .workflow-branch-group {
      padding-top: 10px;
      border-top: 1px solid var(--line);
    }

    .workflow-branch-label {
      font-size: 12px;
      font-weight: 760;
      color: var(--muted);
      text-transform: uppercase;
    }

    .workflow-branch {
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: #fbfaf7;
      padding: 10px 12px;
      color: #37332e;
      min-width: 0;
      width: 100%;
      font: inherit;
      text-align: left;
      cursor: pointer;
      appearance: none;
      transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    .workflow-branch strong {
      display: block;
      margin-bottom: 4px;
      color: var(--ink);
      font-weight: 760;
    }

    .workflow-branch code {
      color: #245f89;
      font-weight: 700;
    }

    .workflow-stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 14px;
    }

    .workflow-stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfaf7;
      padding: 9px 10px;
    }

    .workflow-stat strong {
      display: block;
      font-size: 18px;
      line-height: 1.1;
    }

    .workflow-stat span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .workflow-detail-backdrop {
      position: fixed;
      inset: 0;
      z-index: 24;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(25, 24, 22, 0.36);
      pointer-events: auto;
    }

    .workflow-detail-modal {
      width: min(760px, calc(100vw - 32px));
      max-height: calc(100vh - 48px);
      overflow: auto;
      border: 1px solid var(--line);
      border-top: 5px solid var(--modal-color, var(--workflow));
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 24px 64px rgba(25, 24, 22, 0.22);
      padding: 18px;
    }

    .workflow-detail-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 12px;
    }

    .workflow-detail-header h3 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .workflow-detail-kicker {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 760;
      text-transform: uppercase;
    }

    .workflow-detail-summary {
      margin: 0 0 14px;
      color: #37332e;
    }

    .workflow-detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .workflow-detail-section {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfaf7;
      padding: 10px 12px;
      min-width: 0;
    }

    .workflow-detail-section h4 {
      margin: 0 0 8px;
      font-size: 12px;
      line-height: 1.2;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .workflow-detail-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .workflow-detail-section-header h4 {
      margin: 0;
    }

    .copy-start-phrase {
      min-height: 28px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: var(--ink);
      padding: 4px 10px;
      font: inherit;
      font-size: 12px;
      font-weight: 760;
      cursor: pointer;
      white-space: nowrap;
    }

    .copy-start-phrase:hover,
    .copy-start-phrase:focus-visible {
      border-color: #aaa197;
      outline: none;
    }

    .copy-start-phrase.is-copied {
      border-color: #2f7d62;
      color: #2f7d62;
    }

    .workflow-detail-section .start-phrase-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding-left: 0;
      list-style: none;
    }

    .workflow-detail-section .start-phrase-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 0;
      min-width: 0;
    }

    .workflow-detail-section .start-phrase-text {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .workflow-detail-section ul {
      margin: 0;
      padding-left: 18px;
    }

    .workflow-detail-section li {
      margin: 4px 0;
    }

    .workflow-detail-section code {
      color: #245f89;
      font-weight: 700;
    }

    .board.is-done-focus .lane:not(.done) {
      flex: 0 0 64px;
      width: 64px;
      min-height: 148px;
      cursor: default;
    }

    .board.is-done-focus .lane:not(.done) .lane-header {
      height: 148px;
      min-height: 148px;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 6px 12px;
    }

    .board.is-done-focus .lane:not(.done) .lane-title {
      flex: 1 1 auto;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      overflow: hidden;
    }

    .board.is-done-focus .lane:not(.done) .lane-title span:last-child {
      max-height: 72px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .board.is-done-focus .lane:not(.done) .lane-actions {
      flex-direction: column;
      justify-content: flex-end;
      gap: 0;
      width: 100%;
    }

    .board.is-done-focus .lane:not(.done) .agent-summary,
    .board.is-done-focus .lane:not(.done) .spawn-group,
    .board.is-done-focus .lane:not(.done) .lane-agent-strip,
    .board.is-done-focus .lane:not(.done) .dispatch-controls {
      display: none;
    }

    .board.is-done-focus .lane:not(.done) .count {
      min-width: 32px;
      margin-left: 0;
      padding: 4px 8px;
      box-shadow: 0 6px 14px rgba(25, 24, 22, 0.08);
    }

    .board.is-done-focus .lane:not(.done) .lane-toggle,
    .board.is-done-focus .lane:not(.done) .lane-body {
      display: none;
    }

    .board.is-done-focus .done {
      flex: 1 1 auto;
      min-width: 0;
    }

    .board.is-done-focus .done .lane-body {
      grid-template-columns: minmax(0, 1fr);
    }

    .lane {
      position: relative;
      min-width: 0;
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: visible;
    }

    .lane:has(.agent-summary:hover),
    .lane:has(.agent-summary:focus-within),
    .lane:has(.agent-run-tab-wrap:hover),
    .lane:has(.agent-run-tab-wrap:focus-within) {
      z-index: 20;
    }

    .lane-agent-strip {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      min-height: 36px;
      padding: 0 12px 6px;
      background: rgba(255, 255, 255, 0.36);
    }

    .lane-agent-strip.is-blank {
      pointer-events: none;
    }

    .lane-agent-tabs {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      min-width: 0;
    }

    .agent-run-tab-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
    }

    .agent-run-tab {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 26px;
      max-width: 132px;
      border: 1px solid color-mix(in srgb, var(--lane-color) 34%, var(--line));

<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <h1 id="boardName">Project Task Board</h1>
        <div class="meta">
          <span id="updatedAt">Updated: unknown</span>
          <span id="sourceName">Source: board.json</span>

      </div>
      <div class="toolbar">
        <button class="button" type="button" id="reloadButton">Reload JSON</button>
        <button class="button" type="button" id="autoRefreshButton" aria-pressed="false">Auto refresh: Off</button>
        <label class="file-label">
          Load JSON file
          <input type="file" id="fileInput" accept="application/json,.json">
        </label>
      </div>
    </header>

    <p class="status" id="status"></p>

    <section class="board" id="board" aria-label="Agent task board"></section>
    <section class="workflow-board" id="workflowBoard" aria-label="Workflow graph"></section>
    <section class="archive-board" id="archiveBoard" aria-label="Archived task board"></section>
  </main>

  <script>
    const visualColumns = [
      { key: "todo", label: "To Do", sourceKeys: ["claimed", "todo"], agentRole: "worker", agentLabel: "Workers" },
      { key: "review", label: "Review", sourceKeys: ["reviewing", "review"], agentRole: "review", agentLabel: "Reviewers" },
      { key: "done", label: "Done", sourceKeys: ["done"] }
    ];

    const fallbackBoard = {
      boardName: "Project Task Board",
      updatedAt: "",
      columns: {
        todo: [],
        claimed: [],
        review: [],
        reviewing: [],
        done: [],
        archived: []
      }
    };
    const fallbackAgents = {
      updatedAt: "",
      agents: [],
      activeAgents: [],
      pendingSpawns: []
    };
    const fallbackDispatchSettings = {
      worker: {
        enabled: false,
        model: "codex",
        maxAgents: 1
      },
      review: {
        enabled: false,
        model: "codex",
        maxAgents: 1
      },
      pendingSpawns: []
    };
    const fallbackAgentSchema = {
      modelBackground: {
        claude: { label: "Claude", background: "#f4a86b", text: "#3b1f08" },
        codex: { label: "Codex", background: "#7eb1d6", text: "#0d2538" },
        unknown: { label: "Unknown model", background: "#e3ddd2", text: "#191816" }
      },
      roleBorder: {
        planning: { label: "Planner", border: "#c98a3d" },
        worker: { label: "Worker", border: "#3f6f8f" },
        review: { label: "Reviewer", border: "#6f5aa8" },
        unknown: { label: "Unknown role", border: "#69645d" }
      },
      personalNamePool: []
    };
    let currentAgentSchema = fallbackAgentSchema;

    const boardEl = document.getElementById("board");
    const workflowEl = document.getElementById("workflowBoard");
    const archiveEl = document.getElementById("archiveBoard");
    const statusEl = document.getElementById("status");
    const boardNameEl = document.getElementById("boardName");
    const updatedAtEl = document.getElementById("updatedAt");
    const sourceNameEl = document.getElementById("sourceName");
    const reloadButton = document.getElementById("reloadButton");
    const autoRefreshButton = document.getElementById("autoRefreshButton");
    const fileInput = document.getElementById("fileInput");
    const collapsedTasks = new Set();
    let workflowPanelOpen = false;
    let workflowDetailKey = "";
    let archiveTrayOpen = false;
    let doneFocusOpen = false;
    let currentBoard = fallbackBoard;
    let currentSourceLabel = "fallback";
    let currentAgents = fallbackAgents;
    let currentDispatchSettings = fallbackDispatchSettings;
    let autoRefreshTimer = null;
    let autoRefreshInFlight = false;

    function escapeText(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function listItems(items, formatter = escapeText) {
      if (!Array.isArray(items) || items.length === 0) return "";
      return `<ul>${items.map((item) => `<li>${formatter(item)}</li>`).join("")}</ul>`;
    }

    function renderFiles(files) {
      return listItems(files, (file) => `<code>${escapeText(file)}</code>`);
    }

    function renderInspectionTargets(targets) {
      if (!Array.isArray(targets) || targets.length === 0) return "";
      const items = targets.map((target) => {
        if (!target || typeof target !== "object") {
          return `<li>${escapeText(target)}</li>`;
        }

        const url = String(target.url || target.href || "").trim();
        const path = String(target.path || "").trim();
        const label = String(target.label || target.title || url || path || "Inspection target").trim();
        const primary = url
          ? `<a href="${escapeText(url)}" target="_blank" rel="noopener noreferrer">${escapeText(label)}</a>`
          : `<span>${escapeText(label)}</span>`;
        const detailParts = [
          path ? `Path: ${path}` : "",
          target.viewport ? `Viewport: ${target.viewport}` : "",
          target.state ? `State: ${target.state}` : "",
          target.notes ? `Notes: ${target.notes}` : ""
        ].filter(Boolean);
        const meta = detailParts.length
          ? `<span class="inspection-target-meta">${escapeText(detailParts.join(" | "))}</span>`
          : "";

        return `<li>${primary}${meta}</li>`;
      });
      return `<ul class="inspection-targets">${items.join("")}</ul>`;
    }

    function field(label, content) {
      if (!content) return "";
      return `<div class="field"><strong>${escapeText(label)}</strong>${content}</div>`;
    }

    function taskKey(task) {
      return String(task.id || `${task.project || "task"}-${task.title || "missing-title"}-${task.createdAt || ""}`);
    }

    function hasRenderableTitle(task) {
      if (!task || typeof task !== "object") return false;
      const title = String(task.title || "").trim();
      return Boolean(title && !title.toLowerCase().startsWith("untitled"));
    }

    function timestampValue(task) {
      const fields = ["archivedAt", "doneAt", "reviewedAt", "reviewRequestedAt", "claimedAt", "createdAt"];
      for (const fieldName of fields) {
        const value = Date.parse(task[fieldName] || "");
        if (!Number.isNaN(value)) return value;
      }
      return 0;
    }

    function columnTasks(tasks, columnKey) {
      const safeTasks = Array.isArray(tasks) ? [...tasks] : [];
      if (columnKey !== "done" && columnKey !== "archived") return safeTasks;
      return safeTasks.sort((a, b) => timestampValue(b) - timestampValue(a));
    }

    function decoratedColumnTasks(tasks, sourceColumnKey) {
      return columnTasks(tasks, sourceColumnKey).map((task) => ({
        ...task,
        __sourceColumn: sourceColumnKey
      }));
    }

    function visualColumnTasks(board, visualColumn) {
      const normalizedColumns = board?.columns || {};
      return visualColumn.sourceKeys.flatMap((sourceColumnKey) =>
        decoratedColumnTasks(normalizedColumns[sourceColumnKey], sourceColumnKey)
      );
    }

    function activeAgentsForRole(role) {
      const agents = Array.isArray(currentAgents.activeAgents)
        ? currentAgents.activeAgents
        : Array.isArray(currentAgents.agents)
          ? currentAgents.agents.filter((agent) => agent?.status === "active")
          : [];
      return agents.filter((agent) => String(agent.role || "").toLowerCase() === role);
    }

    function pendingSpawnsForRole(role) {
      const pending = Array.isArray(currentAgents.pendingSpawns)
        ? currentAgents.pendingSpawns
        : Array.isArray(currentDispatchSettings.pendingSpawns)
          ? currentDispatchSettings.pendingSpawns
          : [];
      return pending.filter((spawn) => String(spawn.role || "").toLowerCase() === role);
    }

    function shortTime(value) {
      const parsed = Date.parse(value || "");
      if (Number.isNaN(parsed)) return "";
      return new Date(parsed).toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
    }

    function agentSchemaModel(model) {
      const lookup = currentAgentSchema?.modelBackground || {};
      return lookup[model] || lookup.unknown || fallbackAgentSchema.modelBackground.unknown;
    }

    function agentSchemaRole(role) {
      const lookup = currentAgentSchema?.roleBorder || {};
      return lookup[role] || lookup.unknown || fallbackAgentSchema.roleBorder.unknown;
    }

    function agentChipMarkup(agent) {
      const personalName = String(agent?.personalName || agent?.agentName || "Unnamed").trim();
      const model = String(agent?.model || "unknown").toLowerCase();
      const role = String(agent?.role || "unknown").toLowerCase();
      const modelSchema = agentSchemaModel(model);
      const roleSchema = agentSchemaRole(role);
      const titleParts = [
        `${personalName}`,
        `Role: ${roleSchema.label || role}`,
        `Model: ${modelSchema.label || model}`,
        agent?.currentTaskId ? `Task: ${agent.currentTaskId}` : "",
        agent?.lastHeartbeatAt ? `Seen: ${shortTime(agent.lastHeartbeatAt) || agent.lastHeartbeatAt}` : "",
        agent?.agentId ? `Id: ${agent.agentId}` : ""
      ].filter(Boolean).join(" — ");
      const styleParts = [
        `--chip-bg:${modelSchema.background || "#ffffff"}`,
        `--chip-text:${modelSchema.text || "#191816"}`,
        `--chip-border:${roleSchema.border || "#69645d"}`
      ].join(";");
      const unknownClass = (model === "unknown" || role === "unknown") ? " agent-chip-unknown" : "";
      return `<span class="agent-chip${unknownClass}" style="${styleParts}" title="${escapeText(titleParts)}">${escapeText(personalName)}</span>`;
    }

    function agentRunLogText(entry) {
      const latestLog = entry?.latestLog && typeof entry.latestLog === "object" ? entry.latestLog : {};
      const preview = String(latestLog.preview || "").trim();
      if (preview) return preview;
      const notes = String(entry?.notes || "").trim();
      if (notes) return notes;
      return "No log output recorded yet.";
    }

    function agentRunMeta(entry, stateLabel) {
      const latestLog = entry?.latestLog && typeof entry.latestLog === "object" ? entry.latestLog : {};
      const processStatus = entry?.processStatus && typeof entry.processStatus === "object" ? entry.processStatus : {};
      const parts = [
        `State: ${stateLabel}`,
        entry?.model ? `Model: ${entry.model}` : "",
        entry?.currentTaskId ? `Task: ${entry.currentTaskId}` : "",
        entry?.processId ? `PID: ${entry.processId}` : "",
        processStatus.state ? `PID state: ${processStatus.state}` : "",
        processStatus.createdAt ? `PID started: ${shortTime(processStatus.createdAt) || processStatus.createdAt}` : "",
        processStatus.checkedAt ? `PID checked: ${shortTime(processStatus.checkedAt) || processStatus.checkedAt}` : "",
        entry?.lastHeartbeatAt ? `Seen: ${shortTime(entry.lastHeartbeatAt) || entry.lastHeartbeatAt}` : "",
        entry?.spawnedAt ? `Spawned: ${shortTime(entry.spawnedAt) || entry.spawnedAt}` : "",
        latestLog.updatedAt ? `Log: ${shortTime(latestLog.updatedAt) || latestLog.updatedAt}` : "",
        latestLog.fileName ? latestLog.fileName : "",
      ].filter(Boolean);
      return parts.join(" | ");
    }

    function pendingSpawnDisplayState(entry) {
      const status = String(entry?.status || "").toLowerCase();
      const processState = String(entry?.processStatus?.state || "").toLowerCase();
      if (status.includes("running") || processState === "running") {
        return { className: "is-running", stateLabel: "spawned running" };
      }
      if (status.includes("exited") || processState === "exited") {
        return { className: "is-exited", stateLabel: "spawned exited" };
      }
      if (status.includes("pid-reused") || processState === "pid-reused") {
        return { className: "is-reused", stateLabel: "spawned pid reused" };
      }
      if (status.includes("unknown") || processState === "unknown") {
        return { className: "is-unknown", stateLabel: "spawned unknown" };
      }
      return { className: "is-pending", stateLabel: "pending registration" };
    }

    function agentRunTabMarkup(entry, state) {
      const displayState = state === "pending"
        ? pendingSpawnDisplayState(entry)
        : { className: "is-registered", stateLabel: "registered live" };
      const stateLabel = displayState.stateLabel;
      const name = String(entry?.personalName || entry?.agentName || "agent").trim();
      const displayName = name || "agent";
      const meta = agentRunMeta(entry, stateLabel);
      const logText = agentRunLogText(entry);
      return `
        <div class="agent-run-tab-wrap">
          <button class="agent-run-tab ${displayState.className}" type="button" aria-label="${escapeText(displayName)} ${escapeText(stateLabel)} agent log">
            <span class="agent-run-dot" aria-hidden="true"></span>
            <span class="agent-run-name">${escapeText(displayName)}</span>
          </button>
          <div class="agent-run-popover" role="tooltip">
            <div class="agent-run-popover-title">${escapeText(displayName)}</div>
            <div class="agent-run-popover-meta">${escapeText(meta)}</div>
            <pre class="agent-run-log">${escapeText(logText)}</pre>
          </div>
        </div>
      `;
    }

    function laneAgentStripMarkup(role) {
      if (!role) {
        return `<div class="lane-agent-strip is-blank" aria-hidden="true"></div>`;
      }
      const registeredTabs = activeAgentsForRole(role).map((agent) => agentRunTabMarkup(agent, "registered"));
      const pendingTabs = pendingSpawnsForRole(role).map((spawn) => agentRunTabMarkup(spawn, "pending"));
      const tabs = [...registeredTabs, ...pendingTabs];
      if (!tabs.length) {
        return `<div class="lane-agent-strip is-blank" aria-label="No active or pending agents"></div>`;
      }
      return `
        <div class="lane-agent-strip" aria-label="${escapeText(role)} agents">
          <div class="lane-agent-tabs">${tabs.join("")}</div>
        </div>
      `;
    }

    function agentSummaryMarkup(role, label) {
      if (!role) return "";
      const agents = activeAgentsForRole(role);
      const count = agents.length;
      const title = `${label}: ${count}`;
      const chipsRow = agents.length
        ? `<div class="agent-chip-row">${agents.map((agent) => agentChipMarkup(agent)).join("")}</div>`
        : `<div class="agent-meta">No active ${escapeText(label.toLowerCase())}</div>`;
      const detailList = agents.length
        ? agents.map((agent) => {
            const metaParts = [
              agent.currentTaskId ? `Task: ${agent.currentTaskId}` : "",
              agent.lastHeartbeatAt ? `Seen: ${shortTime(agent.lastHeartbeatAt) || agent.lastHeartbeatAt}` : ""
            ].filter(Boolean);
            return `
              <li>
                ${agentChipMarkup(agent)}
                ${metaParts.length ? `<span class="agent-meta">${escapeText(metaParts.join(" | "))}</span>` : ""}
              </li>
            `;
          }).join("")
        : `<li><span class="agent-name">No active ${escapeText(label.toLowerCase())}</span></li>`;
      return `
        <div class="agent-summary">
          <button class="agent-pill" type="button" aria-label="${escapeText(title)}">${escapeText(title)}</button>
          <div class="agent-popover" role="tooltip">
            <div class="agent-popover-title">${escapeText(label)}</div>
            <ul class="agent-list">${detailList}</ul>
          </div>
        </div>
      `;
    }

    function spawnButtonsMarkup(role) {
      if (!role) return "";
      const safeRole = escapeText(role);
      const roleLabel = role === "worker" ? "Worker" : role === "review" ? "Review" : role;
      const dispatch = dispatchSettingsForRole(role);
      const codexSelected = dispatch.model === "codex" ? "selected" : "";
      const claudeSelected = dispatch.model === "claude" ? "selected" : "";
      const autoLabel = dispatch.enabled ? "Auto: On" : "Auto: Off";
      return `
        <span class="dispatch-controls" role="group" aria-label="${escapeText(roleLabel)} dispatch controls">
          <select class="dispatch-select" data-dispatch-model="${safeRole}" title="${escapeText(roleLabel)} model">
            <option value="codex" ${codexSelected}>Codex</option>
            <option value="claude" ${claudeSelected}>Claude</option>
          </select>
          <input class="dispatch-max" type="number" min="0" max="8" step="1" value="${escapeText(dispatch.maxAgents)}" data-dispatch-max="${safeRole}" title="Maximum active ${escapeText(roleLabel)} agents">
          <button class="spawn-button" type="button" data-spawn-agent="${safeRole}" title="Spawn one ${escapeText(roleLabel)} agent with the selected model">Spawn</button>
          <button class="spawn-button auto-dispatch-toggle" type="button" data-auto-dispatch-role="${safeRole}" aria-pressed="${dispatch.enabled ? "true" : "false"}" title="Automatically spawn ${escapeText(roleLabel)} agents when work exists and active count is below max">${autoLabel}</button>
        </span>
      `;
    }

    function taskRedoCount(task) {
      const parsed = Number.parseInt(task?.redoCount, 10);
      if (Number.isNaN(parsed) || parsed <= 0) return 0;
      return parsed;
    }

    function taskClaimOwner(task, columnKey) {
      if (columnKey === "claimed") {
        return {
          label: "Worker",
          name: String(task.claimedBy || "").trim() || "Unknown agent"
        };
      }
      if (columnKey === "reviewing") {
        return {
          label: "Reviewer",
          name: String(task.reviewClaimedBy || task.reviewingBy || "").trim() || "Unknown agent"
        };
      }
      return null;
    }

    function doneStatusBadge(task, columnKey) {
      if (columnKey !== "done") return "";
      const reviewDecision = String(task.reviewDecision || "").toLowerCase();
      const closedAs = String(task.closedAs || "").toLowerCase();
      const isFailed = reviewDecision === "changes_requested" || closedAs === "replaced_by_follow_up" || task.replacedByTaskId;
      const label = isFailed ? "Failed" : "Success";
      const statusClass = isFailed ? "failed" : "success";
      return `<span class="done-status-badge ${statusClass}">${label}</span>`;
    }

    function isFailedDoneTask(task, columnKey) {
      if (columnKey !== "done") return false;
      const reviewDecision = String(task.reviewDecision || "").toLowerCase();
      const closedAs = String(task.closedAs || "").toLowerCase();
      return reviewDecision === "changes_requested" || closedAs === "replaced_by_follow_up" || Boolean(task.replacedByTaskId);
    }

    function failureBriefPanel(task, columnKey) {
      if (!isFailedDoneTask(task, columnKey)) return "";
      const brief = task.failureBrief && typeof task.failureBrief === "object" ? task.failureBrief : {};
      const expected = String(task.failureExpected || brief.expected || "").trim();
      const actual = String(task.failureActual || brief.actual || "").trim();
      const decision = String(task.failureDecision || brief.decision || task.reviewNotes || "").trim();
      const replacement = String(task.replacedByTaskId || task.latestFollowUpTaskId || "").trim();
      const items = [
        expected ? ["Should be", expected] : null,
        actual ? ["Actually happening", actual] : null,
        decision ? ["Why it failed", decision] : null,
        replacement ? ["Follow-up task", replacement] : null
      ].filter(Boolean);
      if (!items.length) return "";
      return `
        <section class="failure-brief" aria-label="Failed review summary">
          <div class="failure-brief-label">Failed review summary</div>
          <div class="failure-brief-grid">
            ${items.map(([label, value]) => `
              <div class="failure-brief-item">
                <strong>${escapeText(label)}</strong>
                <p>${escapeText(value)}</p>
              </div>
            `).join("")}
          </div>
        </section>
      `;
    }

    function doneFeedbackForm(task, key, columnKey) {
      if (columnKey !== "done") return "";
      const feedback = Array.isArray(task.ownerFeedback) && task.ownerFeedback.length
        ? task.ownerFeedback[task.ownerFeedback.length - 1]?.feedback || ""
        : "";

      return `
        <form class="done-feedback" data-review-feedback-form="${escapeText(key)}">
          <label for="feedback-${escapeText(key)}">Feedback for reviewer</label>
          <textarea id="feedback-${escapeText(key)}" data-review-feedback-input placeholder="Write feedback, then send this task back to Review.">${escapeText(feedback)}</textarea>
          <div class="done-feedback-actions">
            <button class="text-button" type="submit">Send to Review</button>
          </div>
        </form>
      `;
    }

    function latestOwnerFeedback(task) {
      const feedback = task?.ownerFeedback;
      if (Array.isArray(feedback)) {
        return feedback.length ? feedback[feedback.length - 1] : null;
      }
      if (feedback && typeof feedback === "object") return feedback;
      if (typeof feedback === "string" && feedback.trim()) {
        return { feedback };
      }
      return null;
    }

    function ownerFeedbackPanel(task, columnKey) {
      if (columnKey === "done") return "";
      const entry = latestOwnerFeedback(task);
      const feedback = String(entry?.feedback || "").trim();
      if (!feedback) return "";
      const meta = [
        entry.returnedBy ? `From ${entry.returnedBy}` : "",
        entry.returnedAt ? `Returned ${entry.returnedAt}` : ""
      ].filter(Boolean).join(" - ");

      return `
        <section class="owner-feedback" aria-label="Owner feedback">
          <div class="owner-feedback-label">Owner feedback</div>
          <p>${escapeText(feedback)}</p>
          ${meta ? `<div class="owner-feedback-meta">${escapeText(meta)}</div>` : ""}
        </section>
      `;
    }

    function taskStatusBadge(sourceColumnKey) {
      if (sourceColumnKey === "claimed") {
        return `<span class="status-badge">In progress</span>`;
      }
      if (sourceColumnKey === "reviewing") {
        return `<span class="status-badge">Reviewing</span>`;
      }
      return "";
    }

    function ticketCard(task, columnKey) {
      const sourceColumnKey = task.__sourceColumn || columnKey;
      const title = String(task.title || "").trim();
      const priority = escapeText(task.priority || "normal");
      const key = taskKey(task);
      const isCollapsed = collapsedTasks.has(key);
      const toggleLabel = isCollapsed ? "Expand task" : "Collapse task";
      const redoCount = taskRedoCount(task);
      const claimOwner = taskClaimOwner(task, sourceColumnKey);
      const isActiveTask = sourceColumnKey === "claimed" || sourceColumnKey === "reviewing";
      const chips = [
        task.project,
        task.type,
        task.claimedBy ? `Claimed: ${task.claimedBy}` : "",
        task.reviewClaimedBy ? `Reviewing: ${task.reviewClaimedBy}` : "",
        task.requestedBy ? `Requested: ${task.requestedBy}` : ""
      ].filter(Boolean);
      const redoBadge = redoCount > 0 ? `<span class="redo-badge">Redo x${redoCount}</span>` : "";
      const ownerBadge = claimOwner
        ? `<span class="owner-badge">${escapeText(claimOwner.label)}: ${escapeText(claimOwner.name)}</span>`
        : "";
      const doneBadge = doneStatusBadge(task, sourceColumnKey);
      const statusBadge = taskStatusBadge(sourceColumnKey);
      const archiveButton = sourceColumnKey === "done"
        ? `<button class="text-button archive-task" type="button" data-archive-task="${escapeText(key)}">Archive</button>`
        : "";
      const unclaimButton = sourceColumnKey === "claimed"
        ? `<div class="ticket-actions"><button class="text-button" type="button" data-unclaim-task="${escapeText(key)}">Unclaim task</button></div>`
        : "";
      const activeClass = isActiveTask ? ` is-active-task ticket-${sourceColumnKey}-active` : "";

      return `
        <article class="ticket ${isCollapsed ? "is-collapsed" : ""}${activeClass}" data-task-id="${escapeText(key)}" data-source-column="${escapeText(sourceColumnKey)}">
          <div class="ticket-title-row">
            <div class="ticket-main">
              <h2>${escapeText(title)}</h2>
              <div class="ticket-meta">${statusBadge}${doneBadge}${ownerBadge}${redoBadge}</div>
            </div>
            <div class="ticket-title-actions">
              ${archiveButton}
              <button class="icon-button ticket-toggle" type="button" data-task-toggle="${escapeText(key)}" aria-label="${toggleLabel}" title="${toggleLabel}">${isCollapsed ? "+" : "-"}</button>
            </div>
          </div>
          <div class="ticket-details" ${isCollapsed ? "hidden" : ""}>
            ${failureBriefPanel(task, sourceColumnKey)}
            ${doneFeedbackForm(task, key, sourceColumnKey)}
            ${unclaimButton}
            <div class="ticket-head">
              <div class="ticket-id">${escapeText(task.id || "No ID")}</div>
              <div class="priority ${priority.toLowerCase()}">${priority}</div>
            </div>
            ${ownerFeedbackPanel(task, sourceColumnKey)}
            ${field("Inspect Change", renderInspectionTargets(task.inspectionTargets))}
            ${task.summary ? `<p class="summary">${escapeText(task.summary)}</p>` : ""}
            ${chips.length ? `<div class="chips">${chips.map((chip) => `<span class="chip">${escapeText(chip)}</span>`).join("")}</div>` : ""}
            ${field("Requirements", listItems(task.requirements))}
            ${field("Acceptance", listItems(task.acceptanceCriteria))}
            ${field("Files", renderFiles(task.files))}
            ${field("Blockers", listItems(task.blockers))}
            ${task.notes ? field("Notes", `<p class="summary">${escapeText(task.notes)}</p>`) : ""}
          </div>
        </article>
      `;
    }

    function archiveCloseButton() {
      return `<button class="icon-button archive-close" type="button" data-archive-close aria-label="Close archived panel" title="Close archived panel">&times;</button>`;
    }

    function workflowCloseButton() {
      return `<button class="icon-button workflow-close" type="button" data-workflow-close aria-label="Close workflow panel" title="Close workflow panel">&times;</button>`;
    }

    function doneFocusButton() {
      const label = doneFocusOpen ? "Restore all columns" : "Expand Done column";
      const icon = doneFocusOpen ? "&#x21A9;" : "&#x26F6;";
      return `<button class="icon-button done-focus-toggle" type="button" data-done-focus-toggle aria-pressed="${doneFocusOpen ? "true" : "false"}" aria-label="${label}" title="${label}">${icon}</button>`;
    }

    function workflowCount(normalized, columnKey) {
      return columnTasks(normalized.columns[columnKey], columnKey).length;
    }

    function workflowDetailDefinitions(normalized) {
      const todoCount = workflowCount(normalized, "todo");
      const claimedCount = workflowCount(normalized, "claimed");
      const reviewCount = workflowCount(normalized, "review");
      const reviewingCount = workflowCount(normalized, "reviewing");
      const doneCount = workflowCount(normalized, "done");
      const archivedCount = workflowCount(normalized, "archived");
      return {
        "planning-agent": {
          kind: "Agent",
          title: "Planner",
          color: "#476f8f",
          summary: "Turns the owner's requirements into deduplicated task-board todo cards. It does not implement or review.",
          sections: {
            "Start Phrase": [
              "load as planner"
            ],
            Context: [
              "Consumes the owner's direct requirements.",
              "Current todo count: " + todoCount + ".",
              "Checks todo, claimed, review, reviewing, done, and archived before creating or changing tasks."
            ],
            Reads: [
              "The owner's requirements from chat.",
              "The full task board through GET /api/board when the backend is running."
            ],
            "Backend Data Seen": [

      const claimedCount = workflowCount(normalized, "claimed");
      const reviewCount = workflowCount(normalized, "review");
      const reviewingCount = workflowCount(normalized, "reviewing");

    function workflowDetailSection(title, items) {
      if (!Array.isArray(items) || !items.length) return "";
      const isStartPhrase = title === "Start Phrase";
      if (isStartPhrase) {
        const phrases = [];
        items.forEach((item) => {
          const phrase = String(item || "").trim();
          if (phrase && !phrases.includes(phrase)) {
            phrases.push(phrase);
          }
        });
        if (phrases.length) {
          const startPhrase = phrases[0].endsWith(" and start") ? phrases[0] : `${phrases[0]} and start`;
          if (!phrases.includes(startPhrase)) {
            phrases.push(startPhrase);
          }
        }
        return `
          <section class="workflow-detail-section">
            <div class="workflow-detail-section-header">
              <h4>${escapeText(title)}</h4>
            </div>
            <ul class="start-phrase-list">
              ${phrases.map((phrase) => `
                <li class="start-phrase-item">
                  <span class="start-phrase-text">${escapeText(phrase)}</span>
                  <button class="copy-start-phrase" type="button" data-copy-start-phrase="${escapeText(phrase)}" aria-label="Copy start phrase">Copy</button>
                </li>
              `).join("")}
            </ul>
          </section>
        `;
      }

      return `
        <section class="workflow-detail-section">
          <h4>${escapeText(title)}</h4>
          <ul>${items.map((item) => `<li>${escapeText(item)}</li>`).join("")}</ul>
        </section>
      `;
    }

    function normalizeBoard(board) {
      const normalized = { ...fallbackBoard, ...board };
      normalized.columns = { ...fallbackBoard.columns, ...(board.columns || {}) };
      const taskLookup = normalized.tasks && typeof normalized.tasks === "object" ? normalized.tasks : {};
      Object.keys(normalized.columns).forEach((columnKey) => {
        const tasks = Array.isArray(normalized.columns[columnKey]) ? normalized.columns[columnKey] : [];
        normalized.columns[columnKey] = tasks
          .map((task) => {
            if (typeof task === "string") return taskLookup[task] || null;
            return task;
          })
          .filter(hasRenderableTitle);
      });
      return normalized;
    }

    async function loadJson(url) {
      if (typeof window.fetch === "function") {
        const response = await window.fetch(url, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.json();
      }

      return new Promise((resolve, reject) => {
        const request = new XMLHttpRequest();
        request.open("GET", url, true);
        request.overrideMimeType("application/json");
        request.onload = () => {
          if (request.status >= 200 && request.status < 300) {
            try {
              resolve(JSON.parse(request.responseText));
            } catch (error) {
              reject(error);
            }
            return;
          }
          reject(new Error(`HTTP ${request.status}`));
        };
        request.onerror = () => reject(new Error("Could not load JSON"));
        request.send();
      });
    }

    async function loadAgents() {
      try {
        return await loadJson("/viewer/agents?agentName=Task%20board%20viewer");
      } catch (error) {
        return fallbackAgents;
      }
    }

    async function loadAgentSchema() {
      try {
        const schema = await loadJson("/viewer/agent-schema");
        if (schema && typeof schema === "object") {
          currentAgentSchema = {
            modelBackground: schema.modelBackground || fallbackAgentSchema.modelBackground,
            roleBorder: schema.roleBorder || fallbackAgentSchema.roleBorder,
            personalNamePool: Array.isArray(schema.personalNamePool) ? schema.personalNamePool : []
          };
        }
        return currentAgentSchema;
      } catch (error) {
        currentAgentSchema = fallbackAgentSchema;
        return currentAgentSchema;
      }
    }

    async function loadDispatchSettings() {
      try {
        const settings = await loadJson("/viewer/dispatch-settings");
        currentDispatchSettings = settings && typeof settings === "object" ? settings : fallbackDispatchSettings;
        return currentDispatchSettings;
      } catch (error) {
        currentDispatchSettings = fallbackDispatchSettings;
        return currentDispatchSettings;
      }
    }

    function dispatchSettingsForRole(role) {
      const settings = currentDispatchSettings?.[role] || fallbackDispatchSettings[role] || {};
      const maxAgents = Number.parseInt(settings.maxAgents, 10);
      return {
        enabled: Boolean(settings.enabled),
        model: settings.model === "claude" ? "claude" : "codex",
        maxAgents: Number.isNaN(maxAgents) ? 1 : Math.max(0, Math.min(maxAgents, 8))
      };
    }

    async function saveDispatchSettings(role, updates) {
      const current = dispatchSettingsForRole(role);
      const payload = {
        role,
        enabled: "enabled" in updates ? Boolean(updates.enabled) : current.enabled,
        model: updates.model || current.model,
        maxAgents: "maxAgents" in updates ? Number(updates.maxAgents) : current.maxAgents
      };
      const settings = await postJson("/viewer/dispatch-settings", payload);
      currentDispatchSettings = settings && typeof settings === "object" ? settings : currentDispatchSettings;
      renderBoard(currentBoard, currentSourceLabel);
      return currentDispatchSettings;
    }

    function postJson(url, payload) {
      const requestPayload = {
        agentName: "owner via task board viewer",
        ...payload
      };
      if (typeof window.fetch === "function") {
        return window.fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(requestPayload)
        }).then(async (response) => {
          const data = await response.json().catch(() => ({}));
          if (!response.ok) throw new Error(data.error || `HTTP ${response.status}`);
          return data;
        });
      }

      return new Promise((resolve, reject) => {
        const request = new XMLHttpRequest();
        request.open("POST", url, true);
        request.setRequestHeader("Content-Type", "application/json");
        request.onload = () => {
          let data = {};
          try {
            data = JSON.parse(request.responseText || "{}");
          } catch (error) {
            reject(error);
            return;
          }
          if (request.status >= 200 && request.status < 300) {
            resolve(data);
            return;
          }
          reject(new Error(data.error || `HTTP ${request.status}`));
        };
        request.onerror = () => reject(new Error("Could not persist board action"));
        request.send(JSON.stringify(requestPayload));
      });
    }

    async function spawnAgent(role, tool, triggerButton) {
      const roleLabel = role === "worker" ? "Worker Agent" : role === "review" ? "Review Agent" : `${role} agent`;
      const toolLabel = tool === "claude" ? "Claude" : tool === "codex" ? "Codex" : tool;
      const previousLabel = triggerButton ? triggerButton.textContent : "";
      if (triggerButton) {
        triggerButton.disabled = true;
        triggerButton.textContent = "Spawning...";
      }
      statusEl.textContent = `Spawning ${roleLabel} in ${toolLabel}...`;
      try {
        const result = await postJson("/viewer/spawn-agent", { role, tool });
        const phrase = result?.startPhrase || "";
        const processText = result?.processId ? ` PID: ${result.processId}.` : "";
        const logText = result?.logPath ? ` Log: ${result.logPath}.` : "";
        statusEl.textContent = `Spawned ${roleLabel} in ${toolLabel} non-interactively.${processText}${logText} Start phrase: "${phrase}"`;
      } catch (error) {
        statusEl.textContent = `Spawn failed (${roleLabel} / ${toolLabel}): ${error.message}`;
      } finally {
        if (triggerButton) {
          triggerButton.disabled = false;
          triggerButton.textContent = previousLabel;
        }
      }
    }

    async function archiveTask(taskId) {
      statusEl.textContent = `Archiving ${taskId}...`;
      try {
        await postJson("/viewer/archive", {
          taskId,
          archivedBy: "Task board viewer"
        });
        const [board, agents] = await Promise.all([
          loadJson("board.json"),
          loadAgents()
        ]);
        collapsedTasks.delete(taskId);
        renderBoard(board, "board.json", agents);
        statusEl.textContent = `Archived ${taskId} and updated board.json.`;
      } catch (error) {
        statusEl.textContent = `Archive failed for ${taskId}: ${error.message}`;
      }
    }

    async function unclaimTask(taskId) {
      statusEl.textContent = `Unclaiming ${taskId}...`;
      try {
        await postJson("/viewer/unclaim-task", {
          taskId,
          unclaimedBy: "owner via task board viewer",
          reason: "Worker agent was killed before finishing."
        });
        const [board, agents] = await Promise.all([
          loadJson("board.json"),
          loadAgents()
        ]);
        collapsedTasks.delete(taskId);
        renderBoard(board, "board.json", agents);
        statusEl.textContent = `Unclaimed ${taskId} and moved it back to To Do.`;
      } catch (error) {
        statusEl.textContent = `Unclaim failed for ${taskId}: ${error.message}`;
      }
    }

    async function returnTaskToReview(taskId, feedback) {
      statusEl.textContent = `Sending ${taskId} back to review...`;
      try {
        await postJson("/viewer/return-to-review", {
          taskId,
          feedback,
          returnedBy: "owner via task board viewer"
        });
        const [board, agents] = await Promise.all([
          loadJson("board.json"),
          loadAgents()
        ]);
        collapsedTasks.delete(taskId);
        renderBoard(board, "board.json", agents);
        statusEl.textContent = `Moved ${taskId} back to Review with feedback.`;
      } catch (error) {
        statusEl.textContent = `Feedback failed for ${taskId}: ${error.message}`;
      }
    }

    function laneMarkup(key, label, tasks, options = {}) {
      const allCollapsed = tasks.length > 0 && tasks.every((task) => collapsedTasks.has(taskKey(task)));
      const laneToggleLabel = allCollapsed ? `Expand all ${label} tasks` : `Collapse all ${label} tasks`;
      const extraActions = options.extraActions || "";
      const agentSummary = options.agentRole ? agentSummaryMarkup(options.agentRole, options.agentLabel || "Agents") : "";
      const spawnButtons = options.agentRole ? spawnButtonsMarkup(options.agentRole) : "";
      const body = tasks.length
        ? tasks.map((task) => ticketCard(task, key)).join("")
        : `<div class="empty">No ${escapeText(label.toLowerCase())} tasks</div>`;
      const addlClass = options.extraClass ? ` ${options.extraClass}` : "";
      const agentClass = options.agentRole ? " has-agent-controls" : "";
      const agentStrip = options.showAgentStrip === false ? "" : laneAgentStripMarkup(options.agentRole || "");

      return `
        <section class="lane ${key}${addlClass}${agentClass}" aria-label="${escapeText(label)}">
          ${agentStrip}
          <div class="lane-header">
            <div class="lane-title"><span class="dot"></span><span>${escapeText(label)}</span></div>
            <div class="lane-actions">
              ${agentSummary}
              ${spawnButtons}
              <span class="count">${tasks.length}</span>
              <button class="icon-button lane-toggle" type="button" data-lane-toggle="${escapeText(key)}" aria-label="${laneToggleLabel}" title="${laneToggleLabel}" ${tasks.length ? "" : "disabled"}>${allCollapsed ? "+" : "-"}</button>
              ${extraActions}
            </div>
          </div>
          <div class="lane-body">${body}</div>
        </section>
      `;
    }

    function renderBoard(board, sourceLabel, agentsState = currentAgents) {
      const normalized = normalizeBoard(board);
      currentBoard = normalized;
      currentSourceLabel = sourceLabel;
      currentAgents = agentsState && typeof agentsState === "object" ? agentsState : fallbackAgents;
      boardNameEl.textContent = normalized.boardName || "Project Task Board";
      updatedAtEl.textContent = `Updated: ${normalized.updatedAt || "unknown"}`;
      sourceNameEl.textContent = `Source: ${sourceLabel}`;

      boardEl.classList.toggle("is-done-focus", doneFocusOpen);
      if (doneFocusOpen) {
        const foldedLanes = visualColumns
          .filter((column) => column.key !== "done")
          .map((column) => laneMarkup(column.key, column.label, visualColumnTasks(normalized, column), {
            agentRole: column.agentRole,
            agentLabel: column.agentLabel
          }))
          .join("");
        const doneColumn = visualColumns.find((column) => column.key === "done");
        const doneTasks = visualColumnTasks(normalized, doneColumn);
        boardEl.innerHTML = `
          <div class="folded-stack" aria-label="Folded task columns">${foldedLanes}</div>
          ${laneMarkup("done", "Done", doneTasks, { extraActions: doneFocusButton() })}
        `;
      } else {
        boardEl.innerHTML = visualColumns.map((column) => {
          const tasks = visualColumnTasks(normalized, column);
          return laneMarkup(column.key, column.label, tasks, {
            extraActions: column.key === "done" ? doneFocusButton() : "",
            agentRole: column.agentRole,
            agentLabel: column.agentLabel
          });
        }).join("");
      }

      const archivedTasks = columnTasks(normalized.columns.archived, "archived");
      renderWorkflowPanel(normalized);
      archiveEl.classList.toggle("is-open", archiveTrayOpen);
      archiveEl.innerHTML = `
        <button class="archive-tab" type="button" data-archive-toggle aria-expanded="${archiveTrayOpen ? "true" : "false"}" aria-controls="archived-panel">
          <span class="dot" aria-hidden="true"></span>
          <span>Archived (${archivedTasks.length})</span>
        </button>
        <div class="archive-tray" id="archived-panel" aria-hidden="${archiveTrayOpen ? "false" : "true"}">
          ${laneMarkup("archived", "Archived", archivedTasks, {
            extraClass: "archived-tray-lane",
            extraActions: archiveCloseButton(),
            showAgentStrip: false
          })}
        </div>
      `;
    }

    function toggleArchiveTray(forceOpen) {
      if (typeof forceOpen === "boolean") {
        archiveTrayOpen = forceOpen;
      } else {
        archiveTrayOpen = !archiveTrayOpen;
      }
      renderBoard(currentBoard, currentSourceLabel);
    }

    function toggleWorkflowPanel(forceOpen) {
      if (typeof forceOpen === "boolean") {
        workflowPanelOpen = forceOpen;
      } else {
        workflowPanelOpen = !workflowPanelOpen;
      }
      if (!workflowPanelOpen) {
        workflowDetailKey = "";
      }
      renderBoard(currentBoard, currentSourceLabel);
    }

    function toggleDoneFocus(forceOpen) {
      if (typeof forceOpen === "boolean") {
        doneFocusOpen = forceOpen;
      } else {
        doneFocusOpen = !doneFocusOpen;
      }
      renderBoard(currentBoard, currentSourceLabel);
    }

    async function copyTextToClipboard(text) {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return;
      }

      const input = document.createElement("textarea");
      input.value = text;
      input.setAttribute("readonly", "");
      input.style.position = "fixed";
      input.style.left = "-9999px";
      document.body.appendChild(input);
      input.select();
      const copied = document.execCommand("copy");
      document.body.removeChild(input);
      if (!copied) {
        throw new Error("Clipboard copy failed");
      }
    }

    boardEl.addEventListener("click", (event) => {
      const autoDispatchButton = event.target.closest("[data-auto-dispatch-role]");
      if (autoDispatchButton) {
        const role = autoDispatchButton.dataset.autoDispatchRole;
        const current = dispatchSettingsForRole(role);
        autoDispatchButton.disabled = true;
        saveDispatchSettings(role, { enabled: !current.enabled })
          .then(() => {
            statusEl.textContent = `${role === "worker" ? "Worker" : "Review"} auto dispatch ${!current.enabled ? "enabled" : "disabled"}.`;
          })
          .catch((error) => {
            statusEl.textContent = `Auto dispatch update failed: ${error.message}`;
          })
          .finally(() => {
            autoDispatchButton.disabled = false;
          });
        return;
      }

      const spawnButton = event.target.closest("[data-spawn-agent]");
      if (spawnButton) {
        const role = spawnButton.dataset.spawnAgent;
        const tool = spawnButton.dataset.spawnTool || dispatchSettingsForRole(role).model;
        spawnAgent(role, tool, spawnButton);
        return;
      }

      const doneFocusButton = event.target.closest("[data-done-focus-toggle]");
      if (doneFocusButton) {
        toggleDoneFocus();
        return;
      }

      const archiveButton = event.target.closest("[data-archive-task]");
      if (archiveButton) {
        archiveTask(archiveButton.dataset.archiveTask);
        return;
      }

      const unclaimButton = event.target.closest("[data-unclaim-task]");
      if (unclaimButton) {
        unclaimTask(unclaimButton.dataset.unclaimTask);
        return;
      }

      const taskButton = event.target.closest("[data-task-toggle]");
      if (taskButton) {
        const key = taskButton.dataset.taskToggle;
        if (collapsedTasks.has(key)) {
          collapsedTasks.delete(key);
        } else {
          collapsedTasks.add(key);
        }
        renderBoard(currentBoard, currentSourceLabel);
        return;
      }

      const laneButton = event.target.closest("[data-lane-toggle]");
      if (!laneButton) return;

      const columnKey = laneButton.dataset.laneToggle;
      const visualColumn = visualColumns.find((column) => column.key === columnKey);
      const tasks = visualColumn
        ? visualColumnTasks(currentBoard, visualColumn)
        : columnTasks(currentBoard.columns[columnKey], columnKey);
      const keys = tasks.map(taskKey);
      const allCollapsed = keys.length > 0 && keys.every((key) => collapsedTasks.has(key));

      keys.forEach((key) => {
        if (allCollapsed) {
          collapsedTasks.delete(key);
        } else {
          collapsedTasks.add(key);
        }
      });

      renderBoard(currentBoard, currentSourceLabel);
    });

    boardEl.addEventListener("change", (event) => {
      const modelControl = event.target.closest("[data-dispatch-model]");
      if (modelControl) {
        const role = modelControl.dataset.dispatchModel;
        saveDispatchSettings(role, { model: modelControl.value })
          .then(() => {
            statusEl.textContent = `${role === "worker" ? "Worker" : "Review"} model set to ${modelControl.value}.`;
          })
          .catch((error) => {
            statusEl.textContent = `Model update failed: ${error.message}`;
          });
        return;
      }

      const maxControl = event.target.closest("[data-dispatch-max]");
      if (maxControl) {
        const role = maxControl.dataset.dispatchMax;
        const maxAgents = Math.max(0, Math.min(Number.parseInt(maxControl.value, 10) || 0, 8));
        maxControl.value = String(maxAgents);
        saveDispatchSettings(role, { maxAgents })
          .then(() => {
            statusEl.textContent = `${role === "worker" ? "Worker" : "Review"} max agents set to ${maxAgents}.`;
          })
          .catch((error) => {
            statusEl.textContent = `Max update failed: ${error.message}`;
          });
      }
    });

    boardEl.addEventListener("submit", (event) => {
      const form = event.target.closest("[data-review-feedback-form]");
      if (!form) return;

      event.preventDefault();
      const taskId = form.dataset.reviewFeedbackForm;
      const input = form.querySelector("[data-review-feedback-input]");
      const feedback = input?.value?.trim() || "";

      if (!feedback) {
        statusEl.textContent = "Add feedback before sending the task back to Review.";
        input?.focus();
        return;
      }

      returnTaskToReview(taskId, feedback);
    });

    workflowEl.addEventListener("click", (event) => {
      const workflowToggleButton = event.target.closest("[data-workflow-toggle]");
      if (workflowToggleButton) {
        toggleWorkflowPanel();
        return;
      }

      const workflowCloseButton = event.target.closest("[data-workflow-close]");
      if (workflowCloseButton) {
        toggleWorkflowPanel(false);
        return;
      }

      const detailCloseButton = event.target.closest("[data-workflow-detail-close]");
      if (detailCloseButton) {
        workflowDetailKey = "";
        renderBoard(currentBoard, currentSourceLabel);
        return;
      }

      const detailBackdrop = event.target.closest("[data-workflow-detail-backdrop]");
      if (detailBackdrop && event.target === detailBackdrop) {
        workflowDetailKey = "";
        renderBoard(currentBoard, currentSourceLabel);
        return;
      }

      const copyButton = event.target.closest("[data-copy-start-phrase]");
      if (copyButton) {
        const phrase = copyButton.dataset.copyStartPhrase || "";
        copyTextToClipboard(phrase)
          .then(() => {
            copyButton.textContent = "Copied";
            copyButton.classList.add("is-copied");
            statusEl.textContent = `Copied "${phrase}".`;
            window.setTimeout(() => {
              copyButton.textContent = "Copy";
              copyButton.classList.remove("is-copied");
            }, 1400);
          })
          .catch(() => {
            statusEl.textContent = `Could not copy "${phrase}".`;
          });
        return;
      }

      const detailButton = event.target.closest("[data-workflow-detail]");
      if (detailButton) {
        workflowDetailKey = detailButton.dataset.workflowDetail || "";
        workflowPanelOpen = true;
        renderBoard(currentBoard, currentSourceLabel);
        return;
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && workflowDetailKey) {
        workflowDetailKey = "";
        renderBoard(currentBoard, currentSourceLabel);
      }
    });

    archiveEl.addEventListener("click", (event) => {
      const archiveToggleButton = event.target.closest("[data-archive-toggle]");
      if (archiveToggleButton) {
        toggleArchiveTray();
        return;
      }

      const archiveCloseButton = event.target.closest("[data-archive-close]");
      if (archiveCloseButton) {
        toggleArchiveTray(false);
        return;
      }

      const taskButton = event.target.closest("[data-task-toggle]");
      if (taskButton) {
        const key = taskButton.dataset.taskToggle;
        if (collapsedTasks.has(key)) {
          collapsedTasks.delete(key);
        } else {
          collapsedTasks.add(key);
        }
        renderBoard(currentBoard, currentSourceLabel);
        return;
      }

      const laneButton = event.target.closest("[data-lane-toggle]");
      if (!laneButton) return;

      const columnKey = laneButton.dataset.laneToggle;
      const tasks = columnTasks(currentBoard.columns[columnKey], columnKey);
      const keys = tasks.map(taskKey);
      const allCollapsed = keys.length > 0 && keys.every((key) => collapsedTasks.has(key));

      keys.forEach((key) => {
        if (allCollapsed) {
          collapsedTasks.delete(key);
        } else {
          collapsedTasks.add(key);
        }
      });

      renderBoard(currentBoard, currentSourceLabel);
    });

    async function loadDefaultBoard(options = {}) {
      const silent = Boolean(options.silent);
      if (!silent) {
        statusEl.textContent = "Loading board.json...";
      }
      try {
        const [board, agents] = await Promise.all([
          loadJson("board.json"),
          loadAgents(),
          loadAgentSchema(),
          loadDispatchSettings()
        ]);
        renderBoard(board, "board.json", agents);
        statusEl.textContent = silent
          ? `Auto refreshed ${new Date().toLocaleTimeString()}.`
          : "Loaded board.json.";
      } catch (error) {
        if (silent) {
          statusEl.textContent = `Auto refresh failed: ${error.message}`;
          return;
        }
        renderBoard(fallbackBoard, "fallback");
        statusEl.textContent = "Could not auto-load board.json. Use Load JSON file if the browser blocks local file access.";
      }
    }

    function setAutoRefresh(enabled) {
      if (enabled && !autoRefreshTimer) {
        autoRefreshButton.textContent = "Auto refresh: On";
        autoRefreshButton.setAttribute("aria-pressed", "true");
        autoRefreshTimer = window.setInterval(async () => {
          if (autoRefreshInFlight) return;
          autoRefreshInFlight = true;
          try {
            await loadDefaultBoard({ silent: true });
          } finally {
            autoRefreshInFlight = false;
          }
        }, 1000);
        loadDefaultBoard({ silent: true });
        return;
      }

      if (!enabled && autoRefreshTimer) {
        window.clearInterval(autoRefreshTimer);
        autoRefreshTimer = null;
        autoRefreshButton.textContent = "Auto refresh: Off";
        autoRefreshButton.setAttribute("aria-pressed", "false");
        statusEl.textContent = "Auto refresh stopped.";
      }
    }

    fileInput.addEventListener("change", async (event) => {
      const [file] = event.target.files;
      if (!file) return;

      try {
        const text = await file.text();
        const board = JSON.parse(text);
        renderBoard(board, file.name);
        statusEl.textContent = `Loaded ${file.name}.`;
      } catch (error) {
        statusEl.textContent = `Could not load ${file.name}: ${error.message}`;
      }
    });

    reloadButton.addEventListener("click", () => loadDefaultBoard());
    autoRefreshButton.addEventListener("click", () => setAutoRefresh(!autoRefreshTimer));
    loadDefaultBoard();
  </script>
</body>
</html>
