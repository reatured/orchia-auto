    function workflowNode(step, badge) {
      const badgeHtml = badge
        ? `<span class="count workflow-state-count" style="background: ${step.color}">${escapeText(badge)}</span>`
        : "";
      const humanInput = !!step.acceptsHumanInput;
      const humanAttrs = humanInput
        ? ` data-human-input="1" data-chat-detail="${escapeText(step.key)}" data-chat-label="${escapeText(step.label)}"`
        : "";
      const humanBadge = humanInput
        ? `<span class="workflow-human-badge" title="Accepts human input — click to open chat">&#128172; Human input</span>`
        : "";
      return `
        <button class="workflow-state workflow-state-${escapeText(step.key)}${humanInput ? " has-human-input" : ""}" type="button" data-workflow-detail="${escapeText(step.key)}"${humanAttrs} style="--node-color: ${step.color}" aria-label="${humanInput ? "Open chat with " : "Open workflow details for "}${escapeText(step.label)}">
          <span>
            <span class="workflow-state-kicker">${escapeText(step.kind || "State")}</span>
          </span>
          <span class="workflow-state-title">
            <span>${escapeText(step.label)}</span>
            ${badgeHtml}
          </span>
          <span class="workflow-state-meta">${escapeText(step.meta)}</span>
          ${humanBadge}
        </button>
      `;
    }

    function workflowBranch(detailKey, title, text) {
      return `
        <button class="workflow-branch" type="button" data-workflow-detail="${escapeText(detailKey)}" aria-label="Open workflow details for ${escapeText(title)}">
          <strong>${escapeText(title)}</strong>
          ${escapeText(text)}
        </button>
      `;
    }

    function buildWorkflowGraph(normalized) {
      var todoCount = workflowCount(normalized, "todo");
      var claimedCount = workflowCount(normalized, "claimed");
      var reviewCount = workflowCount(normalized, "review");
      var reviewingCount = workflowCount(normalized, "reviewing");
      var activeWorkerCount = activeAgentsForRole("worker").length;
      var activeReviewCount = activeAgentsForRole("review").length;

      var nodeDefs = {
        auditor:  { key: "frontend-auditor",  kind: "Upstream agent", label: "Web Front-End Auditor", color: "#4f7f77", meta: "Finds visual UI issues before planning." },
        handoff:  { key: "frontend-handoff",  kind: "Artifact",       label: "Audit Handoff",          color: "#8c6f40", meta: "Markdown findings for Planner." },
        planner:  { key: "planning-agent",    kind: "Agent",          label: "Planner",                color: "#476f8f", meta: "Turns requirements and handoffs into todo cards.", acceptsHumanInput: true },
        worker:   { key: "worker-agent",      kind: "Agent",          label: "Worker",                 color: "var(--claimed)", meta: "Claims todo work, implements it, and requests review." },
        reviewer: { key: "review-agent",      kind: "Agent",          label: "Reviewer",               color: "#7f6cae", meta: "Claims review work, validates it, and decides outcome." }
      };

      var badges = {
        planner:  todoCount,
        worker:   activeWorkerCount ? (activeWorkerCount + " active") : claimedCount,
        reviewer: activeReviewCount ? (activeReviewCount + " active") : reviewCount + reviewingCount
      };

      var layout = [
        { ids: ["auditor"] },
        { ids: ["handoff"] },
        { ids: ["planner"] },
        { ids: ["worker"] },
        { ids: ["reviewer"] }
      ];

      var edges = [
        { from: "auditor",  to: "handoff",  label: "visual findings" },
        { from: "handoff",  to: "planner",  label: "planning input" },
        { from: "planner",  to: "worker",   label: "todo tickets" },
        { from: "worker",   to: "reviewer", label: "inspection targets + review request" }
      ];

      var rows = layout.map(function(row) {
        return {
          nodes: row.ids.map(function(id) {
            return { id: id, step: nodeDefs[id], badge: badges[id] || null };
          })
        };
      });

      return { rows: rows, edges: edges };
    }

    function workflowGraphEdgeBlock(sourceRow, targetRow, edges) {
      var VB_W = 1000;
      var VB_H = 52;
      var ARROW_SIZE = 6;
      var sCols = sourceRow.nodes.length;
      var tCols = targetRow.nodes.length;
      var MID_Y = VB_H * 0.40;
      var BOTTOM_Y = VB_H - ARROW_SIZE - 2;

      function colCenterX(col, totalCols) {
        return (col + 0.5) / totalCols * VB_W;
      }

      function arrowAt(x, y) {
        return '<polygon points="' + (x - ARROW_SIZE) + ',' + y + ' ' + (x + ARROW_SIZE) + ',' + y + ' ' + x + ',' + (y + ARROW_SIZE + 1) + '" class="wf-graph-edge-arrow"/>';
      }

      function labelPill(x, y, text) {
        var safeLabel = escapeText(text || "");
        var charW = 6.2;
        var padX = 14;
        var textW = safeLabel.length * charW;
        var pillW = Math.max(textW + padX, 32);
        var pillH = 16;
        var html = '<rect x="' + (x - pillW / 2) + '" y="' + (y - pillH / 2) + '" width="' + pillW + '" height="' + pillH + '" class="wf-graph-edge-label-bg"/>';
        html += '<text x="' + x + '" y="' + y + '" class="wf-graph-edge-label-text">' + safeLabel + '</text>';
        return html;
      }

      function nodeIdx(row, id) {
        for (var i = 0; i < row.nodes.length; i++) {
          if (row.nodes[i].id === id) return i;
        }
        return -1;
      }

      var paths = "";
      var labels = "";

      var bySource = {};
      var byTarget = {};
      edges.forEach(function(e) {
        if (!bySource[e.from]) bySource[e.from] = [];
        bySource[e.from].push(e);
        if (!byTarget[e.to]) byTarget[e.to] = [];
        byTarget[e.to].push(e);
      });

      var rendered = {};

      // 1. Merge groups: multiple sources → single target
      Object.keys(byTarget).forEach(function(targetId) {
        var targetEdges = byTarget[targetId];
        if (targetEdges.length <= 1) return;

        var ti = nodeIdx(targetRow, targetId);
        if (ti < 0) return;
        var tx = colCenterX(ti, tCols);

        var sourceXs = [];
        targetEdges.forEach(function(e) {
          var si = nodeIdx(sourceRow, e.from);
          if (si >= 0) sourceXs.push(colCenterX(si, sCols));
        });
        sourceXs.sort(function(a, b) { return a - b; });

        sourceXs.forEach(function(sx) {
          paths += '<line x1="' + sx + '" y1="0" x2="' + sx + '" y2="' + MID_Y + '" class="wf-graph-edge-line"/>';
        });
        if (sourceXs.length > 1) {
          paths += '<line x1="' + sourceXs[0] + '" y1="' + MID_Y + '" x2="' + sourceXs[sourceXs.length - 1] + '" y2="' + MID_Y + '" class="wf-graph-edge-line"/>';
        }
        paths += '<line x1="' + tx + '" y1="' + MID_Y + '" x2="' + tx + '" y2="' + BOTTOM_Y + '" class="wf-graph-edge-line"/>';
        paths += arrowAt(tx, BOTTOM_Y);

        var mergeLx = sourceXs.reduce(function(a, b) { return a + b; }, 0) / sourceXs.length;
        labels += labelPill(mergeLx, MID_Y, targetEdges[0].label || "");
        targetEdges.forEach(function(e) { rendered[e.from + "\u2192" + e.to] = true; });
      });

      // 2. Split groups: single source → multiple targets
      Object.keys(bySource).forEach(function(sourceId) {
        var sourceEdges = bySource[sourceId];
        if (sourceEdges.length <= 1) return;
        var allDone = sourceEdges.every(function(e) { return rendered[e.from + "\u2192" + e.to]; });
        if (allDone) return;

        var si = nodeIdx(sourceRow, sourceId);
        if (si < 0) return;
        var sx = colCenterX(si, sCols);

        var targetXs = [];
        sourceEdges.forEach(function(e) {
          if (rendered[e.from + "\u2192" + e.to]) return;
          var ti = nodeIdx(targetRow, e.to);
          if (ti >= 0) targetXs.push(colCenterX(ti, tCols));
        });
        targetXs.sort(function(a, b) { return a - b; });
        if (!targetXs.length) return;

        paths += '<line x1="' + sx + '" y1="0" x2="' + sx + '" y2="' + MID_Y + '" class="wf-graph-edge-line"/>';

        var spanMin = Math.min(sx, targetXs[0]);
        var spanMax = Math.max(sx, targetXs[targetXs.length - 1]);
        if (targetXs.length > 1 || Math.abs(sx - targetXs[0]) > 4) {
          paths += '<line x1="' + spanMin + '" y1="' + MID_Y + '" x2="' + spanMax + '" y2="' + MID_Y + '" class="wf-graph-edge-line"/>';
        }

        targetXs.forEach(function(tx) {
          paths += '<line x1="' + tx + '" y1="' + MID_Y + '" x2="' + tx + '" y2="' + BOTTOM_Y + '" class="wf-graph-edge-line"/>';
          paths += arrowAt(tx, BOTTOM_Y);
        });

        labels += labelPill(sx, MID_Y, sourceEdges[0].label || "");
        sourceEdges.forEach(function(e) { rendered[e.from + "\u2192" + e.to] = true; });
      });

      // 3. Simple 1:1 edges
      edges.forEach(function(e) {
        if (rendered[e.from + "\u2192" + e.to]) return;

        var si = nodeIdx(sourceRow, e.from);
        var ti = nodeIdx(targetRow, e.to);
        if (si < 0 || ti < 0) return;
        var sx = colCenterX(si, sCols);
        var tx = colCenterX(ti, tCols);

        if (Math.abs(sx - tx) < 4) {
          paths += '<line x1="' + sx + '" y1="0" x2="' + tx + '" y2="' + BOTTOM_Y + '" class="wf-graph-edge-line"/>';
          labels += labelPill(sx, VB_H * 0.42, e.label || "");
        } else {
          paths += '<path d="M' + sx + ',0 L' + sx + ',' + MID_Y + ' L' + tx + ',' + MID_Y + ' L' + tx + ',' + BOTTOM_Y + '" class="wf-graph-edge-line"/>';
          labels += labelPill((sx + tx) / 2, MID_Y, e.label || "");
        }
        paths += arrowAt(tx, BOTTOM_Y);
      });

      return '<div class="wf-graph-edge-block" aria-hidden="true"><svg viewBox="0 0 ' + VB_W + ' ' + VB_H + '" preserveAspectRatio="xMidYMid meet">' + paths + labels + '</svg></div>';
    }

    function workflowGraphMarkup(normalized) {
      var graph = buildWorkflowGraph(normalized);
      var activeCount = ["todo", "claimed", "review", "reviewing"].reduce(function(total, key) { return total + workflowCount(normalized, key); }, 0);
      var doneCount = workflowCount(normalized, "done");
      var archivedCount = workflowCount(normalized, "archived");

      var canvasHtml = '<div class="wf-graph-canvas" aria-label="Agent workflow map">';

      graph.rows.forEach(function(row, rowIdx) {
        var colCount = row.nodes.length;
        canvasHtml += '<div class="wf-graph-row" data-cols="' + colCount + '">';
        row.nodes.forEach(function(node) {
          canvasHtml += workflowNode(node.step, node.badge);
        });
        canvasHtml += '</div>';

        if (rowIdx < graph.rows.length - 1) {
          var nextRow = graph.rows[rowIdx + 1];
          var rowEdges = graph.edges.filter(function(e) {
            return row.nodes.some(function(n) { return n.id === e.from; }) &&
                   nextRow.nodes.some(function(n) { return n.id === e.to; });
          });
          if (rowEdges.length) {
            canvasHtml += workflowGraphEdgeBlock(row, nextRow, rowEdges);
          }
        }
      });

      canvasHtml += '</div>';

      return '\n        <section class="workflow-panel" id="workflow-panel" aria-hidden="' + (workflowPanelOpen ? "false" : "true") + '">\n          <div class="workflow-panel-header">\n            <div>\n              <h2>Agent Workflow Map</h2>\n              <p>Each clickable block is an agent or handoff artifact. Open one to see its context, goal, behavior, permissions, and hard rules.</p>\n            </div>\n            ' + workflowCloseButton() + '\n          </div>\n          <div class="workflow-graph">\n            ' + canvasHtml + '\n          </div>\n          <div class="workflow-stats">\n            <div class="workflow-stat"><strong>' + activeCount + '</strong><span>todo / claimed / review</span></div>\n            <div class="workflow-stat"><strong>' + doneCount + '</strong><span>done visible</span></div>\n            <div class="workflow-stat"><strong>' + archivedCount + '</strong><span>archived</span></div>\n          </div>\n        </section>\n      ';
    }

    function normalizeBoard(board) {
      const normalized = { ...fallbackBoard, ...board };
      normalized.columns = { ...fallbackBoard.columns, ...(board.columns || {}) };
      const taskLookup = normalized.tasks && typeof normalized.tasks === "object" ? normalized.tasks : {};
      Object.keys(normalized.columns).forEach((columnKey) => {
        const tasks = Array.isArray(normalized.columns[columnKey]) ? normalized.columns[columnKey] : [];
        normalized.columns[columnKey] = tasks
          .map((task) => {
            if (typeof task === "string") return taskLookup[task] || null;
            return task;
          })
          .filter(hasRenderableTitle);
      });
      return normalized;
    }

    async function loadJson(url) {
      if (typeof window.fetch === "function") {
        const response = await window.fetch(url, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.json();
      }

      return new Promise((resolve, reject) => {
        const request = new XMLHttpRequest();
        request.open("GET", url, true);
        request.overrideMimeType("application/json");
        request.onload = () => {
          if (request.status >= 200 && request.status < 300) {
            try {
              resolve(JSON.parse(request.responseText));
            } catch (error) {
              reject(error);
            }
            return;
          }
          reject(new Error(`HTTP ${request.status}`));
        };
        request.onerror = () => reject(new Error("Could not load JSON"));
        request.send();
      });
    }

    async function loadPauseStatus() {

        return normalizePauseStatus(await loadJson("/viewer/pause-status?agentName=Task%20board%20viewer"));
      } catch (error) {
        return normalizePauseStatus(currentDispatchSettings?.pause || fallbackPauseStatus);

    async function refreshPauseStatus(options = {}) {
      const previousPaused = currentPauseStatus.isPaused;
      currentPauseStatus = await loadPauseStatus();
      renderPauseControl();
      if (previousPaused !== currentPauseStatus.isPaused) {
        renderBoard(currentBoard, currentSourceLabel);
      }
      if (!options.silent) {
        statusEl.textContent = currentPauseStatus.isPaused
          ? pausedControlMessage("Task board paused")
          : "Task board pause cleared.";
      }
      return currentPauseStatus;
    }

    async function runPauseAction(action) {
      if (pauseActionInFlight) return;
      const isResume = action === "resume";
      pauseActionInFlight = true;
      renderPauseControl();
      statusEl.textContent = isResume ? "Resuming task board..." : "Pausing task board for one hour...";
      try {
        const endpoint = isResume ? "/viewer/resume-now" : "/viewer/pause-plus-one-hour";
        const payload = isResume ? {} : { pauseReason: "Owner clicked Pause +1h in viewer" };
        currentPauseStatus = normalizePauseStatus(await postJson(endpoint, payload));
        renderBoard(currentBoard, currentSourceLabel);
        statusEl.textContent = currentPauseStatus.isPaused
          ? pausedControlMessage(isResume ? "Task board paused" : "Task board pause extended")
          : "Task board pause cleared.";
      } catch (error) {
        statusEl.textContent = `${isResume ? "Resume" : "Pause"} failed: ${error.message}`;
        await refreshPauseStatus({ silent: true }).catch(() => {});
      } finally {
        pauseActionInFlight = false;
        renderPauseControl();
      }
    }

    function dispatchSettingsForRole(role) {
      const settings = currentDispatchSettings?.[role] || fallbackDispatchSettings[role] || {};
      const maxAgents = Number.parseInt(settings.maxAgents, 10);
      const validModels = ["claude", "codex", "qwen"];
      const model = validModels.includes(settings.model) ? settings.model : "codex";
      return {
        enabled: Boolean(settings.enabled),
        model,
        maxAgents: Number.isNaN(maxAgents) ? 1 : Math.max(0, Math.min(maxAgents, 8))
      };
    }

    function commandSettings() {
      const commands = currentDispatchSettings?.commands || fallbackDispatchSettings.commands || {};
      const fallbackCommands = fallbackDispatchSettings.commands;
      return {
        claude: String(commands.claude || fallbackCommands.claude || "claude").trim() || "claude",
        codex: String(commands.codex || fallbackCommands.codex || "codex").trim() || "codex",
        qwen: String(commands.qwen || fallbackCommands.qwen || "qwen").trim() || "qwen"
      };
    }

      const current = dispatchSettingsForRole(role);

        enabled: "enabled" in updates ? Boolean(updates.enabled) : current.enabled,
        model: updates.model || current.model,
        maxAgents: "maxAgents" in updates ? Number(updates.maxAgents) : current.maxAgents
      };
      const settings = await postJson("/viewer/dispatch-settings", payload);
      currentDispatchSettings = settings && typeof settings === "object" ? settings : currentDispatchSettings;
      renderBoard(currentBoard, currentSourceLabel);
      return currentDispatchSettings;
    }

      const payload = {

          claude: String(commands.claude || "").trim(),
          codex: String(commands.codex || "").trim(),
          qwen: String(commands.qwen || "").trim()
        }
      };
      if (!payload.commands.claude || !payload.commands.codex || !payload.commands.qwen) {

    function agentToolLabel(tool) {

      return tool || "Agent";

    function isMissingHealthCheckRoute(error) {
      const status = Number(error?.status || 0);
      const message = String(error?.message || error || "");
      return status === 404 || /\bHTTP 404\b/i.test(message) || /Unknown endpoint/i.test(message);
    }

    async function runAgentHealthCheck(tool, command, triggerButton) {
      const label = agentToolLabel(tool);
      const previousLabel = triggerButton ? triggerButton.textContent : "";
      if (triggerButton) {
        triggerButton.disabled = true;
        triggerButton.textContent = "Testing...";
      }
      statusEl.textContent = `Testing ${label} command...`;
      try {
        const result = await postJson("/viewer/agent-health-check", { tool, command });
        const seconds = result?.durationMs ? ` in ${(Number(result.durationMs) / 1000).toFixed(1)}s` : "";
        const output = String(result?.outputPreview || "").trim();
        const failureDetail = output ? ` Output: ${output}` : "";
        const suggestion = String(result?.suggestion || "").trim();
        const nextStep = suggestion ? ` Next step: ${suggestion}` : "";
        if (result?.ok) {
          statusEl.textContent = `${label} health check passed${seconds}.`;
        } else {
          const error = String(result?.error || result?.status || "command exited with an error").trim();
          statusEl.textContent = `${label} health check failed${seconds}: ${error}.${nextStep}${failureDetail}`;
        }
      } catch (error) {
        if (isMissingHealthCheckRoute(error)) {
          statusEl.textContent = `${label} health check is not available from the running backend. Restart task-board/server.py, refresh this page, and run the test again.`;
        } else {
          statusEl.textContent = `${label} health check failed: ${error.message}`;
        }
      } finally {
        if (triggerButton) {
          triggerButton.disabled = false;
          triggerButton.textContent = previousLabel;
        }
      }
    }

    function postJson(url, payload) {
      const requestPayload = {
        agentName: "owner via task board viewer",
        ...payload
      };
      if (typeof window.fetch === "function") {
        return window.fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(requestPayload)
        }).then(async (response) => {
          const data = await response.json().catch(() => ({}));
          if (!response.ok) {
            const error = new Error(data.error || `HTTP ${response.status}`);
            error.status = response.status;
            error.payload = data;
            throw error;
          }
          return data;
        });
      }

      return new Promise((resolve, reject) => {
        const request = new XMLHttpRequest();
        request.open("POST", url, true);
        request.setRequestHeader("Content-Type", "application/json");
        request.onload = () => {
          let data = {};
          try {
            data = JSON.parse(request.responseText || "{}");
          } catch (error) {
            reject(error);
            return;
          }
          if (request.status >= 200 && request.status < 300) {
            resolve(data);
            return;
          }
          const error = new Error(data.error || `HTTP ${request.status}`);
          error.status = request.status;
          error.payload = data;
          reject(error);
        };
        request.onerror = () => reject(new Error("Could not persist board action"));
        request.send(JSON.stringify(requestPayload));
      });
    }

    async function spawnAgent(role, tool, triggerButton) {
      const roleLabel = role === "worker" ? "Worker Agent" : role === "review" ? "Review Agent" : `${role} agent`;
      const toolLabel = tool === "claude" ? "Claude" : tool === "codex" ? "Codex" : tool === "qwen" ? "Qwen" : tool;
      const previousLabel = triggerButton ? triggerButton.textContent : "";
      if (currentPauseStatus.isPaused) {
        statusEl.textContent = pausedControlMessage(`${roleLabel} spawning is paused`);
        await refreshPauseStatus({ silent: true }).catch(() => {});
        return;
      }
      if (triggerButton) {
        triggerButton.disabled = true;
        triggerButton.textContent = "Spawning...";
      }
      statusEl.textContent = `Spawning ${roleLabel} in ${toolLabel}...`;
      try {
        const result = await postJson("/viewer/spawn-agent", { role, tool });
        const phrase = result?.startPhrase || "";
        const processText = result?.processId ? ` PID: ${result.processId}.` : "";
        const logText = result?.logPath ? ` Log: ${result.logPath}.` : "";
        statusEl.textContent = `Spawned ${roleLabel} in ${toolLabel} non-interactively.${processText}${logText} Start phrase: "${phrase}"`;
      } catch (error) {
        if (error.status === 423 || error.payload?.paused) {
          await refreshPauseStatus({ silent: true }).catch(() => {});
        }
        statusEl.textContent = `Spawn failed (${roleLabel} / ${toolLabel}): ${error.message}`;
      } finally {
        if (triggerButton) {
          triggerButton.disabled = false;
          triggerButton.textContent = previousLabel;
        }
      }
    }

    async function terminateAgent(agentId, processId, taskId, triggerButton) {
      const label = agentId || processId || "agent";
      const previousLabel = triggerButton ? triggerButton.textContent : "";
      if (triggerButton) {
        triggerButton.disabled = true;
        triggerButton.textContent = "Terminating...";

      statusEl.textContent = `Terminating agent ${label}...`;

        const payload = {};

    async function returnTaskToReview(taskId, feedback) {
      statusEl.textContent = `Sending ${taskId} back to review...`;

        await postJson("/viewer/return-to-review", {

        statusEl.textContent = `Moved ${taskId} back to Review with feedback.`;
      } catch (error) {
        statusEl.textContent = `Feedback failed for ${taskId}: ${error.message}`;
      }
    }

    function laneMarkup(key, label, tasks, options = {}) {
      const allCollapsed = tasks.length > 0 && tasks.every((task) => collapsedTasks.has(taskKey(task)));
      const laneToggleLabel = allCollapsed ? `Expand all ${label} tasks` : `Collapse all ${label} tasks`;
      const extraActions = options.extraActions || "";
      const agentSummary = options.agentRole ? agentSummaryMarkup(options.agentRole, options.agentLabel || "Agents") : "";
      const spawnButtons = options.agentRole ? spawnButtonsMarkup(options.agentRole) : "";
      const body = tasks.length
        ? tasks.map((task) => ticketCard(task, key)).join("")
        : `<div class="empty">No ${escapeText(label.toLowerCase())} tasks</div>`;
      const addlClass = options.extraClass ? ` ${options.extraClass}` : "";
      const agentClass = options.agentRole ? " has-agent-controls" : "";
      const agentStrip = options.showAgentStrip === false ? "" : laneAgentStripMarkup(options.agentRole || "");

      return `
        <section class="lane ${key}${addlClass}${agentClass}" aria-label="${escapeText(label)}">
          ${agentStrip}
          <div class="lane-header">
            <div class="lane-title"><span class="dot"></span><span>${escapeText(label)}</span></div>
            <div class="lane-actions">
              ${options.agentRole ? `<div class="lane-dispatch">${agentSummary}${spawnButtons}</div>` : ""}
              <div class="lane-tools">
                <span class="count">${tasks.length}</span>
                <button class="icon-button lane-toggle" type="button" data-lane-toggle="${escapeText(key)}" aria-label="${laneToggleLabel}" title="${laneToggleLabel}" ${tasks.length ? "" : "disabled"}>${allCollapsed ? "+" : "-"}</button>
                ${extraActions}
              </div>
            </div>
          </div>
          <div class="lane-body">${body}</div>
        </section>
      `;
    }

    function renderBoard(board, sourceLabel, agentsState = currentAgents) {
      syncViewportClientWidth();
      const normalized = normalizeBoard(board);
      currentBoard = normalized;
      currentSourceLabel = sourceLabel;
      currentAgents = agentsState && typeof agentsState === "object" ? agentsState : fallbackAgents;
      renderPauseControl();
      boardNameEl.textContent = normalized.boardName || "Project Task Board";
      updatedAtEl.textContent = `Updated: ${normalized.updatedAt || "unknown"}`;
      sourceNameEl.textContent = `Source: ${sourceLabel}`;

      boardEl.classList.toggle("is-done-focus", doneFocusOpen);
      if (doneFocusOpen) {
        const foldedLanes = visualColumns
          .filter((column) => column.key !== "done")
          .map((column) => laneMarkup(column.key, column.label, visualColumnTasks(normalized, column), {
            agentRole: column.agentRole,
            agentLabel: column.agentLabel
          }))
          .join("");
        const doneColumn = visualColumns.find((column) => column.key === "done");
        const doneTasks = visualColumnTasks(normalized, doneColumn);
        boardEl.innerHTML = `
          <div class="folded-stack" aria-label="Folded task columns">${foldedLanes}</div>
          ${laneMarkup("done", "Done", doneTasks, { extraActions: doneFocusButton() })}
        `;
      } else {
        boardEl.innerHTML = visualColumns.map((column) => {
          const tasks = visualColumnTasks(normalized, column);
          return laneMarkup(column.key, column.label, tasks, {
            extraActions: column.key === "done" ? doneFocusButton() : "",
            agentRole: column.agentRole,
            agentLabel: column.agentLabel
          });
        }).join("");
      }

      const archivedTasks = columnTasks(normalized.columns.archived, "archived");
      renderWorkflowPanel(normalized);
      archiveEl.classList.toggle("is-open", archiveTrayOpen);
      archiveEl.innerHTML = `
        <button class="archive-tab" type="button" data-archive-toggle aria-expanded="${archiveTrayOpen ? "true" : "false"}" aria-controls="archived-panel">
          <span class="dot" aria-hidden="true"></span>
          <span>Archived (${archivedTasks.length})</span>

        <div class="archive-tray" id="archived-panel" aria-hidden="${archiveTrayOpen ? "false" : "true"}">
          ${laneMarkup("archived", "Archived", archivedTasks, {
            extraClass: "archived-tray-lane",
            extraActions: archiveCloseButton(),
            showAgentStrip: false

    async function copyTextToClipboard(text) {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return;
      }

      const input = document.createElement("textarea");
      input.value = text;
      input.setAttribute("readonly", "");
      input.style.position = "fixed";
      input.style.left = "-9999px";
      document.body.appendChild(input);
      input.select();
      const copied = document.execCommand("copy");
      document.body.removeChild(input);
      if (!copied) {
        throw new Error("Clipboard copy failed");
      }
    }

    boardEl.addEventListener("click", (event) => {
      const terminateButton = event.target.closest("[data-terminate-agent]");
      if (terminateButton) {
        const wrapper = terminateButton.closest("[data-agent-run-key]");
        if (wrapper) {

          const processId = wrapper.getAttribute("data-terminate-process-id") || "";
          const taskId = wrapper.getAttribute("data-terminate-task-id") || "";
          terminateAgent(agentId, processId, taskId, terminateButton);
        }
        return;
      }

      const agentRunButton = event.target.closest(".agent-run-tab");
      if (agentRunButton) {

          togglePinnedAgentRun(wrapper.getAttribute("data-agent-run-key") || "");

        return;
      }

      const autoDispatchButton = event.target.closest("[data-auto-dispatch-role]");
      if (autoDispatchButton) {
        const role = autoDispatchButton.dataset.autoDispatchRole;
        if (currentPauseStatus.isPaused) {
          statusEl.textContent = pausedControlMessage(`${role === "worker" ? "Worker" : "Review"} auto dispatch is paused`);
          refreshPauseStatus({ silent: true }).catch(() => {});
          return;
        }
        const current = dispatchSettingsForRole(role);
        autoDispatchButton.disabled = true;
        saveDispatchSettings(role, { enabled: !current.enabled })
          .then(() => {
            statusEl.textContent = `${role === "worker" ? "Worker" : "Review"} auto dispatch ${!current.enabled ? "enabled" : "disabled"}.`;
          })
          .catch((error) => {
            statusEl.textContent = `Auto dispatch update failed: ${error.message}`;

          .finally(() => {
            autoDispatchButton.disabled = false;
          });
        return;
      }

      const spawnButton = event.target.closest("[data-spawn-agent]");
      if (spawnButton) {
        const role = spawnButton.dataset.spawnAgent;
        if (currentPauseStatus.isPaused) {
          statusEl.textContent = pausedControlMessage(`${role === "worker" ? "Worker" : "Review"} spawning is paused`);
          refreshPauseStatus({ silent: true }).catch(() => {});
          return;

        const tool = spawnButton.dataset.spawnTool || dispatchSettingsForRole(role).model;

      const doneFocusButton = event.target.closest("[data-done-focus-toggle]");

        return;

      const archiveButton = event.target.closest("[data-archive-task]");

      const taskButton = event.target.closest("[data-task-toggle]");
      if (taskButton) {
        const key = taskButton.dataset.taskToggle;

          collapsedTasks.delete(key);
        } else {
          collapsedTasks.add(key);
        }
        renderBoard(currentBoard, currentSourceLabel);
        return;
      }

      const laneButton = event.target.closest("[data-lane-toggle]");
      if (!laneButton) return;

      const columnKey = laneButton.dataset.laneToggle;
      const visualColumn = visualColumns.find((column) => column.key === columnKey);
      const tasks = visualColumn
        ? visualColumnTasks(currentBoard, visualColumn)
        : columnTasks(currentBoard.columns[columnKey], columnKey);
      const keys = tasks.map(taskKey);
      const allCollapsed = keys.length > 0 && keys.every((key) => collapsedTasks.has(key));

      keys.forEach((key) => {
        if (allCollapsed) {
          collapsedTasks.delete(key);
        } else {
          collapsedTasks.add(key);
        }
      });

      renderBoard(currentBoard, currentSourceLabel);
    });

    // --- Planner chat dock (interactive human input to the Planner) ---
    const plannerChat = {
      dock: null,
      bodyEl: null,
      inputEl: null,
      sendEl: null,
      toolEl: null,
      titleEl: null,
      subEl: null,
      open: false,

      lastSignature: ""

    function buildPlannerChatDock() {
      if (plannerChat.dock) return;
      const dock = document.createElement("aside");
      dock.className = "planner-chat-dock";
      dock.setAttribute("aria-label", "Planner chat");
      dock.innerHTML = `
        <div class="planner-chat-header">
          <div style="flex:1 1 auto; min-width:0;">
            <h3 data-planner-chat-title>Planner chat</h3>
            <span class="planner-chat-sub" data-planner-chat-sub>Send a request directly to the Planner agent</span>
          </div>
          <select class="planner-chat-tool" data-planner-chat-tool aria-label="Planner model">
            <option value="claude">Claude</option>
            <option value="codex">Codex</option>
            <option value="qwen">Qwen</option>
          </select>
          <button class="planner-chat-iconbtn" type="button" data-planner-chat-details title="Open planner details">&#9432;</button>
          <button class="planner-chat-iconbtn" type="button" data-planner-chat-close title="Close chat" aria-label="Close planner chat">&times;</button>
        </div>
        <div class="planner-chat-body" data-planner-chat-body></div>
        <div class="planner-chat-footer">
          <textarea class="planner-chat-input" data-planner-chat-input placeholder="Tell the Planner what to plan..."></textarea>
          <div style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
            <span class="planner-chat-hint">Enter to send &middot; Shift+Enter for newline</span>
            <button class="planner-chat-send" type="button" data-planner-chat-send>Send</button>
          </div>
        </div>
      `;
      document.body.appendChild(dock);
      plannerChat.dock = dock;
      plannerChat.bodyEl = dock.querySelector("[data-planner-chat-body]");
      plannerChat.inputEl = dock.querySelector("[data-planner-chat-input]");
      plannerChat.sendEl = dock.querySelector("[data-planner-chat-send]");
      plannerChat.toolEl = dock.querySelector("[data-planner-chat-tool]");
      plannerChat.titleEl = dock.querySelector("[data-planner-chat-title]");
      plannerChat.subEl = dock.querySelector("[data-planner-chat-sub]");

      dock.querySelector("[data-planner-chat-close]").addEventListener("click", closePlannerChat);
      dock.querySelector("[data-planner-chat-details]").addEventListener("click", () => {
        if (plannerChat.detailKey) {
          workflowDetailKey = plannerChat.detailKey;
          workflowPanelOpen = true;
          renderBoard(currentBoard, currentSourceLabel);
        }
      });
      plannerChat.sendEl.addEventListener("click", sendPlannerMessage);
      plannerChat.inputEl.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          sendPlannerMessage();
        }
      });
    }

    function openPlannerChat(opts) {
      buildPlannerChatDock();
      plannerChat.detailKey = (opts && opts.detailKey) || "";
      const label = (opts && opts.label) || "Planner";
      plannerChat.titleEl.textContent = `${label} chat`;
      plannerChat.open = true;
      plannerChat.dock.classList.add("is-open");
      pollPlannerChat();
      if (plannerChat.pollTimer) window.clearInterval(plannerChat.pollTimer);
      plannerChat.pollTimer = window.setInterval(pollPlannerChat, 2000);
      window.setTimeout(() => plannerChat.inputEl && plannerChat.inputEl.focus(), 240);
    }

    function closePlannerChat() {
      plannerChat.open = false;
      if (plannerChat.dock) plannerChat.dock.classList.remove("is-open");
      if (plannerChat.pollTimer) {
        window.clearInterval(plannerChat.pollTimer);
        plannerChat.pollTimer = null;
      }
    }

    function renderPlannerMessages(messages) {
      const list = Array.isArray(messages) ? messages : [];
      const signature = JSON.stringify(list.map((m) => [m.id, m.status, (m.output || "").length, (m.text || "").length]));
      if (signature === plannerChat.lastSignature) return;
      plannerChat.lastSignature = signature;

      const body = plannerChat.bodyEl;
      if (!body) return;
      const nearBottom = body.scrollHeight - body.scrollTop - body.clientHeight < 80;

      if (!list.length) {
        body.innerHTML = `<div class="planner-chat-empty">No messages yet. Send a request and the Planner will turn it into todo tasks on the board.</div>`;
        return;
      }

      body.innerHTML = list.map((msg) => {
        if (msg.role === "owner") {
          return `<div class="planner-msg owner">${escapeText(msg.text || "")}</div>`;
        }
        const running = msg.status === "running";
        const statusText = running ? "Planner working..." : "Planner";
        const output = msg.output ? escapeText(msg.output) : (running ? "Starting up..." : "(no output captured)");
        return `
          <div class="planner-msg planner">
            <span class="planner-msg-meta"><span class="planner-msg-status ${running ? "running" : ""}">${escapeText(statusText)}${msg.tool ? " &middot; " + escapeText(msg.tool) : ""}</span></span>${output}
          </div>`;
      }).join("");

      if (nearBottom) body.scrollTop = body.scrollHeight;
    }

    async function pollPlannerChat() {
      if (!plannerChat.open) return;
      try {
        const data = await loadJson("/viewer/planner-chat?agentName=Task%20board%20viewer");
        renderPlannerMessages(data.messages);
      } catch (error) {
        /* transient; next poll retries */
      }
    }

    async function sendPlannerMessage() {
      if (plannerChat.sending) return;
      const message = String(plannerChat.inputEl.value || "").trim();
      if (!message) {
        plannerChat.inputEl.focus();
        return;
      }
      const tool = plannerChat.toolEl ? plannerChat.toolEl.value : "claude";
      plannerChat.sending = true;
      plannerChat.sendEl.disabled = true;
      plannerChat.sendEl.textContent = "Sending...";
      try {
        const data = await postJson("/viewer/planner-chat-send", { message, tool });
        plannerChat.inputEl.value = "";
        plannerChat.lastSignature = "";
        renderPlannerMessages(data.messages);
        statusEl.textContent = `Planner chat: launched ${tool} planner.`;
      } catch (error) {
        statusEl.textContent = `Planner chat failed: ${error.message}`;
      } finally {
        plannerChat.sending = false;
        plannerChat.sendEl.disabled = false;
        plannerChat.sendEl.textContent = "Send";
        plannerChat.inputEl.focus();
      }
    }

      const humanInputButton = event.target.closest("[data-human-input]");

    document.addEventListener("keydown", (event) => {

    async function loadDefaultBoard(options = {}) {
      const silent = Boolean(options.silent);
      if (!silent) {
        statusEl.textContent = "Loading board.json...";
      }
      try {
        const [board, agents, , , pauseStatus] = await Promise.all([
          loadJson("board.json"),
          loadAgents(),
          loadAgentSchema(),
          loadDispatchSettings(),
          loadPauseStatus()
        ]);
        currentPauseStatus = pauseStatus;
        renderBoard(board, "board.json", agents);
        statusEl.textContent = silent
          ? `Auto refreshed ${new Date().toLocaleTimeString()}.`
          : "Loaded board.json.";
      } catch (error) {
        if (silent) {
          statusEl.textContent = `Auto refresh failed: ${error.message}`;
          return;
        }
        renderBoard(fallbackBoard, "fallback");
        statusEl.textContent = "Could not auto-load board.json. Use Load JSON file if the browser blocks local file access.";
      }
    }

    async function refreshAgentLogs() {
      if (agentLogRefreshInFlight) return;
      agentLogRefreshInFlight = true;
      try {
        const nextAgents = await loadAgents();
        const normalizedAgents = nextAgents && typeof nextAgents === "object" ? nextAgents : fallbackAgents;
        const beforeSignature = agentRunSignature(currentAgents);
        const afterSignature = agentRunSignature(normalizedAgents);
        currentAgents = normalizedAgents;
        if (beforeSignature !== afterSignature) {
          renderBoard(currentBoard, currentSourceLabel, currentAgents);
        } else {
          updateAgentRunPopovers(currentAgents);
        }
      } finally {
        agentLogRefreshInFlight = false;
      }
    }

    function startAgentLogRefresh() {
      if (agentLogRefreshTimer) return;
      agentLogRefreshTimer = window.setInterval(refreshAgentLogs, 1000);
    }

    function setAutoRefresh(enabled) {
      if (enabled && !autoRefreshTimer) {
        autoRefreshButton.textContent = "Auto refresh: On";
        autoRefreshButton.setAttribute("aria-pressed", "true");
        autoRefreshTimer = window.setInterval(async () => {
          if (autoRefreshInFlight) return;
          autoRefreshInFlight = true;
          try {
            await loadDefaultBoard({ silent: true });
          } finally {
            autoRefreshInFlight = false;
          }
        }, 1000);
        loadDefaultBoard({ silent: true });
        return;
      }

      if (!enabled && autoRefreshTimer) {
        window.clearInterval(autoRefreshTimer);
        autoRefreshTimer = null;
        autoRefreshButton.textContent = "Auto refresh: Off";
        autoRefreshButton.setAttribute("aria-pressed", "false");
        statusEl.textContent = "Auto refresh stopped.";
      }
    }

    fileInput.addEventListener("change", async (event) => {
      const [file] = event.target.files;
      if (!file) return;

      try {
        const text = await file.text();
        const board = JSON.parse(text);
        renderBoard(board, file.name);
        statusEl.textContent = `Loaded ${file.name}.`;
      } catch (error) {
        statusEl.textContent = `Could not load ${file.name}: ${error.message}`;
      }
    });

    reloadButton.addEventListener("click", () => loadDefaultBoard());
    autoRefreshButton.addEventListener("click", () => setAutoRefresh(!autoRefreshTimer));
    pauseControlEl.addEventListener("click", (event) => {
      const actionButton = event.target.closest("[data-pause-action]");
      if (!actionButton) return;
      runPauseAction(actionButton.dataset.pauseAction);
    });
    window.addEventListener("resize", syncViewportClientWidth);
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", syncViewportClientWidth);
    }
    syncViewportClientWidth();
    loadDefaultBoard().finally(startAgentLogRefresh);
  </script>
</body>
</html>
